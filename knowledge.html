  <!-- 整体进度 -->

      <div style="color:var(--text2);font-size:0.85rem">总体进度</div>

      <div id="overall-label" style="color:var(--text2);font-size:0.8rem;margin-top:6px">已掌握 0 / 46 个节点</div>
    </div>
  </div>

  <!-- 模块筛选 -->
  <div class="filter-bar" id="module-filter">
    <button class="filter-btn active" onclick="filterModule('ALL',this)">全部（46）</button>
    <button class="filter-btn" onclick="filterModule('ZR',this)">自然地理（22）</button>

<script>
const NODES = [{"id": "GEO-ZR-001", "module": "ZR", "name": "地球自转方向与周期", "freq": 2, "difficulty": 1, "linked_topic": null}, {"id": "GEO-ZR-002", "module": "ZR", "name": "地方时与区时换算", "freq": 3, "difficulty": 2, "linked_topic": "TOPIC-002", "key_rule": "东加西减，越过日界线±1天", "trap": "过日界线方向与东加西减相反"}, {"id": "GEO-ZR-003", "module": "ZR", "name": "正午太阳高度角", "freq": 3, "difficulty": 2, "linked_topic": "TOPIC-003", "key_rule": "H=90°-|φ-δ|", "trap": "忘加绝对值；楼间距要用冬至"}, {"id": "GEO-ZR-004", "module": "ZR", "name": "三大岩类与物质循环", "freq": 2, "difficulty": 1, "linked_topic": null}, {"id": "GEO-ZR-005", "module": "ZR", "name": "地质构造（背斜/向斜/断层）", "freq": 3, "difficulty": 2, "linked_topic": "TOPIC-004", "key_rule": "背斜中老翼新储油，向斜中新翼老储水，断层找泉", "trap": "构造类型≠地貌类型"}, {"id": "GEO-ZR-006", "module": "ZR", "name": "三圈环流与气压带风带", "freq": 3, "difficulty": 2, "linked_topic": "TOPIC-005", "key_rule": "7气压带6风带，夏北移冬南移", "trap": "副热带高压是动力成因，非热力"}, {"id": "GEO-ZR-007", "module": "ZR", "name": "世界气候类型（9种）", "freq": 3, "difficulty": 2, "linked_topic": "TOPIC-001", "key_rule": "两步法：最冷月气温→降水季节分配", "trap": "海洋性≠地中海：一个全年均匀，一个冬雨夏干"}, {"id": "GEO-ZR-008", "module": "ZR", "name": "冷锋与暖锋天气", "freq": 3, "difficulty": 2, "linked_topic": "TOPIC-006", "key_rule": "冷锋雨在锋后，暖锋雨在锋前", "trap": "梅雨=准静止锋，伏旱=副高"}, {"id": "GEO-ZR-009", "module": "ZR", "name": "世界洋流分布与影响", "freq": 3, "difficulty": 2, "linked_topic": "TOPIC-007", "key_rule": "北顺南逆；暖流增湿，寒流减湿", "trap": "北印度洋季风洋流夏顺冬逆"}, {"id": "GEO-ZR-010", "module": "ZR", "name": "地域分异规律", "freq": 2, "difficulty": 2, "linked_topic": null}, {"id": "GEO-ZR-011", "module": "ZR", "name": "天体系统与地球特殊性", "freq": 1, "difficulty": 1, "linked_topic": null}, {"id": "GEO-ZR-012", "module": "ZR", "name": "太阳活动与对地球影响", "freq": 1, "difficulty": 1, "linked_topic": null}, {"id": "GEO-ZR-013", "module": "ZR", "name": "地球内部圈层结构", "freq": 2, "difficulty": 1, "linked_topic": null}, {"id": "GEO-ZR-014", "module": "ZR", "name": "地质年代与生物演化", "freq": 1, "difficulty": 1, "linked_topic": null}, {"id": "GEO-ZR-015", "module": "ZR", "name": "大气垂直分层特征", "freq": 2, "difficulty": 1, "linked_topic": null}, {"id": "GEO-ZR-016", "module": "ZR", "name": "大气受热过程与保温效应", "freq": 3, "difficulty": 2, "linked_topic": null, "key_rule": "地面是大气直接热源；晴天日较差大", "trap": "把太阳辐射当大气直接热源"}, {"id": "GEO-ZR-017", "module": "ZR", "name": "热力环流原理与应用", "freq": 3, "difficulty": 2, "linked_topic": null, "key_rule": "冷热不均→气压差→环流；白天海风，夜晚陆风", "trap": "工厂选址需同时考虑盛行风和热岛环流"}, {"id": "GEO-ZR-018", "module": "ZR", "name": "水循环类型与人类影响", "freq": 2, "difficulty": 1, "linked_topic": null}, {"id": "GEO-ZR-019", "module": "ZR", "name": "8大植被类型与气候对应", "freq": 1, "difficulty": 1, "linked_topic": null}, {"id": "GEO-ZR-020", "module": "ZR", "name": "土壤形成因素与典型土壤", "freq": 1, "difficulty": 1, "linked_topic": null}, {"id": "GEO-ZR-021", "module": "ZR", "name": "河流补给类型判断", "freq": 2, "difficulty": 2, "linked_topic": null}, {"id": "GEO-ZR-022", "module": "ZR", "name": "厄尔尼诺与拉尼娜", "freq": 2, "difficulty": 2, "linked_topic": null}, {"id": "GEO-RW-001", "module": "RW", "name": "城市功能区与地租分析", "freq": 2, "difficulty": 2, "linked_topic": null}, {"id": "GEO-RW-002", "module": "RW", "name": "农业区位因素与主导因素", "freq": 3, "difficulty": 2, "linked_topic": "TOPIC-008", "key_rule": "自然因素+社会经济因素；找主导因素", "trap": "只列因素不突出主导"}, {"id": "GEO-RW-003", "module": "RW", "name": "世界人口分布规律", "freq": 1, "difficulty": 1, "linked_topic": null}, {"id": "GEO-RW-004", "module": "RW", "name": "人口迁移影响因素与流向", "freq": 2, "difficulty": 1, "linked_topic": null}, {"id": "GEO-RW-005", "module": "RW", "name": "资源环境承载力与合理容量", "freq": 1, "difficulty": 1, "linked_topic": null}, {"id": "GEO-RW-006", "module": "RW", "name": "城镇化进程与问题", "freq": 2, "difficulty": 1, "linked_topic": null}, {"id": "GEO-RW-007", "module": "RW", "name": "工业区位因素与5类指向型", "freq": 3, "difficulty": 2, "linked_topic": "TOPIC-009", "key_rule": "原料/市场/劳动力/技术/电力指向5类", "trap": "高科技=技术指向≠市场指向"}, {"id": "GEO-RW-008", "module": "RW", "name": "可持续发展三原则", "freq": 2, "difficulty": 1, "linked_topic": null}, {"id": "GEO-QY-001", "module": "QY", "name": "鲁尔区衰退原因与整治", "freq": 2, "difficulty": 2, "linked_topic": "TOPIC-009"}, {"id": "GEO-QY-002", "module": "QY", "name": "西气东输双边影响", "freq": 2, "difficulty": 2, "linked_topic": "TOPIC-010"}, {"id": "GEO-QY-003", "module": "QY", "name": "区域特征与三大自然区", "freq": 1, "difficulty": 1, "linked_topic": null}, {"id": "GEO-QY-004", "module": "QY", "name": "荒漠化成因与防治", "freq": 2, "difficulty": 2, "linked_topic": null}, {"id": "GEO-QY-005", "module": "QY", "name": "产业转移原因与双边影响", "freq": 3, "difficulty": 2, "linked_topic": "TOPIC-009", "key_rule": "转出地：升级；转入地：就业+GDP+生态压力", "trap": "只写转入地影响"}, {"id": "GEO-QY-006", "module": "QY", "name": "南水北调三线与双边影响", "freq": 2, "difficulty": 2, "linked_topic": "TOPIC-010"}, {"id": "GEO-QY-007", "module": "QY", "name": "长江流域开发与保护", "freq": 2, "difficulty": 2, "linked_topic": null}, {"id": "GEO-ZY-001", "module": "ZY", "name": "耕地保护与18亿亩红线", "freq": 1, "difficulty": 1, "linked_topic": "TOPIC-011"}, {"id": "GEO-ZY-002", "module": "ZY", "name": "全球变暖与巴黎协定", "freq": 1, "difficulty": 1, "linked_topic": null}, {"id": "GEO-ZY-003", "module": "ZY", "name": "自然资源属性与三阶段演变", "freq": 1, "difficulty": 1, "linked_topic": null}, {"id": "GEO-ZY-004", "module": "ZY", "name": "环境问题分类与地区差异", "freq": 1, "difficulty": 1, "linked_topic": null}, {"id": "GEO-ZY-005", "module": "ZY", "name": "水资源安全与节水措施", "freq": 2, "difficulty": 2, "linked_topic": "TOPIC-011"}, {"id": "GEO-ZY-006", "module": "ZY", "name": "石油安全与马六甲通道", "freq": 2, "difficulty": 2, "linked_topic": "TOPIC-011"}, {"id": "GEO-ZY-007", "module": "ZY", "name": "海洋权益范围（领海/EEZ）", "freq": 1, "difficulty": 1, "linked_topic": "TOPIC-011"}, {"id": "GEO-ZY-008", "module": "ZY", "name": "生物多样性保护", "freq": 1, "difficulty": 1, "linked_topic": "TOPIC-011"}, {"id": "GEO-ZY-009", "module": "ZY", "name": "污染物跨境转移与巴塞尔公约", "freq": 1, "difficulty": 1, "linked_topic": null}];
function getRecords() {
  try { return JSON.parse(localStorage.getItem('geo_learning_records') || '{}'); } catch { return {}; }
}

let currentModule = 'ALL', onlyHigh = false;

function renderNodes() {
  const r = getRecords();
  const filtered = NODES.filter(n =>
    (currentModule === 'ALL' || n.module === currentModule) &&
    (!onlyHigh || n.freq === 3)
  );
  const list = document.getElementById('node-list');
  list.innerHTML = '';
  filtered.forEach(n => {
    const status = r[n.id]?.status || 'not_started';
    const statusLabel = {not_started:'未学',in_progress:'学习中',mastered:'已掌握'}[status];
    const statusColor = {not_started:'var(--border)',in_progress:'var(--orange)',mastered:'var(--green)'}[status];
    list.innerHTML += `
      <a class="node-item" href="node.html?id=${n.id}" style="text-decoration:none;color:inherit">
        <span style="width:10px;height:10px;border-radius:50%;background:${statusColor};flex-shrink:0;display:inline-block"></span>
        <span class="node-name">${n.name}</span>
        <span style="color:var(--yellow);font-size:0.8rem">${'⭐'.repeat(n.freq)}</span>
        <span class="tag ${status==='mastered'?'tag-green':status==='in_progress'?'tag-orange':''}" style="font-size:0.75rem">${statusLabel}</span>
        <span style="color:var(--text2);font-size:0.85rem">→</span>
      </a>`;
  });
}

function filterModule(m, btn) {
  currentModule = m; onlyHigh = false;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderNodes();
}

function filterFreq(btn) {
  onlyHigh = !onlyHigh; currentModule = 'ALL';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (onlyHigh) btn.classList.add('active');
  else document.querySelector('.filter-btn').classList.add('active');
  renderNodes();
}

function updateProgress() {
  const r = getRecords();
  const mastered = NODES.filter(n => r[n.id]?.status === 'mastered').length;
  const pct = Math.round(mastered / NODES.length * 100);
  document.getElementById('overall-pct').textContent = pct + '%';
  document.getElementById('overall-bar').style.width = pct + '%';
  document.getElementById('overall-label').textContent = `已掌握 ${mastered} / ${NODES.length} 个节点`;
}

updateProgress(); renderNodes();
function toggleMobileNav() { document.getElementById('mobile-nav').classList.toggle('hidden'); }
</script>
</body>
