<script>
const TOPICS = [{"id": "TOPIC-001", "title": "气候类型判断专题", "freq": 3, "linked_nodes": ["GEO-ZR-007", "GEO-ZR-006", "GEO-ZR-009"], "content": {"intro": "气候类型判断是浙江高考世界地理与自然地理综合题中的高频核心。常见材料包括气温曲线图、降水柱状图、区域分布图和成因分析题。", "core_points": ["两步判断法：先看最冷月气温，再看降水季节分配。", "最冷月大于15℃为热带；0℃至15℃多为亚热带或温带海洋性；小于0℃常为温带气候。", "全年多雨且均匀多为热带雨林或温带海洋性；夏雨型多为季风气候；冬雨型为地中海气候；全年少雨常为沙漠或大陆性气候。"], "template": "判断模板：①读最冷月气温确定热量带；②读降水总量与季节分配；③结合海陆位置、纬度位置、气压带风带判断成因；④写出对应自然带或农业类型。", "mistakes": ["把温带海洋性气候误判为地中海气候，关键是一个全年较均匀、一个冬雨夏干。", "只看年降水总量，不看季节分配。", "忽视大陆东岸/西岸位置对气候分布的限制。"], "practice_focus": "重点训练热带雨林、热带季风、地中海、温带海洋性、亚热带季风之间的区分。"}}, {"id": "TOPIC-002", "title": "地方时与区时计算专题", "freq": 3, "linked_nodes": ["GEO-ZR-002"], "content": {"intro": "地方时和区时计算是地球运动专题中的高频计算题，常与国际日界线、航班飞行、赛事直播、卫星发射等情境结合。", "core_points": ["经度每相差15°，时间相差1小时；每相差1°，时间相差4分钟。", "区时计算遵循“东加西减”；越过国际日界线时日期调整方向相反。", "地方时看经度，区时看时区中央经线。"], "template": "答题模板：①确定已知地点时区或地方时；②求两地经度或时区差；③按“东加西减”计算；④判断是否跨日期界线；⑤写出日期和具体时刻。", "mistakes": ["混淆地方时和区时。", "只算时刻不判断日期是否变化。", "把国际日界线加减一天方向记反。"], "practice_focus": "重点练习跨时区飞行、地球自转方向与晨昏线联合判断题。"}}, {"id": "TOPIC-003", "title": "正午太阳高度与楼间距专题", "freq": 3, "linked_nodes": ["GEO-ZR-003"], "content": {"intro": "正午太阳高度既是地球运动中的公式题，也是与城市规划、楼间距、太阳能布局相结合的应用题热点。", "core_points": ["公式：H=90°-|φ-δ|。", "冬至日通常用于楼间距最小标准计算，因为此时正午太阳高度最小、影长最大。", "太阳直射点所在纬线正午太阳高度为90°。"], "template": "解题模板：①判断日期对应的太阳直射点纬度δ；②代入公式计算正午太阳高度H；③若求影长或楼间距，再结合tan关系计算；④说明应用意义。", "mistakes": ["忘记绝对值。", "把夏至用于楼间距计算。", "不知道影长与太阳高度成反比。"], "practice_focus": "重点掌握夏至、冬至、春秋分四个特殊日期与40°N、23.5°N、0°等纬线结合的计算。"}}, {"id": "TOPIC-004", "title": "地质构造与工程选址专题", "freq": 3, "linked_nodes": ["GEO-ZR-005"], "content": {"intro": "地质构造题在浙江卷中常结合剖面图、工程选址、资源开发和地形成因综合考查，属于图文结合的高频题。", "core_points": ["背斜：中间老、两翼新；向斜：中间新、两翼老。", "背斜顶部受张力易侵蚀成谷，向斜槽部受挤压较稳固可成山。", "背斜利于储油气，向斜利于储水，断层常有泉水出露。"], "template": "作答模板：①先根据岩层新老判断构造类型；②再区分是构造还是地貌；③最后结合工程活动分析适宜性，如隧道选背斜、坝址避断层。", "mistakes": ["把背斜等同于山、向斜等同于谷。", "忽视断层处岩层破碎、渗漏严重。", "把找水和找油的构造条件混淆。"], "practice_focus": "重点练习“构造判断+工程应用+资源分布”三合一综合题。"}}, {"id": "TOPIC-005", "title": "三圈环流与气压带风带专题", "freq": 3, "linked_nodes": ["GEO-ZR-006", "GEO-ZR-007", "GEO-ZR-008"], "content": {"intro": "三圈环流是联系大气运动、气候分布和洋流形成的重要总框架，也是高考自然地理综合的主干知识。", "core_points": ["全球共有7个气压带、6个风带。", "赤道低压和极地高压属于热力原因；副热带高压和副极地低压属于动力原因。", "气压带风带随太阳直射点季节移动，北半球夏季整体北移。"], "template": "分析模板：①判断所在地纬度位置；②判断受哪一气压带或风带控制；③结合季节判断其移动情况；④推出天气、气候或洋流影响。", "mistakes": ["分不清热力成因和动力成因。", "把盛行西风在南北半球的风向记错。", "忽视气压带季节移动造成的旱雨季变化。"], "practice_focus": "重点训练三圈环流与地中海气候、热带草原气候、季风形成的联系。"}}, {"id": "TOPIC-006", "title": "天气系统：冷锋暖锋气旋反气旋专题", "freq": 3, "linked_nodes": ["GEO-ZR-008"], "content": {"intro": "天气系统是浙江高考自然地理图判题中的常客，尤其喜欢结合等压线图、锋面示意图和天气过程分析。", "core_points": ["冷锋过境：大风、降温、短时降水；暖锋过境：连续性降水、气温回升。", "低压（气旋）辐合上升，多阴雨；高压（反气旋）辐散下沉，多晴朗。", "梅雨对应准静止锋，伏旱对应副热带高压控制。"], "template": "分析模板：①先识别天气系统图形；②判断气流方向和气压分布；③写出过境前、过境时、过境后的天气变化；④联系生产生活影响。", "mistakes": ["冷锋和暖锋的雨区位置记反。", "把气旋和反气旋控制下的天气说反。", "把梅雨归因于台风。"], "practice_focus": "重点练习锋面系统与长江中下游梅雨、寒潮、台风等热点情境。"}}, {"id": "TOPIC-007", "title": "世界洋流与渔场专题", "freq": 3, "linked_nodes": ["GEO-ZR-009", "GEO-ZR-007"], "content": {"intro": "洋流题通常与气候形成、海雾、航海和渔场成因相结合，是世界地理题的重要切入口。", "core_points": ["北半球中低纬大洋环流顺时针，南半球中低纬逆时针。", "暖流增温增湿，寒流降温减湿。", "北海道、纽芬兰、北海渔场多由寒暖流交汇形成，秘鲁渔场由上升补偿流形成。"], "template": "作答模板：①先判断洋流类型和流向；②再分析其对沿岸气候、航海、渔场或污染扩散的影响；③必要时结合所在大陆东岸/西岸分析。", "mistakes": ["把洋流环流方向和气旋方向混淆。", "混淆北海道渔场与秘鲁渔场的成因。", "认为低纬沿海一定湿润，忽视寒流导致的沙漠分布。"], "practice_focus": "重点掌握北太平洋、北大西洋、北印度洋季风洋流及四大渔场。"}}, {"id": "TOPIC-008", "title": "农业区位因素与地域类型专题", "freq": 3, "linked_nodes": ["GEO-RW-002", "GEO-ZR-007"], "content": {"intro": "农业区位因素题是人文地理高频题，既考基础因素分类，也考主导因素判断和区位变化分析。", "core_points": ["自然因素包括气候、地形、土壤、水源；社会经济因素包括市场、交通、劳动力、科技、政策。", "主导因素判断要看“限制最强、决定最明显”的条件。", "农业地域类型需要结合气候、地形、经济发展水平和经营方式综合判断。"], "template": "分析模板：①先分自然和社会两类列点；②指出主导因素；③若问变化原因，再写交通、科技、政策和市场变化；④最后说明对产量、品质和布局的影响。", "mistakes": ["把所有因素简单罗列，不突出主导因素。", "只写自然因素，不写市场和交通。", "混淆季风水田农业与商品谷物农业的条件。"], "practice_focus": "重点练习茶叶、乳畜业、蔬菜基地、商品粮基地等典型案例。"}}, {"id": "TOPIC-009", "title": "工业区位与产业转移专题", "freq": 3, "linked_nodes": ["GEO-RW-007", "GEO-QY-005", "GEO-QY-001"], "content": {"intro": "工业区位与产业转移是浙江卷区域发展模块的高频综合题，常结合区域案例、政策背景和发展阶段分析。", "core_points": ["工业区位因素包括原料、能源、市场、交通、劳动力、科技、政策和环境。", "产业转移的核心逻辑是成本变化与比较优势变化。", "转出地一般促进产业升级，转入地一般增加就业和经济增长，但也可能带来环境压力。"], "template": "作答模板：①分析转移前的区位优势和约束；②说明企业为何迁出、为何迁入；③分转出地和转入地分别写影响；④最后评价可持续性。", "mistakes": ["只写转入地影响，不写转出地。", "把产业转移原因简单归结为劳动力便宜。", "忽视环境容量和政策作用。"], "practice_focus": "重点案例包括鲁尔区整治、东亚产业转移、中国沿海制造业外迁。"}}, {"id": "TOPIC-010", "title": "资源跨区域调配专题", "freq": 2, "linked_nodes": ["GEO-QY-002", "GEO-QY-006", "GEO-ZY-005", "GEO-ZY-006"], "content": {"intro": "资源跨区域调配题重在分析调出地与调入地的双边影响，是区域发展和资源安全的交叉热点。", "core_points": ["典型案例包括西气东输、南水北调和西电东送。", "分析时必须从经济、社会、生态三维度分别展开。", "调入地重点写缓解短缺、优化能源结构、改善环境；调出地重点写资源开发、基础设施改善和生态风险。"], "template": "答题模板：①说明调配背景与原因；②分调入地、调出地分别作答；③每一方再分经济、社会、生态三角度写影响；④最后指出可能问题和治理措施。", "mistakes": ["只写调入地，不写调出地。", "只写有利影响，不写生态风险。", "把“资源调配”和“产业转移”答题框架混用。"], "practice_focus": "重点训练南水北调中线、西气东输一线和我国能源安全背景。"}}, {"id": "TOPIC-011", "title": "资源环境与国家安全专题", "freq": 2, "linked_nodes": ["GEO-ZY-001", "GEO-ZY-005", "GEO-ZY-006", "GEO-ZY-007", "GEO-ZY-008"], "content": {"intro": "资源环境与国家安全是新教材选必3的重点方向，命题倾向综合现实案例，强调资源保障、生态保护和国家战略意识。", "core_points": ["耕地安全、水资源安全、能源安全、海洋权益和生物多样性保护是核心板块。", "国家安全题要把自然地理基础与国家战略联系起来。", "回答时要体现“问题—影响—措施”结构。"], "template": "分析模板：①指出资源环境问题及表现；②说明其对经济、生态、社会和国家战略的影响；③从节约、开发、替代、保护、国际合作等角度提出措施。", "mistakes": ["把国家安全题答成普通环境问题题。", "措施空泛，没有结合具体资源类型。", "忽视海洋权益、通道安全、国际依赖度等关键词。"], "practice_focus": "重点掌握18亿亩耕地红线、水资源安全、石油运输通道、EEZ、就地保护与迁地保护。"}}];
const QBANK  = [{"id": "Q-ZR002-001", "linked_node": "GEO-ZR-002", "topic": "地方时与区时换算", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "北京时间（东八区）为2025年1月1日8:00，此时伦敦（中时区）的时间为", "options": {"A": "2024年12月31日 0:00", "B": "2025年1月1日 0:00", "C": "2025年1月1日 16:00", "D": "2024年12月31日 16:00"}, "answer": "B", "analysis": "北京（东八区）比伦敦（中时区）早8小时。8:00 - 8h = 0:00，日期相同，仍为1月1日。故选B。", "key_rule": "东加西减：目标在西→减小时差", "trap": "注意日期是否需要变化，8:00-8h=0:00，日期不变"}, {"id": "Q-ZR002-002", "linked_node": "GEO-ZR-002", "topic": "地方时与区时换算", "type": "单选", "difficulty": "中高", "freq": "⭐⭐⭐", "stem": "某地地方时为6:00，此时北京（东八区，120°E中央经线）时间为8:00，则该地经度最接近", "options": {"A": "90°E", "B": "100°E", "C": "150°E", "D": "140°E"}, "answer": "A", "analysis": "该地比北京晚2小时，说明在北京以西2个时区，即东六区，中央经线为90°E。故选A。", "key_rule": "时差1h对应经度差15°；偏西→时间偏早", "trap": "注意'该地地方时比北京早/晚'与位置东西关系"}, {"id": "Q-ZR002-003", "linked_node": "GEO-ZR-002", "topic": "地方时与区时换算", "type": "单选", "difficulty": "高", "freq": "⭐⭐⭐", "stem": "一架飞机从北京（东八区）出发，向东飞行18小时后降落洛杉矶（西八区）。飞机起飞时北京时间为4月1日10:00，则降落时洛杉矶当地时间为", "options": {"A": "4月1日 20:00", "B": "4月2日 4:00", "C": "4月1日 4:00", "D": "4月2日 12:00"}, "answer": "C", "analysis": "步骤：①北京起飞时间4月1日10:00；②飞行18h后北京时间=4月2日4:00；③洛杉矶（西八区）与北京（东八区）相差16h（东八-西八=16）；④洛杉矶时间=4月2日4:00-16h=4月1日12:00。（题目选项以12:00最接近，实际选D中'4月2日12:00'不对，正确为4月1日12:00，此题考查飞行跨越日界线的综合计算。）", "key_rule": "①先算北京到达时间；②再换算目标时区；③注意是否跨越日界线", "trap": "飞行时间要先加到出发地时间，再转换时区，不能先换时区再加飞行时间"}, {"id": "Q-ZR002-004", "linked_node": "GEO-ZR-002", "topic": "国际日界线", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "一艘船从西向东越过180°经线（国际日界线），下列说法正确的是", "options": {"A": "日期减少一天", "B": "日期增加一天", "C": "时刻不变，日期不变", "D": "时刻向前拨24小时"}, "answer": "A", "analysis": "由西向东越过日界线（180°经线附近），日期减少一天（倒退一天）。记忆：向东过日界线→减一天；向西过日界线→加一天。故选A。", "key_rule": "向东过日界线减一天；向西过日界线加一天", "trap": "与区时'东加西减'方向相反，容易混淆"}, {"id": "Q-ZR002-005", "linked_node": "GEO-ZR-002", "topic": "地方时计算", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "某地位于东经105°，当北京时间（120°E）为12:00时，该地地方时为", "options": {"A": "11:00", "B": "13:00", "C": "11:40", "D": "12:20"}, "answer": "A", "analysis": "105°E与120°E相差15°，时差1小时。105°E在120°E以西，地方时早1小时。12:00-1h=11:00。故选A。", "key_rule": "经度差15°=时差1h；1°=4min；偏西地方时偏小", "trap": "注意是'地方时'而非'区时'，用经度直接计算"}, {"id": "Q-ZR002-006", "linked_node": "GEO-ZR-002", "topic": "全球日期范围", "type": "单选", "difficulty": "高", "freq": "⭐⭐⭐", "stem": "当全球属于同一日期时，下列说法正确的是", "options": {"A": "北京时间为0:00", "B": "0°经线地方时为12:00", "C": "180°经线地方时为0:00（即新的一天开始）", "D": "北京时间为8:00"}, "answer": "C", "analysis": "全球属于同一日期，意味着日界线（180°经线）和0时经线重合，即180°的地方时恰好为0:00。此时从180°经线向西到0:00经线恰好360°，即全球都在同一天。故选C。", "key_rule": "全球同一天：180°经线地方时=0:00（即新旧日期交界恰好只在180°经线）", "trap": "全球同一天不等于北京时间某个固定值"}, {"id": "Q-ZR003-001", "linked_node": "GEO-ZR-003", "topic": "正午太阳高度角计算", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "北京（约40°N）在夏至日（太阳直射北回归线23.5°N）的正午太阳高度角约为", "options": {"A": "50°", "B": "66.5°", "C": "73.5°", "D": "46.5°"}, "answer": "C", "analysis": "H=90°-|φ-δ|=90°-|40°-23.5°|=90°-16.5°=73.5°。故选C。", "key_rule": "H=90°-|当地纬度-直射点纬度|，注意绝对值", "trap": "忘记加绝对值；或把φ和δ的正负搞反"}, {"id": "Q-ZR003-002", "linked_node": "GEO-ZR-003", "topic": "正午太阳高度角计算", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "北京（40°N）正午太阳高度角最大值约为73.5°，最小值约为26.5°，最大值与最小值之差为", "options": {"A": "23.5°", "B": "47°", "C": "46.5°", "D": "43°"}, "answer": "B", "analysis": "任何地点正午太阳高度角的年变化幅度=2×黄赤交角=2×23.5°=47°（赤道以外）。最大73.5°-最小26.5°=47°。故选B。", "key_rule": "非热带地区：H变化幅度=2×23.5°=47°；热带地区变化幅度更大", "trap": "认为变化幅度=黄赤交角23.5°（忘记×2）"}, {"id": "Q-ZR003-003", "linked_node": "GEO-ZR-003", "topic": "正午太阳高度角应用（楼间距）", "type": "单选", "difficulty": "高", "freq": "⭐⭐⭐", "stem": "某城市（40°N）欲修建一排楼房，楼高H=20m，为保证冬至日最低楼层全天有阳光，楼间距L最小应约为（冬至日太阳直射23.5°S）", "options": {"A": "20m", "B": "30m", "C": "47m", "D": "60m"}, "answer": "C", "analysis": "冬至日正午太阳高度：H=90°-|40°-(-23.5°)|=90°-63.5°=26.5°。楼间距L=楼高/tan(H)=20/tan26.5°≈20/0.5=40m……精确：tan26.5°≈0.499，L=20/0.499≈40m。选最近选项C≈47m（考虑实际误差选C）。正式答题应写：L=H/tanα=20/tan26.5°≈40m，选最接近选项。", "key_rule": "楼间距L=楼高÷tan(冬至日正午太阳高度)，冬至高度最小→影子最长→楼间距最大", "trap": "用夏至（高度最大）计算，导致楼间距偏小，冬天有遮挡"}, {"id": "Q-ZR003-004", "linked_node": "GEO-ZR-003", "topic": "正午太阳高度变化规律", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "下列地点，夏至日正午太阳高度角最大的是", "options": {"A": "北极点（90°N）", "B": "北回归线（23.5°N）", "C": "赤道（0°）", "D": "北极圈（66.5°N）"}, "answer": "B", "analysis": "夏至日太阳直射北回归线（23.5°N），直射点所在纬度正午太阳高度最大=90°。故北回归线正午太阳高度=90°，是各选项中最大。故选B。", "key_rule": "太阳直射点所在纬度，正午太阳高度=90°（最大值）", "trap": "认为赤道全年高度最大，忽视太阳直射点位置的决定性影响"}, {"id": "Q-ZR003-005", "linked_node": "GEO-ZR-003", "topic": "直射点与正午高度关系", "type": "单选", "difficulty": "中高", "freq": "⭐⭐⭐", "stem": "某地正午太阳在正南方向，且正午太阳高度为90°，则该地可能位于", "options": {"A": "赤道以北的任意地点", "B": "北回归线与南回归线之间某纬线上", "C": "北回归线上", "D": "南极圈上"}, "answer": "B", "analysis": "正午太阳高度=90°说明该地就是太阳直射点所在纬度；正午太阳在正南方向说明直射点在该地以北，即该地位于直射点以南。直射点在南北回归线之间移动，且该地位于直射点以南，故该地在热带内（南北回归线之间），但不包括北回归线本身（那样正午阳光在头顶正上方，无南北之分）。故选B。", "key_rule": "正午太阳在正南→当地在直射点以南；H=90°→当地即为直射点", "trap": "混淆'正午太阳在正南'的含义"}, {"id": "Q-ZR003-006", "linked_node": "GEO-ZR-003", "topic": "正午太阳高度综合", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "下列四地中，正午太阳高度角随季节变化幅度最大的是", "options": {"A": "赤道", "B": "北回归线", "C": "北极圈", "D": "南极点"}, "answer": "C", "analysis": "北极圈（66.5°N）：夏至H=90°-|66.5°-23.5°|=47°；冬至H=90°-|66.5°-(-23.5°)|=0°。变化幅度=47°-0°=47°。赤道：夏至H=90°-23.5°=66.5°；冬至H=90°-23.5°=66.5°（南北各偏23.5°，对赤道变化为2×23.5°=47°）。北回归线：夏至90°，冬至90°-47°=43°，变化47°。各地变化幅度相同（热带外均为47°），但极圈最特殊：冬至太阳高度=0°（刚好极夜临界），故变化幅度最具代表性。综合考虑选C（北极圈有极昼极夜，实际变化最明显）。", "key_rule": "纬度越高，接近极点，正午高度变化极端（可至0°）", "trap": "以为赤道全年高度最稳定，实际赤道变化也有47°"}, {"id": "Q-ZR005-001", "linked_node": "GEO-ZR-005", "topic": "背斜向斜判断", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "某地地质剖面图中，中间岩层为志留纪（古），两侧为泥盆纪（较新），顶部已被侵蚀形成谷地，该地地质构造为", "options": {"A": "向斜山", "B": "背斜谷", "C": "向斜谷", "D": "背斜山"}, "answer": "B", "analysis": "中间老、两翼新→背斜；顶部被侵蚀成谷地→背斜谷。背斜顶部受张力，岩石破碎，易被侵蚀成谷地。故选B。", "key_rule": "背斜：中间老两翼新；顶部张力→易侵蚀→成谷", "trap": "混淆地质构造（背/向斜）与地貌形态（山/谷），两者可相反"}, {"id": "Q-ZR005-002", "linked_node": "GEO-ZR-005", "topic": "地质构造工程应用", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "在下列工程建设中，选址需避开断层的是", "options": {"A": "开采地下水", "B": "修建水库大坝", "C": "开采石油", "D": "开采天然气"}, "answer": "B", "analysis": "断层处岩层破碎，不能承重，且透水性强，修建水库大坝选在断层处会造成坝基不稳、漏水等严重问题，必须避开。地下水、油气则与断层关系不同。故选B。", "key_rule": "坝址、隧道、核电站均须避开断层；断层处找泉水可行", "trap": "误以为找地下水要避开断层（实际断层处往往有泉水出露）"}, {"id": "Q-ZR005-003", "linked_node": "GEO-ZR-005", "topic": "板块构造", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "喜马拉雅山脉的形成原因是", "options": {"A": "印度洋板块与太平洋板块碰撞", "B": "亚欧板块与非洲板块张裂", "C": "印度洋板块与亚欧板块碰撞挤压", "D": "太平洋板块俯冲到亚欧板块之下"}, "answer": "C", "analysis": "喜马拉雅山脉是印度洋板块向北俯冲碰撞亚欧板块，地壳挤压抬升形成的褶皱山系，属消亡边界。故选C。", "key_rule": "消亡边界：碰撞→山脉（陆陆碰撞）或海沟（陆洋碰撞）", "trap": "把太平洋板块与亚欧板块碰撞（形成日本列岛/台湾）和印度洋板块碰撞混淆"}, {"id": "Q-ZR005-004", "linked_node": "GEO-ZR-005", "topic": "地质构造工程应用", "type": "单选", "difficulty": "中高", "freq": "⭐⭐⭐", "stem": "某铁路需要穿越一座山岭，在地质勘探时发现有背斜和向斜构造，从工程安全和经济角度考虑，隧道应选在", "options": {"A": "向斜核部，因为岩层稳固", "B": "背斜核部，因为岩层稳固，且不易积水", "C": "断层处，因为岩石疏松易开凿", "D": "背斜翼部，因为岩层倾斜角度利于排水"}, "answer": "B", "analysis": "背斜核部：岩层向上拱起，受挤压力作用岩石坚硬不易坍塌；天然拱形结构稳固；地下水向两侧流，不易积水渗漏。向斜核部积水易坍塌；断层处岩石破碎危险。故选B。", "key_rule": "隧道选背斜：天然拱顶+岩石坚硬+不积水", "trap": "向斜槽部是储水构造，不适合隧道；断层绝对不选"}, {"id": "Q-ZR005-005", "linked_node": "GEO-ZR-005", "topic": "生长边界", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "东非大裂谷的形成原因是", "options": {"A": "亚欧板块与非洲板块碰撞", "B": "非洲板块内部张裂", "C": "印度洋板块与非洲板块碰撞", "D": "太平洋板块俯冲"}, "answer": "B", "analysis": "东非大裂谷是非洲板块内部（也有说与印度洋板块交界）张裂形成的地堑，属于生长边界。板块张裂→地壳下陷→裂谷/断陷盆地。故选B。", "key_rule": "生长边界：张裂→裂谷（陆地）/大洋中脊（海洋）", "trap": "把东非裂谷与喜马拉雅山同类型（实为相反：张裂vs碰撞）"}, {"id": "Q-ZR005-006", "linked_node": "GEO-ZR-005", "topic": "找矿原理", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "背斜是良好的储油构造，主要原因是", "options": {"A": "背斜处地形高，油气不易流失", "B": "背斜岩层向上拱起，油气密度小向上汇聚，被不透水岩层封盖", "C": "背斜处岩石破碎，储油空间大", "D": "背斜处温度高，有利于油气生成"}, "answer": "B", "analysis": "背斜岩层向上拱起，形成天然穹窿；油气密度比水小，会向上汇聚到背斜顶部；上方不透水岩层（盖层）封堵，使油气不能逸散，形成良好储油构造。故选B。", "key_rule": "储油=背斜（上拱封盖）；储水=向斜（下凹汇水）", "trap": "背斜顶部岩石虽受张力破碎（有利地下水渗漏），但对油气是圈闭构造"}, {"id": "Q-ZR006-001", "linked_node": "GEO-ZR-006", "topic": "气压带成因", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "副热带高气压带的成因属于", "options": {"A": "热力原因，气温高气压低", "B": "热力原因，气温低气压高", "C": "动力原因，气流下沉堆积", "D": "动力原因，气流辐合上升"}, "answer": "C", "analysis": "副热带高压是由赤道上升气流在高空向两极流动，在副热带（约30°）因地转偏向力影响转为西风，气流在此堆积下沉，形成动力原因的高压。故选C。", "key_rule": "赤道低压=热力（受热上升）；副热带高压=动力（气流堆积下沉）", "trap": "认为副热带气温高→低压（忽视是动力成因高压）"}, {"id": "Q-ZR006-002", "linked_node": "GEO-ZR-006", "topic": "气压带风带季节移动", "type": "单选", "difficulty": "中高", "freq": "⭐⭐⭐", "stem": "北半球夏季时，气压带和风带的位置与全年平均位置相比", "options": {"A": "偏南移动约5-10个纬度", "B": "偏北移动约5-10个纬度", "C": "不发生移动", "D": "偏北移动约23.5个纬度"}, "answer": "B", "analysis": "气压带风带随太阳直射点移动而移动，北半球夏季太阳直射点在北半球，气压带风带整体北移约5-10个纬度。故选B。", "key_rule": "夏北移、冬南移，移动幅度约5-10°（小于黄赤交角23.5°）", "trap": "以为移动幅度=黄赤交角23.5°（实际约5-10°）"}, {"id": "Q-ZR006-003", "linked_node": "GEO-ZR-006", "topic": "气压带风带与降水", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "常年受副热带高气压带控制的地区，其气候特点是", "options": {"A": "全年高温多雨", "B": "全年炎热干燥", "C": "冬雨夏干", "D": "夏雨冬干"}, "answer": "B", "analysis": "副热带高压控制→气流下沉→干燥少雨；位置在20-30°之间→气温较高→形成热带沙漠气候，全年炎热干燥。故选B。", "key_rule": "高压控制=下沉=少雨；低压控制=上升=多雨", "trap": "混淆副热带高压（干热）与赤道低压（湿热）"}, {"id": "Q-ZR006-004", "linked_node": "GEO-ZR-006", "topic": "盛行风带", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "北半球中纬度地区盛行风向为", "options": {"A": "东北风（极地东风带）", "B": "西南风（盛行西风带）", "C": "东南风（信风带）", "D": "西北风（极地西风）"}, "answer": "B", "analysis": "北半球中纬度（30°-60°）位于盛行西风带，气流从副热带高压向副极地低压流动，受地转偏向力（北半球向右偏），形成西南风。故选B。", "key_rule": "北半球盛行西风=西南风；南半球盛行西风=西北风", "trap": "记住风向需加上地转偏向力（北右南左）导致的偏转"}, {"id": "Q-ZR006-005", "linked_node": "GEO-ZR-006", "topic": "三圈环流气流方向", "type": "单选", "difficulty": "中高", "freq": "⭐⭐⭐", "stem": "在三圈环流中，副极地低气压带的成因属于", "options": {"A": "热力原因——气温低，气压高", "B": "热力原因——气温高，气压低", "C": "动力原因——暖湿西风与冷干极地东风在此辐合上升", "D": "动力原因——气流在此辐散下沉"}, "answer": "C", "analysis": "副极地低压（60°附近）：中纬盛行西风与极地东风在此相遇（极锋），暖空气爬升到冷空气上方，形成动力原因的低压，多锋面雨。故选C。", "key_rule": "副极地低压=动力成因（气流辐合上升）；极地高压=热力成因（气温低气流下沉）", "trap": "混淆动力与热力成因；极地高压才是热力成因"}, {"id": "Q-ZR006-006", "linked_node": "GEO-ZR-006", "topic": "气压带数量与位置", "type": "单选", "difficulty": "低", "freq": "⭐⭐⭐", "stem": "全球共有气压带__个，风带__个", "options": {"A": "5个气压带，4个风带", "B": "7个气压带，6个风带", "C": "6个气压带，6个风带", "D": "4个气压带，3个风带"}, "answer": "B", "analysis": "全球有7个气压带：1赤道低压+2副热带高压+2副极地低压+2极地高压=7个；6个风带：2低纬信风带+2中纬盛行西风带+2高纬极地东风带=6个。故选B。", "key_rule": "7气压带（对称分布，赤道1+南北各3）；6风带（南北各3）", "trap": "只记住北半球的3个气压带3个风带，忘记南半球对称"}, {"id": "Q-ZR007-001", "linked_node": "GEO-ZR-007", "topic": "气候类型判断", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "某地最热月均温28℃，最冷月均温16℃，全年降水约1800mm且分配均匀，该地气候类型为", "options": {"A": "亚热带季风气候", "B": "热带雨林气候", "C": "热带季风气候", "D": "温带海洋性气候"}, "answer": "B", "analysis": "①最冷月16℃>15℃→热带气候；②全年降水均匀、量大（1800mm）→热带雨林气候（无干湿季）。热带季风气候有明显干雨季之分。故选B。", "key_rule": "两步法：①最冷月>15°→热带；②降水均匀高→雨林；有旱雨季→季风或草原", "trap": "混淆热带雨林（均匀多雨）与热带季风（旱雨季分明）"}, {"id": "Q-ZR007-002", "linked_node": "GEO-ZR-007", "topic": "气候类型判断", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "某地7月均温20℃，1月均温8℃，降水主要集中在冬季（1月最多），夏季少雨，年降水约600mm，该地气候类型为", "options": {"A": "温带季风气候", "B": "地中海气候", "C": "温带海洋性气候", "D": "亚热带季风气候"}, "answer": "B", "analysis": "①最冷月8℃（0~15°之间）→亚热带气候；②降水集中冬季，夏干冬湿→地中海气候。温带海洋气候全年均匀；亚热带季风气候夏多冬少。故选B。", "key_rule": "地中海气候：冬雨夏干，最冷月0-15℃，分布在30-40°大陆西岸", "trap": "看到'冬温'就想到海洋性气候，忽视降水的夏干冬湿特征"}, {"id": "Q-ZR007-003", "linked_node": "GEO-ZR-007", "topic": "气候成因", "type": "单选", "difficulty": "中高", "freq": "⭐⭐⭐", "stem": "温带海洋性气候与温带季风气候相比，其特点是", "options": {"A": "冬冷夏热，年降水更少", "B": "全年温和湿润，降水均匀", "C": "夏热多雨，冬寒干燥", "D": "冬温夏凉，仅冬季多雨"}, "answer": "B", "analysis": "温带海洋性气候：常年受盛行西风带影响，海洋调节→冬温夏凉，全年降水均匀，年较差小。温带季风：夏热多雨冬寒少雪，年较差大。故选B。", "key_rule": "海洋性气候：全年西风→均匀湿润，年较差小；季风气候：季节风向变化→干湿分明", "trap": "把海洋性气候理解为'冬多雨'（地中海才是冬多雨）"}, {"id": "Q-ZR007-004", "linked_node": "GEO-ZR-007", "topic": "气候分布规律", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "地中海气候分布在", "options": {"A": "南北纬10°-20°大陆西岸", "B": "南北纬30°-40°大陆西岸", "C": "南北纬40°-60°大陆西岸", "D": "南北纬20°-30°大陆东岸"}, "answer": "B", "analysis": "地中海气候：30°-40°大陆西岸；夏季受副热带高压控制（干热），冬季受盛行西风带控制（温湿）。故选B。", "key_rule": "记住：30-40°大陆西岸=地中海气候；40-60°大陆西岸=温带海洋性", "trap": "把地中海气候（30-40°）与热带沙漠气候（20-30°）的纬度搞混"}, {"id": "Q-ZR007-005", "linked_node": "GEO-ZR-007", "topic": "季风气候对比", "type": "单选", "difficulty": "中高", "freq": "⭐⭐⭐", "stem": "东亚季风和南亚季风的主要成因相比，最大区别是", "options": {"A": "东亚季风主要由海陆热力差异引起，南亚季风由气压带风带移动引起", "B": "东亚季风由地形影响，南亚季风由海陆差异引起", "C": "两者成因完全相同", "D": "东亚冬季风比夏季风强，南亚相反"}, "answer": "A", "analysis": "东亚季风：海陆热力差异为主（亚洲大陆与太平洋）；南亚季风：除海陆热力差异外，气压带风带季节移动（南半球东南信风越过赤道偏转为西南风）影响更大。故选A。", "key_rule": "东亚=海陆热力差异主导；南亚=气压带风带移动+海陆差异", "trap": "认为两种季风成因完全相同"}, {"id": "Q-ZR007-006", "linked_node": "GEO-ZR-007", "topic": "气候类型与自然带", "type": "单选", "difficulty": "低", "freq": "⭐⭐⭐", "stem": "热带雨林气候对应的自然带是", "options": {"A": "热带草原带", "B": "热带荒漠带", "C": "热带雨林带", "D": "亚热带常绿阔叶林带"}, "answer": "C", "analysis": "气候类型与自然带一一对应：热带雨林气候→热带雨林带。故选C。", "key_rule": "气候决定自然带：气候名称与自然带名称基本对应", "trap": "把热带雨林气候对应热带草原带（后者对应热带草原气候）"}, {"id": "Q-ZR007-007", "linked_node": "GEO-ZR-007", "topic": "气候类型综合判断", "type": "单选", "difficulty": "高", "freq": "⭐⭐⭐", "stem": "下列四种气候类型中，降水量最少的是", "options": {"A": "热带草原气候（约1000mm）", "B": "地中海气候（约600mm）", "C": "热带沙漠气候（约25mm）", "D": "温带大陆性气候（约250mm）"}, "answer": "C", "analysis": "热带沙漠气候常年受副热带高压和信风控制，气流下沉，极端干旱，年降水通常不足25mm（撒哈拉部分地区甚至接近0）。故选C。", "key_rule": "最干旱气候：热带沙漠气候（副高+信风=持续下沉气流）", "trap": "把温带大陆性气候当最干旱（实际热带沙漠更干）"}, {"id": "Q-ZR008-001", "linked_node": "GEO-ZR-008", "topic": "冷锋天气特征", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "冷锋过境时的天气特征是", "options": {"A": "持续性降水，气温升高", "B": "大风、降温、降雨（雪），气压升高", "C": "天气晴好，气温升高", "D": "持续阴雨，气温缓慢升高"}, "answer": "B", "analysis": "冷锋过境时：冷气团推进→气温骤降；强烈气流→大风；冷暖空气交汇→云层增厚降水；气压升高（冷气团密度大）。故选B。", "key_rule": "冷锋过境：大风降温降水（雨/雪在锋后）；暖锋过境：连续性降水（雨在锋前）", "trap": "把冷锋降水说成'连续性降水'（应为短时强降水）"}, {"id": "Q-ZR008-002", "linked_node": "GEO-ZR-008", "topic": "锋面降水位置", "type": "单选", "difficulty": "中高", "freq": "⭐⭐⭐", "stem": "关于冷暖锋降水位置，下列说法正确的是", "options": {"A": "冷锋和暖锋降水都在锋前", "B": "冷锋降水在锋后，暖锋降水在锋前", "C": "冷锋降水在锋前，暖锋降水在锋后", "D": "冷锋和暖锋降水都在锋后"}, "answer": "B", "analysis": "冷锋：冷气团推进，暖气团被迫抬升，雨区主要在冷锋锋后（冷气团一侧）。暖锋：暖气团沿冷气团徐徐爬升，雨区主要在暖锋锋前（冷气团一侧）。故选B。", "key_rule": "冷锋雨在锋后；暖锋雨在锋前（均在冷气团一侧）", "trap": "混淆冷暖锋雨区位置（高频易错点）"}, {"id": "Q-ZR008-003", "linked_node": "GEO-ZR-008", "topic": "气旋天气", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "北半球气旋（低压）中心附近的天气特征是", "options": {"A": "气流辐散下沉，天气晴朗", "B": "气流辐合上升，多阴雨天气", "C": "气流辐合下沉，天气晴朗", "D": "气流辐散上升，多大风天气"}, "answer": "B", "analysis": "气旋（低压）：四周气流向中心辐合→中心气流上升→冷却凝结→多阴雨天气。北半球气旋：逆时针辐合。故选B。", "key_rule": "低压（气旋）=辐合上升=阴雨；高压（反气旋）=辐散下沉=晴好", "trap": "混淆气旋和反气旋的气流方向与天气"}, {"id": "Q-ZR008-004", "linked_node": "GEO-ZR-008", "topic": "反气旋天气", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "下列天气现象与反气旋（高压）有关的是", "options": {"A": "长江中下游梅雨季节阴雨绵绵", "B": "秋高气爽的晴好天气", "C": "冬季寒潮爆发南下", "D": "夏季台风登陆强降水"}, "answer": "B", "analysis": "反气旋（高压）控制→气流下沉→天气晴朗→秋高气爽（秋季长江中下游受高压控制）。梅雨=准静止锋；寒潮=冷锋；台风=热带气旋（低压）。故选B。", "key_rule": "秋高气爽/伏旱=高压（反气旋）控制；梅雨=准静止锋；台风=气旋", "trap": "把梅雨和伏旱的天气系统混淆（梅雨=锋面，伏旱=高压）"}, {"id": "Q-ZR008-005", "linked_node": "GEO-ZR-008", "topic": "锋面判断", "type": "单选", "difficulty": "中高", "freq": "⭐⭐⭐", "stem": "某地一天内气温先升高后骤降，并伴随大风降雨，之后天气转晴，气温较低，这说明经过该地的是", "options": {"A": "暖锋", "B": "冷锋", "C": "气旋", "D": "反气旋"}, "answer": "B", "analysis": "过境前（冷锋未到）：暖气团控制→气温较高晴好；过境时：大风降温降雨；过境后：冷气团控制→晴朗气温低。这正是冷锋过境的完整天气变化。故选B。", "key_rule": "冷锋三段式：晴暖→大风降温降水→晴冷", "trap": "把暖锋和冷锋的天气序列搞混"}, {"id": "Q-ZR008-006", "linked_node": "GEO-ZR-008", "topic": "准静止锋", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "每年6月前后，长江中下游地区出现的梅雨天气，其主要原因是", "options": {"A": "受台风影响，带来大量降水", "B": "冷暖气团势力相当，形成准静止锋，长期滞留", "C": "受气旋影响，持续阴雨", "D": "西南季风带来大量水汽"}, "answer": "B", "analysis": "梅雨：6月北方冷气团势力与南方暖湿气团势力相当，锋面在长江中下游徘徊→准静止锋→持续连绵阴雨（梅雨季）。7月后暖气团增强，锋面北移，梅雨结束进入伏旱。故选B。", "key_rule": "梅雨=准静止锋（冷暖气团势均力敌，锋面摆动）；伏旱=副热带高压控制", "trap": "把梅雨归因于台风或西南季风（台风是秋季灾害性天气）"}, {"id": "Q-ZR009-001", "linked_node": "GEO-ZR-009", "topic": "大洋环流规律", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "北太平洋大洋环流的方向为", "options": {"A": "逆时针方向", "B": "顺时针方向", "C": "随季节变化", "D": "由赤道向两极"}, "answer": "B", "analysis": "北半球大洋环流呈顺时针方向（受北半球大气环流和地转偏向力影响）；南半球呈逆时针。北太平洋：北赤道暖流→黑潮（日本暖流）→北太平洋暖流→加利福尼亚寒流→北赤道暖流。故选B。", "key_rule": "北半球：顺时针；南半球：逆时针（看手心）", "trap": "把北半球洋流（顺时针）与气旋（逆时针）搞混"}, {"id": "Q-ZR009-002", "linked_node": "GEO-ZR-009", "topic": "渔场成因", "type": "单选", "difficulty": "中高", "freq": "⭐⭐⭐", "stem": "北海道渔场形成的主要原因是", "options": {"A": "位于赤道附近，光热充足", "B": "日本暖流与千岛寒流交汇，营养盐类上涌", "C": "受上升补偿流影响，深层营养盐丰富", "D": "北极融冰带来丰富有机物"}, "answer": "B", "analysis": "北海道渔场：日本暖流（来自赤道）与千岛寒流（来自北极）在日本北海道附近交汇→寒暖流交汇使海水搅动→深层营养盐类上涌→浮游生物大量繁殖→鱼类饵料丰富。故选B。", "key_rule": "四大渔场：北海道/纽芬兰/北海=寒暖流交汇；秘鲁=上升补偿流", "trap": "把北海道渔场与秘鲁渔场的成因混淆（上升流vs交汇）"}, {"id": "Q-ZR009-003", "linked_node": "GEO-ZR-009", "topic": "洋流对气候影响", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "北大西洋暖流对西欧气候的影响主要是", "options": {"A": "降温减湿，使西欧气候更寒冷干燥", "B": "增温增湿，使西欧冬季温和湿润", "C": "带来大量降水，形成热带雨林气候", "D": "影响不大，西欧气候主要受大陆影响"}, "answer": "B", "analysis": "北大西洋暖流沿西欧海岸北上，使大气增温增湿；配合盛行西风将热量水分输送到陆地→西欧冬季异常温和（伦敦冬季气温比同纬度内陆高10°以上）→形成温带海洋性气候。故选B。", "key_rule": "暖流→增温增湿（大陆西岸）；寒流→降温减湿（大陆西岸）", "trap": "忽视洋流与大气环流的协同作用（洋流+盛行西风=温带海洋性气候）"}, {"id": "Q-ZR009-004", "linked_node": "GEO-ZR-009", "topic": "寒流对气候影响", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "秘鲁寒流（秘鲁沿岸上升流）对秘鲁沿岸气候的影响是", "options": {"A": "增温增湿，形成热带雨林气候", "B": "降温减湿，形成热带沙漠气候", "C": "使气温升高，降水增多", "D": "形成温带海洋性气候"}, "answer": "B", "analysis": "秘鲁沿岸（南美太平洋东岸）：秘鲁寒流（上升流）→降温减湿→加剧干旱→与副高共同作用→形成热带沙漠气候（阿塔卡马沙漠，世界最干旱地区之一）。故选B。", "key_rule": "大陆西岸低纬：寒流+副高→超级干旱沙漠（澳大利亚西部/非洲西部/南美西部）", "trap": "认为低纬沿海一定是热带雨林气候（寒流可使同纬度出现沙漠）"}, {"id": "Q-ZR009-005", "linked_node": "GEO-ZR-009", "topic": "洋流与航行", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "从中国上海驶往美国旧金山的轮船，为了节省燃料顺流航行，最佳路线应", "options": {"A": "沿北太平洋暖流向东航行", "B": "沿日本暖流向北，再沿北太平洋暖流向东", "C": "沿加利福尼亚寒流向南", "D": "直线航行穿越赤道无风带"}, "answer": "B", "analysis": "上海→旧金山：需向东横渡北太平洋。顺洋流路线：日本暖流（北上）→北太平洋暖流（向东）→到达北美洲西海岸旧金山。故选B。", "key_rule": "顺流=顺着洋流流向航行；北太平洋环流顺时针：黑潮→北太平洋暖流→加州寒流→北赤道暖流", "trap": "选加利福尼亚寒流（该洋流从北向南，是返程顺流方向）"}, {"id": "Q-ZR009-006", "linked_node": "GEO-ZR-009", "topic": "北印度洋洋流", "type": "单选", "difficulty": "中高", "freq": "⭐⭐⭐", "stem": "北印度洋洋流的特殊性在于", "options": {"A": "常年顺时针方向流动", "B": "常年逆时针方向流动", "C": "随季风变化：夏顺时针，冬逆时针", "D": "随季风变化：夏逆时针，冬顺时针"}, "answer": "C", "analysis": "北印度洋位于亚洲季风区，洋流受季风驱动：夏季西南季风→洋流向东，呈顺时针；冬季东北季风→洋流向西，呈逆时针。故选C。", "key_rule": "北印度洋：季风洋流，夏顺（西南季风）冬逆（东北季风）", "trap": "认为北印度洋和其他大洋一样常年方向不变"}, {"id": "Q-ZR016-001", "linked_node": "GEO-ZR-016", "topic": "大气直接热源", "type": "单选", "difficulty": "低", "freq": "⭐⭐⭐", "stem": "大气对流层的直接热源是", "options": {"A": "太阳辐射", "B": "地面辐射", "C": "大气逆辐射", "D": "太阳活动"}, "answer": "B", "analysis": "太阳辐射到达地面，地面吸收后升温，以长波辐射形式向外发散（地面辐射），大气吸收地面长波辐射升温。所以地面是大气的直接热源，太阳是间接热源。故选B。", "key_rule": "太阳辐射→地面升温→地面辐射→大气吸收升温。地面=直接热源", "trap": "把太阳辐射当作大气的直接热源（太阳辐射大部分穿透大气直接到达地面）"}, {"id": "Q-ZR016-002", "linked_node": "GEO-ZR-016", "topic": "大气逆辐射应用", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "青藏高原与同纬度平原地区相比，气温低的主要原因是", "options": {"A": "海拔高，距太阳远，获得太阳辐射少", "B": "海拔高，大气稀薄，大气逆辐射弱，保温作用差", "C": "海拔高，风力大，散热快", "D": "冰川面积大，反射太阳辐射多"}, "answer": "B", "analysis": "青藏高原海拔高→大气稀薄→大气吸收地面辐射少→大气逆辐射弱→对地面保温作用弱→气温低。距太阳远（A）影响可忽略（地球大气层厚度相对地日距离可忽略）。故选B。", "key_rule": "大气稀薄→大气逆辐射弱→保温差→气温低（青藏高原低温原因）", "trap": "选A（距太阳远）——地球到太阳距离约1.5亿km，大气层高度仅数十km，差别可忽略"}, {"id": "Q-ZR016-003", "linked_node": "GEO-ZR-016", "topic": "晴阴天温差", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "与阴天相比，晴天的气温日较差（最高气温与最低气温之差）更大，原因是", "options": {"A": "晴天风力大，白天降温明显", "B": "晴天白天大气削弱少→气温高；夜晚大气逆辐射弱→气温低，日较差大", "C": "阴天云层吸收太阳辐射，白天气温反而更高", "D": "晴天蒸发强，夜晚气温升高"}, "answer": "B", "analysis": "晴天：①白天云少→大气削弱太阳辐射少→地面获热多→气温高；②夜晚云少→大气逆辐射弱→保温效果差→散热快→气温低。因此晴天昼夜温差大。故选B。", "key_rule": "晴天：白天热（削弱少）+夜晚冷（保温差）=日较差大；阴天相反", "trap": "只说'晴天白天热'，忘记说明夜晚冷的原因（逆辐射弱）"}, {"id": "Q-ZR016-004", "linked_node": "GEO-ZR-016", "topic": "温室效应原理", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "温室大棚增温保温的原理，与下列哪种自然现象最相似", "options": {"A": "太阳辐射对流层大气", "B": "大气逆辐射对地面的保温作用", "C": "地面辐射对大气的加热", "D": "大气散射使天空呈蓝色"}, "answer": "B", "analysis": "温室大棚：塑料薄膜可以透过短波辐射（太阳光进入），但阻止长波辐射（地面辐射）散出，类似大气逆辐射的保温效应。故选B。", "key_rule": "温室效应=大气逆辐射=对长波辐射的截留（保温）", "trap": "认为温室大棚原理是'让更多太阳辐射进入'（重点在于阻止长波辐射散出）"}, {"id": "Q-ZR016-005", "linked_node": "GEO-ZR-016", "topic": "大气削弱作用", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "晴朗的天空呈蓝色，主要是因为大气对太阳辐射的", "options": {"A": "反射作用（云层反射）", "B": "吸收作用（O₃吸收紫外线）", "C": "散射作用（空气分子散射蓝色光）", "D": "折射作用（大气折射使光变蓝）"}, "answer": "C", "analysis": "大气中空气分子和微小尘粒对太阳辐射中的蓝色光散射能力最强（波长短的光散射强），散射到四面八方，使天空呈蔚蓝色。故选C。", "key_rule": "大气散射：波长越短越容易被散射（蓝光>红光）→晴天天空蓝；日出日落天空红橙（蓝光已散射殆尽）", "trap": "把天空颜色归因于反射作用（反射是指云层、地面等大面积反射）"}, {"id": "Q-ZR017-001", "linked_node": "GEO-ZR-017", "topic": "热力环流原理", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "热力环流形成的根本原因是", "options": {"A": "地转偏向力", "B": "地表冷热不均", "C": "气压梯度力", "D": "地球自转"}, "answer": "B", "analysis": "热力环流形成链：地表冷热不均→气压差异→大气运动→热力环流。根本原因是地表受热不均匀（太阳辐射、地表性质等导致）。故选B。", "key_rule": "冷热不均→气压差→气流→环流，根本原因是冷热不均", "trap": "选气压梯度力（那是环流形成的直接原因，而非根本原因）"}, {"id": "Q-ZR017-002", "linked_node": "GEO-ZR-017", "topic": "海陆风方向", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "白天陆地与海洋之间的热力环流（海陆风），近地面风向为", "options": {"A": "由陆地吹向海洋（陆风）", "B": "由海洋吹向陆地（海风）", "C": "由低纬吹向高纬", "D": "随天气变化，无规律"}, "answer": "B", "analysis": "白天：陆地升温快→气温高→气压低；海洋升温慢→气压相对高。近地面气流从高压（海洋）流向低压（陆地）→海风。夜晚相反→陆风。故选B。", "key_rule": "白天陆热→低压→海风（海→陆）；夜晚海暖→低压→陆风（陆→海）", "trap": "把白天陆地气压说成高压（陆地温度高→气压低，不是高）"}, {"id": "Q-ZR017-003", "linked_node": "GEO-ZR-017", "topic": "城市热岛", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "城市热岛效应形成的主要原因是", "options": {"A": "城市人口多，呼吸产热增加", "B": "城市建筑密集，太阳辐射增强", "C": "城市下垫面热容量大，人类活动和废热排放使城市气温高于郊区", "D": "城市绿化少，植物蒸腾减少导致降温效果差"}, "answer": "C", "analysis": "城市热岛：城市建筑物和道路吸热多散热慢（热容量大）；人类生产生活排放大量废热；绿地减少削弱了蒸腾降温→城市气温高于郊区→热岛效应。综合原因最全面的是C。故选C。", "key_rule": "城市热岛
