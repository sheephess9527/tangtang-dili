  <style>
    .ring-wrap { display:flex;align-items:center;justify-content:center;gap:32px;flex-wrap:wrap;padding:20px 0; }
    .ring-chart { position:relative;width:140px;height:140px;flex-shrink:0; }
    .ring-chart canvas { position:absolute;top:0;left:0; }
    .ring-label { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center; }
    .ring-label .pct { font-size:1.6rem;font-weight:800;color:var(--primary); }
    .ring-label .sub { font-size:0.75rem;color:var(--text2); }
    .module-row { display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border); }
    .module-row:last-child { border-bottom:none; }
    .module-name { width:120px;font-weight:600;font-size:0.9rem;flex-shrink:0; }
    .module-bar-wrap { flex:1; }
    .module-bar { height:8px;background:var(--bg3);border-radius:4px;overflow:hidden; }
    .module-bar-fill { height:100%;border-radius:4px;transition:width .6s ease; }
    .module-count { width:60px;text-align:right;color:var(--text2);font-size:0.85rem;flex-shrink:0; }
    .stat-grid { display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px; }
    .mini-stat { background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center; }
    .mini-stat .num { font-size:1.6rem;font-weight:800; }
    .mini-stat .lbl { color:var(--text2);font-size:0.8rem;margin-top:4px; }
    .week-bar { display:flex;align-items:flex-end;gap:6px;height:80px;padding:0 4px; }
    .day-bar-wrap { flex:1;display:flex;flex-direction:column;align-items:center;gap:4px; }
    .day-bar { width:100%;background:var(--primary);border-radius:4px 4px 0 0;min-height:4px;transition:height .4s; }
    .day-label { font-size:0.7rem;color:var(--text2); }
    .wrong-node { padding:12px 0;border-bottom:1px solid var(--border); }
    .wrong-node:last-child { border-bottom:none; }
    .wrong-q { display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--bg3);margin:6px 0;cursor:pointer;transition:.2s; }
    .wrong-q:hover { border:1px solid var(--red); }
    @media(max-width:600px){ .stat-grid{grid-template-columns:repeat(2,1fr)} }
  </style>

度)，冬至高度最小→影子最长→楼间距最大", "trap": "用夏至（高度最大）计算，导致楼间距偏小，冬天有遮挡"}, {"id": "Q-ZR003-004", "linked_node": "GEO-ZR-003", "topic": "正午太阳高度变化规律", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "下列地点，夏至日正午太阳高度角最大的是", "options": {"A": "北极点（90°N）", "B": "北回归线（23.5°N）", "C": "赤道（0°）", "D": "北极圈（66.5°N）"}, "answer": "B", "analysis": "夏至日太阳直射北回归线（23.5°N），直射点所在纬度正午太阳高度最大=90°。故北回归线正午太阳高度=90°，是各选项中最大。故选B。", "key_rule": "太阳直射点所在纬度，正午太阳高度=90°（最大值）", "trap": "认为赤道全年高度最大，忽视太阳直射点位置的决定性影响"}, {"id": "Q-ZR003-005", "linked_node": "GEO-ZR-003", "topic": "直射点与正午高度关系", "type": "单选", "difficulty": "中高", "freq": "⭐⭐⭐", "stem": "某地正午太阳在正南方向，且正午太阳高度为90°，则该地可能位于", "options": {"A": "赤道以北的任意地点", "B": "北回归线与南回归线之间某纬线上", "C": "北回归线上", "D": "南极圈上"}, "answer": "B", "analysis": "正午太阳高度=90°说明该地就是太阳直射点所在纬度；正午太阳在正南方向说明直射点在该地以北，即该地位于直射点以南。直射点在南北回归线之间移动，且该地位于直射点以南，故该地在热带内（南北回归线之间），但不包括北回归线本身（那样正午阳光在头顶正上方，无南北之分）。故选B。", "key_rule": "正午太阳在正南→当地在直射点以南；H=90°→当地即为直射点", "trap": "混淆'正午太阳在正南'的含义"}, {"id": "Q-ZR003-006", "linked_node": "GEO-ZR-003", "topic": "正午太阳高度综合", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "下列四地中，正午太阳高度角随季节变化幅度最大的是", "options": {"A": "赤道", "B": "北回归线", "C": "北极圈", "D": "南极点"}, "answer": "C", "analysis": "北极圈（66.5°N）：夏至H=90°-|66.5°-23.5°|=47°；冬至H=90°-|66.5°-(-23.5°)|=0°。变化幅度=47°-0°=47°。赤道：夏至H=90°-23.5°=66.5°；冬至H=90°-23.5°=66.5°（南北各偏23.5°，对赤道变化为2×23.5°=47°）。北回归线：夏至90°，冬至90°-47°=43°，变化47°。各地变化幅度相同（热带外均为47°），但极圈最特殊：冬至太阳高度=0°（刚好极夜临界），故变化幅度最具代表性。综合考虑选C（北极圈有极昼极夜，实际变化最明显）。", "key_rule": "纬度越高，接近极点，正午高度变化极端（可至0°）", "trap": "以为赤道全年高度最稳定，实际赤道变化也有47°"}, {"id": "Q-ZR005-001", "linked_node": "GEO-ZR-005", "topic": "背斜向斜判断", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "某地地质剖面图中，中间岩层为志留纪（古），两侧为泥盆纪（较新），顶部已被侵蚀形成谷地，该地地质构造为", "options": {"A": "向斜山", "B": "背斜谷", "C": "向斜谷", "D": "背斜山"}, "answer": "B", "analysis": "中间老、两翼新→背斜；顶部被侵蚀成谷地→背斜谷。背斜顶部受张力，岩石破碎，易被侵蚀成谷地。故选B。", "key_rule": "背斜：中间老两翼新；顶部张力→易侵蚀→成谷", "trap": "混淆地质构造（背/向斜）与地貌形态（山/谷），两者可相反"}, {"id": "Q-ZR005-002", "linked_node": "GEO-ZR-005", "topic": "地质构造工程应用", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "在下列工程建设中，选址需避开断层的是", "options": {"A": "开采地下水", "B": "修建水库大坝", "C": "开采石油", "D": "开采天然气"}, "answer": "B", "analysis": "断层处岩层破碎，不能承重，且透水性强，修建水库大坝选在断层处会造成坝基不稳、漏水等严重问题，必须避开。地下水、油气则与断层关系不同。故选B。", "key_rule": "坝址、隧道、核电站均须避开断层；断层处找泉水可行", "trap": "误以为找地下水要避开断层（实际断层处往往有泉水出露）"}, {"id": "Q-ZR005-003", "linked_node": "GEO-ZR-005", "topic": "板块构造", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "喜马拉雅山脉的形成原因是", "options": {"A": "印度洋板块与太平洋板块碰撞", "B": "亚欧板块与非洲板块张裂", "C": "印度洋板块与亚欧板块碰撞挤压", "D": "太平洋板块俯冲到亚欧板块之下"}, "answer": "C", "analysis": "喜马拉雅山脉是印度洋板块向北俯冲碰撞亚欧板块，地壳挤压抬升形成的褶皱山系，属消亡边界。故选C。", "key_rule": "消亡边界：碰撞→山脉（陆陆碰撞）或海沟（陆洋碰撞）", "trap": "把太平洋板块与亚欧板块碰撞（形成日本列岛/台湾）和印度洋板块碰撞混淆"}, {"id": "Q-ZR005-004", "linked_node": "GEO-ZR-005", "topic": "地质构造工程应用", "type": "单选", "difficulty": "中高", "freq": "⭐⭐⭐", "stem": "某铁路需要穿越一座山岭，在地质勘探时发现有背斜和向斜构造，从工程安全和经济角度考虑，隧道应选在", "options": {"A": "向斜核部，因为岩层稳固", "B": "背斜核部，因为岩层稳固，且不易积水", "C": "断层处，因为岩石疏松易开凿", "D": "背斜翼部，因为岩层倾斜角度利于排水"}, "answer": "B", "analysis": "背斜核部：岩层向上拱起，受挤压力作用岩石坚硬不易坍塌；天然拱形结构稳固；地下水向两侧流，不易积水渗漏。向斜核部积水易坍塌；断层处岩石破碎危险。故选B。", "key_rule": "隧道选背斜：天然拱顶+岩石坚硬+不积水", "trap": "向斜槽部是储水构造，不适合隧道；断层绝对不选"}, {"id": "Q-ZR005-005", "linked_node": "GEO-ZR-005", "topic": "生长边界", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "东非大裂谷的形成原因是", "options": {"A": "亚欧板块与非洲板块碰撞", "B": "非洲板块内部张裂", "C": "印度洋板块与非洲板块碰撞", "D": "太平洋板块俯冲"}, "answer": "B", "analysis": "东非大裂谷是非洲板块内部（也有说与印度洋板块交界）张裂形成的地堑，属于生长边界。板块张裂→地壳下陷→裂谷/断陷盆地。故选B。", "key_rule": "生长边界：张裂→裂谷（陆地）/大洋中脊（海洋）", "trap": "把东非裂谷与喜马拉雅山同类型（实为相反：张裂vs碰撞）"}, {"id": "Q-ZR005-006", "linked_node": "GEO-ZR-005", "topic": "找矿原理", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "背斜是良好的储油构造，主要原因是", "options": {"A": "背斜处地形高，油气不易流失", "B": "背斜岩层向上拱起，油气密度小向上汇聚，被不透水岩层封盖", "C": "背斜处岩石破碎，储油空间大", "D": "背斜处温度高，有利于油气生成"}, "answer": "B", "analysis": "背斜岩层向上拱起，形成天然穹窿；油气密度比水小，会向上汇聚到背斜顶部；上方不透水岩层（盖层）封堵，使油气不能逸散，形成良好储油构造。故选B。", "key_rule": "储油=背斜（上拱封盖）；储水=向斜（下凹汇水）", "trap": "背斜顶部岩石虽受张力破碎（有利地下水渗漏），但对油气是圈闭构造"}, {"id": "Q-ZR006-001", "linked_node": "GEO-ZR-006", "topic": "气压带成因", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "副热带高气压带的成因属于", "options": {"A": "热力原因，气温高气压低", "B": "热力原因，气温低气压高", "C": "动力原因，气流下沉堆积", "D": "动力原因，气流辐合上升"}, "answer": "C", "analysis": "副热带高压是由赤道上升气流在高空向两极流动，在副热带（约30°）因地转偏向力影响转为西风，气流在此堆积下沉，形成动力原因的高压。故选C。", "key_rule": "赤道低压=热力（受热上升）；副热带高压=动力（气流堆积下沉）", "trap": "认为副热带气温高→低压（忽视是动力成因高压）"}, {"id": "Q-ZR006-002", "linked_node": "GEO-ZR-006", "topic": "气压带风带季节移动", "type": "单选", "difficulty": "中高", "freq": "⭐⭐⭐", "stem": "北半球夏季时，气压带和风带的位置与全年平均位置相比", "options": {"A": "偏南移动约5-10个纬度", "B": "偏北移动约5-10个纬度", "C": "不发生移动", "D": "偏北移动约23.5个纬度"}, "answer": "B", "analysis": "气压带风带随太阳直射点移动而移动，北半球夏季太阳直射点在北半球，气压带风带整体北移约5-10个纬度。故选B。", "key_rule": "夏北移、冬南移，移动幅度约5-10°（小于黄赤交角23.5°）", "trap": "以为移动幅度=黄赤交角23.5°（实际约5-10°）"}, {"id": "Q-ZR006-003", "linked_node": "GEO-ZR-006", "topic": "气压带风带与降水", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "常年受副热带高气压带控制的地区，其气候特点是", "options": {"A": "全年高温多雨", "B": "全年炎热干燥", "C": "冬雨夏干", "D": "夏雨冬干"}, "answer": "B", "analysis": "副热带高压控制→气流下沉→干燥少雨；位置在20-30°之间→气温较高→形成热带沙漠气候，全年炎热干燥。故选B。", "key_rule": "高压控制=下沉=少雨；低压控制=上升=多雨", "trap": "混淆副热带高压（干热）与赤道低压（湿热）"}, {"id": "Q-ZR006-004", "linked_node": "GEO-ZR-006", "topic": "盛行风带", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "北半球中纬度地区盛行风向为", "options": {"A": "东北风（极地东风带）", "B": "西南风（盛行西风带）", "C": "东南风（信风带）", "D": "西北风（极地西风）"}, "answer": "B", "analysis": "北半球中纬度（30°-60°）位于盛行西风带，气流从副热带高压向副极地低压流动，受地转偏向力（北半球向右偏），形成西南风。故选B。", "key_rule": "北半球盛行西风=西南风；南半球盛行西风=西北风", "trap": "记住风向需加上地转偏向力（北右南左）导致的偏转"}, {"id": "Q-ZR006-005", "linked_node": "GEO-ZR-006", "topic": "三圈环流气流方向", "type": "单选", "difficulty": "中高", "freq": "⭐⭐⭐", "stem": "在三圈环流中，副极地低气压带的成因属于", "options": {"A": "热力原因——气温低，气压高", "B": "热力原因——气温高，气压低", "C": "动力原因——暖湿西风与冷干极地东风在此辐合上升", "D": "动力原因——气流在此辐散下沉"}, "answer": "C", "analysis": "副极地低压（60°附近）：中纬盛行西风与极地东风在此相遇（极锋），暖空气爬升到冷空气上方，形成动力原因的低压，多锋面雨。故选C。", "key_rule": "副极地低压=动力成因（气流辐合上升）；极地高压=热力成因（气温低气流下沉）", "trap": "混淆动力与热力成因；极地高压才是热力成因"}, {"id": "Q-ZR006-006", "linked_node": "GEO-ZR-006", "topic": "气压带数量与位置", "type": "单选", "difficulty": "低", "freq": "⭐⭐⭐", "stem": "全球共有气压带__个，风带__个", "options": {"A": "5个气压带，4个风带", "B": "7个气压带，6个风带", "C": "6个气压带，6个风带", "D": "4个气压带，3个风带"}, "answer": "B", "analysis": "全球有7个气压带：1赤道低压+2副热带高压+2副极地低压+2极地高压=7个；6个风带：2低纬信风带+2中纬盛行西风带+2高纬极地东风带=6个。故选B。", "key_rule": "7气压带（对称分布，赤道1+南北各3）；6风带（南北各3）", "trap": "只记住北半球的3个气压带3个风带，忘记南半球对称"}, {"id": "Q-ZR007-001", "linked_node": "GEO-ZR-007", "topic": "气候类型判断", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "某地最热月均温28℃，最冷月均温16℃，全年降水约1800mm且分配均匀，该地气候类型为", "options": {"A": "亚热带季风气候", "B": "热带雨林气候", "C": "热带季风气候", "D": "温带海洋性气候"}, "answer": "B", "analysis": "①最冷月16℃>15℃→热带气候；②全年降水均匀、量大（1800mm）→热带雨林气候（无干湿季）。热带季风气候有明显干雨季之分。故选B。", "key_rule": "两步法：①最冷月>15°→热带；②降水均匀高→雨林；有旱雨季→季风或草原", "trap": "混淆热带雨林（均匀多雨）与热带季风（旱雨季分明）"}, {"id": "Q-ZR007-002", "linked_node": "GEO-ZR-007", "topic": "气候类型判断", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "某地7月均温20℃，1月均温8℃，降水主要集中在冬季（1月最多），夏季少雨，年降水约600mm，该地气候类型为", "options": {"A": "温带季风气候", "B": "地中海气候", "C": "温带海洋性气候", "D": "亚热带季风气候"}, "answer": "B", "analysis": "①最冷月8℃（0~15°之间）→亚热带气候；②降水集中冬季，夏干冬湿→地中海气候。温带海洋气候全年均匀；亚热带季风气候夏多冬少。故选B。", "key_rule": "地中海气候：冬雨夏干，最冷月0-15℃，分布在30-40°大陆西岸", "trap": "看到'冬温'就想到海洋性气候，忽视降水的夏干冬湿特征"}, {"id": "Q-ZR007-003", "linked_node": "GEO-ZR-007", "topic": "气候成因", "type": "单选", "difficulty": "中高", "freq": "⭐⭐⭐", "stem": "温带海洋性气候与温带季风气候相比，其特点是", "options": {"A": "冬冷夏热，年降水更少", "B": "全年温和湿润，降水均匀", "C": "夏热多雨，冬寒干燥", "D": "冬温夏凉，仅冬季多雨"}, "answer": "B", "analysis": "温带海洋性气候：常年受盛行西风带影响，海洋调节→冬温夏凉，全年降水均匀，年较差小。温带季风：夏热多雨冬寒少雪，年较差大。故选B。", "key_rule": "海洋性气候：全年西风→均匀湿润，年较差小；季风气候：季节风向变化→干湿分明", "trap": "把海洋性气候理解为'冬多雨'（地中海才是冬多雨）"}, {"id": "Q-ZR007-004", "linked_node": "GEO-ZR-007", "topic": "气候分布规律", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "地中海气候分布在", "options": {"A": "南北纬10°-20°大陆西岸", "B": "南北纬30°-40°大陆西岸", "C": "南北纬40°-60°大陆西岸", "D": "南北纬20°-30°大陆东岸"}, "answer": "B", "analysis": "地中海气候：30°-40°大陆西岸；夏季受副热带高压控制（干热），冬季受盛行西风带控制（温湿）。故选B。", "key_rule": "记住：30-40°大陆西岸=地中海气候；40-60°大陆西岸=温带海洋性", "trap": "把地中海气候（30-40°）与热带沙漠气候（20-30°）的纬度搞混"}, {"id": "Q-ZR007-005", "linked_node": "GEO-ZR-007", "topic": "季风气候对比", "type": "单选", "difficulty": "中高", "freq": "⭐⭐⭐", "stem": "东亚季风和南亚季风的主要成因相比，最大区别是", "options": {"A": "东亚季风主要由海陆热力差异引起，南亚季风由气压带风带移动引起", "B": "东亚季风由地形影响，南亚季风由海陆差异引起", "C": "两者成因完全相同", "D": "东亚冬季风比夏季风强，南亚相反"}, "answer": "A", "analysis": "东亚季风：海陆热力差异为主（亚洲大陆与太平洋）；南亚季风：除海陆热力差异外，气压带风带季节移动（南半球东南信风越过赤道偏转为西南风）影响更大。故选A。", "key_rule": "东亚=海陆热力差异主导；南亚=气压带风带移动+海陆差异", "trap": "认为两种季风成因完全相同"}, {"id": "Q-ZR007-006", "linked_node": "GEO-ZR-007", "topic": "气候类型与自然带", "type": "单选", "difficulty": "低", "freq": "⭐⭐⭐", "stem": "热带雨林气候对应的自然带是", "options": {"A": "热带草原带", "B": "热带荒漠带", "C": "热带雨林带", "D": "亚热带常绿阔叶林带"}, "answer": "C", "analysis": "气候类型与自然带一一对应：热带雨林气候→热带雨林带。故选C。", "key_rule": "气候决定自然带：气候名称与自然带名称基本对应", "trap": "把热带雨林气候对应热带草原带（后者对应热带草原气候）"}, {"id": "Q-ZR007-007", "linked_node": "GEO-ZR-007", "topic": "气候类型综合判断", "type": "单选", "difficulty": "高", "freq": "⭐⭐⭐", "stem": "下列四种气候类型中，降水量最少的是", "options": {"A": "热带草原气候（约1000mm）", "B": "地中海气候（约600mm）", "C": "热带沙漠气候（约25mm）", "D": "温带大陆性气候（约250mm）"}, "answer": "C", "analysis": "热带沙漠气候常年受副热带高压和信风控制，气流下沉，极端干旱，年降水通常不足25mm（撒哈拉部分地区甚至接近0）。故选C。", "key_rule": "最干旱气候：热带沙漠气候（副高+信风=持续下沉气流）", "trap": "把温带大陆性气候当最干旱（实际热带沙漠更干）"}, {"id": "Q-ZR008-001", "linked_node": "GEO-ZR-008", "topic": "冷锋天气特征", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "冷锋过境时的天气特征是", "options": {"A": "持续性降水，气温升高", "B": "大风、降温、降雨（雪），气压升高", "C": "天气晴好，气温升高", "D": "持续阴雨，气温缓慢升高"}, "answer": "B", "analysis": "冷锋过境时：冷气团推进→气温骤降；强烈气流→大风；冷暖空气交汇→云层增厚降水；气压升高（冷气团密度大）。故选B。", "key_rule": "冷锋过境：大风降温降水（雨/雪在锋后）；暖锋过境：连续性降水（雨在锋前）", "trap": "把冷锋降水说成'连续性降水'（应为短时强降水）"}, {"id": "Q-ZR008-002", "linked_node": "GEO-ZR-008", "topic": "锋面降水位置", "type": "单选", "difficulty": "中高", "freq": "⭐⭐⭐", "stem": "关于冷暖锋降水位置，下列说法正确的是", "options": {"A": "冷锋和暖锋降水都在锋前", "B": "冷锋降水在锋后，暖锋降水在锋前", "C": "冷锋降水在锋前，暖锋降水在锋后", "D": "冷锋和暖锋降水都在锋后"}, "answer": "B", "analysis": "冷锋：冷气团推进，暖气团被迫抬升，雨区主要在冷锋锋后（冷气团一侧）。暖锋：暖气团沿冷气团徐徐爬升，雨区主要在暖锋锋前（冷气团一侧）。故选B。", "key_rule": "冷锋雨在锋后；暖锋雨在锋前（均在冷气团一侧）", "trap": "混淆冷暖锋雨区位置（高频易错点）"}, {"id": "Q-ZR008-003", "linked_node": "GEO-ZR-008", "topic": "气旋天气", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "北半球气旋（低压）中心附近的天气特征是", "options": {"A": "气流辐散下沉，天气晴朗", "B": "气流辐合上升，多阴雨天气", "C": "气流辐合下沉，天气晴朗", "D": "气流辐散上升，多大风天气"}, "answer": "B", "analysis": "气旋（低压）：四周气流向中心辐合→中心气流上升→冷却凝结→多阴雨天气。北半球气旋：逆时针辐合。故选B。", "key_rule": "低压（气旋）=辐合上升=阴雨；高压（反气旋）=辐散下沉=晴好", "trap": "混淆气旋和反气旋的气流方向与天气"}, {"id": "Q-ZR008-004", "linked_node": "GEO-ZR-008", "topic": "反气旋天气", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "下列天气现象与反气旋（高压）有关的是", "options": {"A": "长江中下游梅雨季节阴雨绵绵", "B": "秋高气爽的晴好天气", "C": "冬季寒潮爆发南下", "D": "夏季台风登陆强降水"}, "answer": "B", "analysis": "反气旋（高压）控制→气流下沉→天气晴朗→秋高气爽（秋季长江中下游受高压控制）。梅雨=准静止锋；寒潮=冷锋；台风=热带气旋（低压）。故选B。", "key_rule": "秋高气爽/伏旱=高压（反气旋）控制；梅雨=准静止锋；台风=气旋", "trap": "把梅雨和伏旱的天气系统混淆（梅雨=锋面，伏旱=高压）"}, {"id": "Q-ZR008-005", "linked_node": "GEO-ZR-008", "topic": "锋面判断", "type": "单选", "difficulty": "中高", "freq": "⭐⭐⭐", "stem": "某地一天内气温先升高后骤降，并伴随大风降雨，之后天气转晴，气温较低，这说明经过该地的是", "options": {"A": "暖锋", "B": "冷锋", "C": "气旋", "D": "反气旋"}, "answer": "B", "analysis": "过境前（冷锋未到）：暖气团控制→气温较高晴好；过境时：大风降温降雨；过境后：冷气团控制→晴朗气温低。这正是冷锋过境的完整天气变化。故选B。", "key_rule": "冷锋三段式：晴暖→大风降温降水→晴冷", "trap": "把暖锋和冷锋的天气序列搞混"}, {"id": "Q-ZR008-006", "linked_node": "GEO-ZR-008", "topic": "准静止锋", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "每年6月前后，长江中下游地区出现的梅雨天气，其主要原因是", "options": {"A": "受台风影响，带来大量降水", "B": "冷暖气团势力相当，形成准静止锋，长期滞留", "C": "受气旋影响，持续阴雨", "D": "西南季风带来大量水汽"}, "answer": "B", "analysis": "梅雨：6月北方冷气团势力与南方暖湿气团势力相当，锋面在长江中下游徘徊→准静止锋→持续连绵阴雨（梅雨季）。7月后暖气团增强，锋面北移，梅雨结束进入伏旱。故选B。", "key_rule": "梅雨=准静止锋（冷暖气团势均力敌，锋面摆动）；伏旱=副热带高压控制", "trap": "把梅雨归因于台风或西南季风（台风是秋季灾害性天气）"}, {  "answer": "B", "analysis": "上海→旧金山：需向东横渡北太平洋。顺洋流路线：日本暖流（北上）→北太平洋暖流（向东）→到达北美洲西海岸旧金山。故选B。", "key_rule": "顺流=顺着洋流流向航行；北太平洋环流顺时针：黑潮→北太平洋暖流→加州寒流→北赤道暖流", "trap": "选加利福尼亚寒流（该洋流从北向南，是返程顺流方向）"}, {"id": "Q-ZR009-006", "linked_node": "GEO-ZR-009", "topic": "北印度洋洋流", "type": "单选", "difficulty": "中高", "freq": "⭐⭐⭐", "stem": "北印度洋洋流的特殊性在于", "options": {"A": "常年顺时针方向流动", "B": "常年逆时针方向流动", "C": "随季风变化：夏顺时针，冬逆时针", "D": "随季风变化：夏逆时针，冬顺时针"}, "answer": "C", "analysis": "北印度洋位于亚洲季风区，洋流受季风驱动：夏季西南季风→洋流向东，呈顺时针；冬季东北季风→洋流向西，呈逆时针。故选C。", "key_rule": "北印度洋：季风洋流，夏顺（西南季风）冬逆（东北季风）", "trap": "认为北印度洋和其他大洋一样常年方向不变"}, {"id": "Q-ZR016-001", "linked_node": "GEO-ZR-016", "topic": "大气直接热源", "type": "单选", "difficulty": "低", "freq": "⭐⭐⭐", "stem": "大气对流层的直接热源是", "options": {"A": "太阳辐射", "B": "地面辐射", "C": "大气逆辐射", "D": "太阳活动"}, "answer": "B", "analysis": "太阳辐射到达地面，地面吸收后升温，以长波辐射形式向外发散（地面辐射），大气吸收地面长波辐射升温。所以地面是大气的直接热源，太阳是间接热源。故选B。", "key_rule": "太阳辐射→地面升温→地面辐射→大气吸收升温。地面=直接热源", "trap": "把太阳辐射当作大气的直接热源（太阳辐射大部分穿透大气直接到达地面）"}, {"id": "Q-ZR016-002", "linked_node": "GEO-ZR-016", "topic": "大气逆辐射应用", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "青藏高原与同纬度平原地区相比，气温低的主要原因是", "options": {"A": "海拔高，距太阳远，获得太阳辐射少", "B": "海拔高，大气稀薄，大气逆辐射弱，保温作用差", "C": "海拔高，风力大，散热快", "D": "冰川面积大，反射太阳辐射多"}, "answer": "B", "analysis": "青藏高原海拔高→大气稀薄→大气吸收地面辐射少→大气逆辐射弱→对地面保温作用弱→气温低。距太阳远（A）影响可忽略（地球大气层厚度相对地日距离可忽略）。故选B。", "key_rule": "大气稀薄→大气逆辐射弱→保温差→气温低（青藏高原低温原因）", "trap": "选A（距太阳远）——地球到太阳距离约1.5亿km，大气层高度仅数十km，差别可忽略"}, {"id": "Q-ZR016-003", "linked_node": "GEO-ZR-016", "topic": "晴阴天温差", "type": "单选", "difficulty": "中", "freq": "⭐⭐⭐", "stem": "与阴天相比，晴天的气温日较差（最高气温与最低气温之差）更大，原因是", "options": {"A": "晴天风力大，白天降温明显", "B": "晴天白天大气削弱少→气温高；夜晚大气逆辐射弱→气温低，日较差大", "C": "阴天云层吸收太阳辐射，白天气温反而更高", "D": "晴天蒸发强，夜晚气温升高"}, "answer": "B", "analysis": "晴天：①白天云少→大气削弱太阳辐射少→地面获热多→气温高；②夜晚云少→大气逆辐射弱→保温效果差→散热快→气温低。因此晴天昼夜温差大。故选B。", "key_rule": "晴天：白天热（削弱少）+夜晚冷（保温差）=日较差大；阴天相反", "trap": "只说'晴天白天热'，忘记说明夜晚冷的原因（逆辐射弱）"}, {"id": "Q-ZR016-004", "linked_node": "GEO-ZR-016", "topic": "温室效 function getLearning()  { try{return JSON.parse(localStorage.getItem('geo_learning_records')||'{}')}catch{return {}} }
function getAnswers()   { try{return JSON.parse(localStorage.getItem('geo_answer_records')||'[]')}catch{return []} }
function getWrongBook() { try{return JSON.parse(localStorage.getItem('geo_wrong_book')||'{}')}catch{return {}} }
function getStudyTime() { try{return JSON.parse(localStorage.getItem('geo_study_time')||'{}')}catch{return {}} }

// ── 模块配置 ─────────────────────────────────────────
const MODULES = {
  ZR:{name:'自然地理',total:22,color:'#4f8ef7'},
  RW:{name:'人文地理',total:8,color:'#34c67a'},

// ── Tab 切换 ─────────────────────────────────────────
function showTab(id, btn) {
  ['overview','wrongbook','weak','history'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===id ? '' : 'none';
  });
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (id==='wrongbook') renderWrongBook();
  if (id==='weak')      renderWeak();
  if (id==='history')   renderHistory();
}

// ── 总览渲染 ─────────────────────────────────────────
function renderOverview() {
  const lr = getLearning();
  const ans = getAnswers();

  const mastered    = NODES.filter(n => lr[n.id]?.status==='mastered').length;
  const inProgress  = NODES.filter(n => lr[n.id]?.status==='in_progress').length;
  const totalAns    = ans.length;
  const correctAns  = ans.filter(a => a.isCorrect).length;
  const accuracy    = totalAns>0 ? Math.round(correctAns/totalAns*100) : 0;
  const wb          = getWrongBook();
  const wrongCount  = Object.values(wb).flat().length;

  // 数字统计

  `;

  // 环形图

    </div>`;
  });

  // 正确率按难度
  const diffMap = {'低':{t:0,c:0},'中':{t:0,c:0},'中高':{t:0,c:0},'高':{t:0,c:0}};
  ans.forEach(a => {
    const q = QBANK.find(x=>x.id===a.questionId);
    if (!q) return;
    if (!diffMap[q.difficulty]) diffMap[q.difficulty] = {t:0,c:0};
    diffMap[q.difficulty].t++;
    if (a.isCorrect) diffMap[q.difficulty].c++;
  });
  const accEl = document.getElementById('accuracy-bars');
  accEl.innerHTML = '';
  Object.entries(diffMap).forEach(([d,v]) => {
    const p = v.t>0 ? Math.round(v.c/v.t*100) : 0;
    const color = p>=80?'var(--green)':p>=60?'var(--orange)':'var(--red)';
    accEl.innerHTML += `<div class="module-row">
      <div class="module-name">${d}难度</div>
      <div class="module-bar-wrap">
        <div class="module-bar"><div class="module-bar-fill" style="width:${p}%;background:${color}"></div></div>
      </div>
      <div class="module-count" style="color:${color}">${p}%（${v.t}题）</div>
    </div>`;
  });

  // 本周学习时长
  const st = getStudyTime();
  const days = [];
  let weekTotal = 0;
  for (let i=6;i>=0;i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const key = d.toISOString().slice(0,10);
    const min = st[key]||0;
    days.push({label:['日','一','二','三','四','五','六'][d.getDay()], min});
    weekTotal += min;
  }
  const maxMin = Math.max(...days.map(d=>d.min), 1);
  const wbEl = document.getElementById('week-bar');
  wbEl.innerHTML = days.map(d => `
    <div class="day-bar-wrap">
      <div class="day-bar" style="height:${Math.round(d.min/maxMin*64)+4}px" title="${d.min}分钟"></div>
      <div class="day-label">${d.label}</div>
    </div>`).join('');
  document.getElementById('week-total').textContent = `本周共学习 ${weekTotal} 分钟`;
}

// ── 环形图（Canvas）────────────────────────────────
function drawRing(pct) {
  const canvas = document.getElementById('ring-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const cx=70, cy=70, r=56, lw=14;
  ctx.clearRect(0,0,140,140);
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='#23273a'; ctx.lineWidth=lw; ctx.stroke();
  if (pct>0) {
    ctx.beginPath();
    ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+Math.PI*2*(pct/100));
    ctx.strokeStyle='#4f8ef7'; ctx.lineWidth=lw;
    ctx.lineCap='round'; ctx.stroke();
  }
}

// ── 错题本 ───────────────────────────────────────────
function renderWrongBook() {
  const wb = getWrongBook();
  const allIds = Object.values(wb).flat();
  document.getElementById('wrong-count').textContent = `共 ${allIds.length} 道错题`;
  const el = document.getElementById('wrong-list');
  el.innerHTML = '';
  if (allIds.length===0) {
    el.innerHTML='<p style="color:var(--text2);text-align:center;padding:40px">🎉 错题本为空，继续保持！</p>';
    return;
  }
  Object.entries(wb).forEach(([nodeId, qIds]) => {
    if (!qIds.length) return;
    const node = NODES.find(n=>n.id===nodeId);
    el.innerHTML += `<div class="wrong-node">
      <div style="font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px">
        <span>${node?.name||nodeId}</span>
        <span class="tag tag-red">${qIds.length} 道错题</span>
        <a href="node.html?id=${nodeId}" style="font-size:0.8rem;color:var(--primary);margin-left:auto">复习知识点 →</a>
      </div>
      ${qIds.map(qid => {
        const q = QBANK.find(x=>x.id===qid);
        if (!q) return '';
        return `<div class="wrong-q" onclick="location.href='questions.html?id=${qid}'">
          <span style="flex:1;color:var(--text2);font-size:0.9rem">${q.stem.slice(0,60)}${q.stem.length>60?'…':''}</span>
          <span class="tag tag-blue">${q.difficulty}</span>
          <button onclick="event.stopPropagation();removeWrong('${nodeId}','${qid}')" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:1rem" title="移出错题本">✕</button>
        </div>`;
      }).join('')}
    </div>`;
  });
}

function removeWrong(nodeId, qid) {
  const wb = getWrongBook();
  wb[nodeId] = (wb[nodeId]||[]).filter(id=>id!==qid);
  if (!wb[nodeId].length) delete wb[nodeId];
  localStorage.setItem('geo_wrong_book', JSON.stringify(wb));
  renderWrongBook();
}

function clearWrongBook() {
  if (confirm('确定清空全部错题本？')) {
    localStorage.removeItem('geo_wrong_book');
    renderWrongBook();
  }
}

// ── 薄弱考点 ─────────────────────────────────────────
function renderWeak() {
  const ans = getAnswers();
  const acc = {};
  ans.forEach(a => {
    if (!acc[a.nodeId]) acc[a.nodeId] = {t:0,c:0};
    acc[a.nodeId].t++;
    if (a.isCorrect) acc[a.nodeId].c++;
  });
  const weak = Object.entries(acc)
    .filter(([,v]) => v.t>=2 && v.c/v.t<0.6)
    .sort((a,b)=>a[1].c/a[1].t - b[1].c/b[1].t);

  const el = document.getElementById('weak-list');
  if (weak.length===0) {
    el.innerHTML='<p style="color:var(--text2);text-align:center;padding:40px">暂无数据，多刷几道题再来看 😊</p>';
    return;
  }
  el.innerHTML = '';
  weak.forEach(([nodeId,v]) => {
    const node = NODES.find(n=>n.id===nodeId);
    const p = Math.round(v.c/v.t*100);
    el.innerHTML += `<div class="card" style="margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <div style="flex:1">
          <div style="font-weight:700;margin-bottom:4px">${node?.name||nodeId}</div>
          <div style="color:var(--text2);font-size:0.85rem">${node?.key_rule||''}</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:1.4rem;font-weight:800;color:var(--red)">${p}%</div>
          <div style="color:var(--text2);font-size:0.75rem">正确率（${v.t}题）</div>
        </div>
        <a href="node.html?id=${nodeId}" class="btn btn-primary" style="font-size:0.85rem">去复习</a>
        <a href="questions.html?node=${nodeId}" class="btn btn-ghost" style="font-size:0.85rem">再刷题</a>
      </div>
      <div class="module-bar" style="margin-top:12px">
        <div class="module-bar-fill" style="width:${p}%;background:var(--red)"></div>
      </div>
    </div>`;
  });
}

// ── 答题历史 ─────────────────────────────────────────
function renderHistory() {
  const ans = getAnswers().slice().reverse().slice(0,50);
  const el = document.getElementById('history-list');
  if (ans.length===0) {
    el.innerHTML='<p style="color:var(--text2);text-align:center;padding:40px">暂无答题记录</p>';
    return;
  }
  el.innerHTML = '';
  ans.forEach(a => {
    const q = QBANK.find(x=>x.id===a.questionId);
    const node = NODES.find(n=>n.id===a.nodeId);
    const time = new Date(a.answeredAt).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    el.innerHTML += `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);flex-wrap:wrap">
      <span style="font-size:1.1rem">${a.isCorrect?'✅':'❌'}</span>
      <span style="flex:1;color:var(--text2);font-size:0.9rem">${q?.stem.slice(0,50)||a.questionId}…</span>
      <span class="tag ${a.isCorrect?'tag-green':'tag-red'}">${a.isCorrect?'正确':'错误'}</span>
      <span style="color:var(--text2);font-size:0.8rem">${node?.name||a.nodeId}</span>
      <span style="color:var(--text2);font-size:0.75rem">${time}</span>
    </div>`;
  });
}

function clearHistory() {
  if (confirm('确定清空全部答题记录？此操作不可撤销。')) {
    localStorage.removeItem('geo_answer_records');
    renderHistory();
    renderOverview();
  }
}

// ── 初始化 ───────────────────────────────────────────
renderOverview();
function toggleMobileNav() { document.getElementById('mobile-nav').classList.toggle('hidden'); }
