定分调出地、调入地和沿线。","concepts":["区域联系包括资源、产业、人口、资金、技术、信息和生态联系。","区域协调发展强调优势互补、分工协作和公共服务均衡。","跨区域工程需评价调出地、调入地和沿线地区影响。","生态补偿体现保护责任、发展权和区域公平。","这一章的逻辑非常清晰，主要分为“水”（流域内）和“源”（跨区域资源）两条主线：","第四章 区际联系与区域协调发展","第一节 流域内协调发展","流域的特征：整体性强，上下游唇齿相依。"],"traps":["只写调入地收益，漏调出地和沿线影响。","把生态补偿理解成简单赔钱。","忽视工程建设对生态和移民的影响。","南水北调引发盐碱化：误区是“以为调水对生态全是好处。”；正确辨析是“要注意副作用！ 南水北调的东线和中线引水到华北后，如果管理不当发生渗漏，会导致华北平原地下水位上升。华北蒸发强烈，极其容易引发土壤次生盐碱化。”。","西气东输解决所有能源问题：误区是“以为有了天然气，东部就不缺电了。”；正确辨析是“错误！ 西气东输、西电东送只能**“缓解”**东部的能源紧张，不能“彻底解决”。因为东部经济发展太快了，胃口太大。”。","“一带一路”只属于中国：误区是“以为这是中国一厢情愿给别人修路。”；正确辨析是““一带一路”是国际大合作！ 核心是“共商共建共享”，目的是让沿线国家的基础设施互联互通，把中国的工业产能优势和沿线国家的资源/市场优势结合起来，是双赢。”。"],"chain":["区域差异","互补需求","通道建设","利益分配","协调机制"],"cards":["区域协调","生态补偿","西电东送","南水北调","产业协作","南水北调引发盐碱化","西气东输解决所有能源问题","“一带一路”只属于中国"],"guide":{"file":"高中地理选修二·第四单元学习指南.docx","examStatus":"高考地位： 高考必考的宏观大题阵地！在浙江选考中，分值在 8-10分。这部分最喜欢出在综合大题的最后两问，考查你对国家大政方针的理解。","commonTypes":"常考题型： 浙江卷极度偏爱考查“某项跨区域工程（引水、引气、引电）对两地的影响”；以及“河流上下游该如何协同发展（流域治理）”。","goal":"学习目标： 熟练默写“资源跨区域调配”对调出地和调入地的影响模板；深刻理解流域上下游“生态补偿”的逻辑；掌握“一带一路”倡议的核心精神。","framework":["这一章的逻辑非常清晰，主要分为“水”（流域内）和“源”（跨区域资源）两条主线：","第四章 区际联系与区域协调发展","第一节 流域内协调发展","流域的特征：整体性强，上下游唇齿相依。","流域协作的措施：水资源统一调配、水质保护（生态补偿机制）、水能梯级开发。","典型案例：黄河流域的治理（上游修水库、中游保水土、下游固堤坝）。","第二节 资源跨区域调配（核心重头戏！）","根本原因：资源的自然分布不均 vs 区域经济发展对资源的需求不均。","南水北调： 缓解北方（华北、西北）水荒。","西气东输： 将新疆/中亚的天然气输送到长三角、珠三角。","西电东送： 将西部的火电/水电输送到东部。","评价模板：对调出地的影响 vs 对调入地的影响。","第三节 “一带一路”倡议与国际合作","核心理念：共商、共建、共享。"],"mistakes":[{"term":"南水北调引发盐碱化","wrong":"以为调水对生态全是好处。","right":"要注意副作用！ 南水北调的东线和中线引水到华北后，如果管理不当发生渗漏，会导致华北平原地下水位上升。华北蒸发强烈，极其容易引发土壤次生盐碱化。"},{"term":"西气东输解决所有能源问题","wrong":"以为有了天然气，东部就不缺电了。","right":"错误！ 西气东输、西电东送只能**“缓解”**东部的能源紧张，不能“彻底解决”。因为东部经济发展太快了，胃口太大。"},{"term":"“一带一路”只属于中国","wrong":"以为这是中国一厢情愿给别人修路。","right":"“一带一路”是国际大合作！ 核心是“共商共建共享”，目的是让沿线国家的基础设施互联互通，把中国的工业产能优势和沿线国家的资源/市场优势结合起来，是双赢。"}]},"guide2":{"keyIntro":"","keyPoints":[{"label":"这些是答大题时的“黄金法则”，背下它们，综合题就能拿到80%以上的分数","body":[]},{"label":"资源跨区域调配的根本驱动力（为什么非要花几千亿修管道？）","body":["比如能源：我国西部（新疆、内蒙古）煤、气资源极其丰富，但经济落后，需求量小，资源“供大于求”；而东部（如咱们浙江、上海）经济极度发达，但家里没矿，需求量极大，资源“供不应求”。为了解决这个矛盾，必须跨区域调配！"]},{"label":"南水北调“东、中、西”三线的优缺点对比（选择题常客）","body":["东线（从江苏扬州沿京杭大运河抽水到天津北京）： 优点是有现成的运河可以利用，工程量小、投资少；缺点是水往高处走，需要耗费大量电能抽水，且沿途经过工业区，水质较差。","中线（从湖北丹江口水库引水到北京天津）： 优点是地势南高北低，水可以顺势自流，且水质非常好；缺点是需要新挖渠道，工程量和投资极大，还要搬迁大量移民。","西线（从长江上游引水到黄河上游）： 主要是为了补充大西北的水源。目前还在规划中，地质条件极其恶劣。"]},{"label":"流域的“梯级开发”","body":["考试一问到“河流中上游为什么建那么多水库”，你要回答：通过修筑一系列阶梯状的大坝，可以实现防洪、发电、航运、灌溉、水产养殖、旅游等综合效益（这叫“六字真言”）。"]}],"difficulties":[{"name":"西气东输对咱们浙江（调入地）到底有什么好处？","plain":"为什么我们家里炒菜从烧煤球变成了用天然气？","method":["经济： 缓解能源短缺，促进经济持续发展；带动相关基础设施（天然气管网）建设。","社会： 改变老百姓的能源消费结构，生活更方便。","生态（最重要的一条！）： 天然气是清洁能源。用天然气替代煤炭，能极大地减少大气污染（雾霾、酸雨），改善环境质量。"]},{"name":"西气东输对新疆（调出地）有什么好处和坏处？","plain":"","method":["利（促发展）： 把地下埋着卖不出去的资源，变成了源源不断的钞票（经济优势）；增加了就业机会；促进了新疆的基础设施建设。","弊（毁生态）： 输气管道要挖开几千公里的土地，西北地区原本就生态脆弱（多荒漠），施工容易破坏地表植被，加剧荒漠化。"]}],"examFocus":[{"point":"“新安江生态补偿机制”（极佳的本土考点）","direction":"浙江卷可能会考查河流上下游省份之间的协作。","angle":["新安江发源于安徽黄山，流入浙江千岛湖，最后成为咱们的富春江、钱塘江。安徽为了保证流到浙江的水质好，关停了沿江所有的化工厂，经济损失惨重。于是浙江政府出钱（生态补偿资金）补偿安徽，帮他们发展绿色产业。这就是典型的“流域内水质保护协作与区际互利共赢”。这让咱们桐庐人能一直喝到清澈的江水！"]},{"point":"浙江的能源安全与“西电东送/外电入浙”","direction":"结合浙江夏天缺电、限电的情境，考查能源调配。","angle":["浙江夏季空调耗电极大（高温伏旱）。我国的“西电东送”工程将四川、金沙江的水电输送到华东，不仅缓解了浙江的“电荒”，还减少了浙江本地烧煤发电产生的碳排放，助力实现“碳中和”。"]},{"point":"大运河与跨区域文化/经济交流","direction":"结合京杭大运河（浙江段），考查其在区际联系中的作用。","angle":["古代主要承担漕运（南粮北调）；现在（如南水北调东线）承担水资源调配功能，同时也是连接南方和北方的文化纽带和旅游黄金线。"]}],"confusions":[{"term":"南水北调引发盐碱化","wrong":"以为调水对生态全是好处。","right":["要注意副作用！ 南水北调的东线和中线引水到华北后，如果管理不当发生渗漏，会导致华北平原地下水位上升。华北蒸发强烈，极其容易引发土壤次生盐碱化。"]},{"term":"西气东输解决所有能源问题","wrong":"以为有了天然气，东部就不缺电了。","right":["错误！ 西气东输、西电东送只能“缓解”东部的能源紧张，不能“彻底解决”。因为东部经济发展太快了，胃口太大。"]},{"term":"“一带一路”只属于中国","wrong":"以为这是中国一厢情愿给别人修路。","right":["“一带一路”是国际大合作！ 核心是“共商共建共享”，目的是让沿线国家的基础设施互联互通，把中国的工业产能优势和沿线国家的资源/市场优势结合起来，是双赢。"]}],"review":[{"label":"高效复习方法（角色互换法）","body":["这一章的大题，永远是“两头看”。拿着题目，先站在新疆（西部/调出区）的角度想：“我卖资源赚了钱，但也怕挖管道破坏了草地”；再站在浙江（东部/调入区）的角度想：“我买了气/电，不再烧煤了，天蓝了水清了，工厂也能开工了”。用这种双向思维做题，踩分点一个都不会漏！"]},{"label":"趣味记忆技巧","body":[]},{"label":"资源调配评价口诀","body":["调出地：“变资源为财富，促基建增就业，当心生态被破坏”。","调入地：“解短缺促发展，调结构减污染，当心盲目引灾害（如盐碱化）”。"]},{"label":"答题注意事项","body":["只要是问“资源调配对调入地的生态影响”，闭着眼睛也要把这四个字写上去：改善大气（改善大气环境质量）。这是判卷老师最想看到的词！","写流域开发的原则时，记住：上游重点是“保护水源和生态”，中游重点是“发电和防洪”，下游重点是“航运和经济开发”。"]},{"label":"写给你的话","body":["万物相连，没有一座孤岛。从一滴来自南方的水滋润了北方的麦田，到一缕来自西北的天然气点燃了江南的灶火，这个庞大国家的运转，依赖着跨越千山万水的无私连接。学完这一章，就意味着你已经完美通关了《区域发展》这本宏大的书。你现在不仅懂得了如何治理一方水土，更懂得了如何用“合作与共享”的眼光去拥抱这个世界。这是地理给你的最高智慧，带着它，自信地向下一阶段进发吧！"]}]}}]},{"id":"x3","name":"选择性必修3","source":"地理选择性必修3 资源、环境与国家安全.pdf：资源环境与人类活动、自然资源与国家安全、生态环境保护与国家安全。","units":[{"id":"x3u1","title":"资源环境与人类活动","diagram":"resource","tags":["resource","environment"],"teacher":"糖糖，这册第一章强调人类活动和资源环境关系。答题要有系统观，不要把环境问题只怪给人口多。","concepts":["自然资源为人类活动提供物质和能量基础，但分布不均、数量有限。","环境问题包括资源短缺、生态破坏和环境污染。","人类活动强度、产业结构、技术水平和管理制度影响环境压力。","资源环境承载力决定区域开发强度和发展方式。","这一章的逻辑是“大自然能给我们什么 我们用了什么 我们做错了什么”：","第一章 资源、环境与人类活动","第一节 自然环境的服务功能","供给服务：提供食物、水、木材、矿产等（最基础）"],"traps":["环境问题只归因于自然条件。","资源短缺、生态破坏、环境污染三类问题混写。","只写限制开发，不写优化开发方式。","生态破坏 vs 环境污染：误区是“以为两者是一回事，混着用。”；正确辨析是“再次强调！生态破坏是“好东西变少了”（如水土流失、荒漠化、物种灭绝）；环境污染是“坏东西变多了”（如雾霾、水体富营养化、重金属超标）。”。","自然灾害 vs 环境问题：误区是“以为地震、台风也是环境问题。”；正确辨析是“自然灾害是老天爷引发的异常（往往不受人控制，如地震、海啸）；环境问题是人类活动不合理引发的恶果（如过度放牧导致的沙尘暴）。”。","非可再生资源：误区是“以为矿产资源明天就会用完。”；正确辨析是“虽然矿产无法再生，但随着科技水平的提高，人类可以发现新矿床、提高开采利用率、或者寻找替代品（如用太阳能替代煤炭），从而延长其使用寿命。”。"],"chain":["资源基础","人类活动","环境压力","承载能力","调控措施"],"cards":["自然资源","环境问题","资源环境承载力","人地关系","绿色发展","生态破坏 vs 环境污染","自然灾害 vs 环境问题","非可再生资源"],"guide":{"file":"高中地理选修三·第一单元学习指南.docx","examStatus":"高考地位： 压轴大题的“价值观底座”！在浙江选考中，直接考查的分值约 4-6分，但它的理念（人地协调观）贯穿于所有大题的始末。阅卷老师非常看重你的答案里有没有“可持续发展”的觉悟。","commonTypes":"常考题型： 浙江卷最喜欢考查“某项人类活动破坏了环境的哪种服务功能？”；或者给你一个真实的生态危机（如华北地下水漏斗、某地物种灭绝），让你分析其产生的原因和危害。","goal":"学习目标： 牢记大自然免费提供给我们的“四大服务功能”；搞懂环境问题产生的根本原理（两个“速度”的失衡）；能够准确区分可再生资源与非可再生资源的界限。","framework":["这一章的逻辑是“大自然能给我们什么 我们用了什么 我们做错了什么”：","第一章 资源、环境与人类活动","第一节 自然环境的服务功能","供给服务：提供食物、水、木材、矿产等（最基础）","调节服务：调节气候、净化空气、涵养水源、防风固沙","文化服务：提供精神享受、审美体验、游憩旅游（如富春江的风景）","支撑服务：维持自然环境自身的稳定（如土壤形成、光合作用、养分循环），是其他所有服务的基础","第二节 自然资源及其利用","自然资源的属性：自然属性（天然存在）、社会属性（对人类有用）","自然资源的分类：","可再生资源（水、土地、生物、气候资源）","非可再生资源（矿产资源，如煤、石油、铁矿）","第三节 环境问题及其危害","产生机理：人类索取 > 资源再生速度；人类排放 > 环境自净能力"],"mistakes":[{"term":"生态破坏 vs 环境污染","wrong":"以为两者是一回事，混着用。","right":"再次强调！生态破坏是“好东西变少了”（如水土流失、荒漠化、物种灭绝）；环境污染是“坏东西变多了”（如雾霾、水体富营养化、重金属超标）。"},{"term":"自然灾害 vs 环境问题","wrong":"以为地震、台风也是环境问题。","right":"自然灾害是老天爷引发的异常（往往不受人控制，如地震、海啸）；环境问题是人类活动不合理引发的恶果（如过度放牧导致的沙尘暴）。"},{"term":"非可再生资源","wrong":"以为矿产资源明天就会用完。","right":"虽然矿产无法再生，但随着科技水平的提高，人类可以发现新矿床、提高开采利用率、或者寻找替代品（如用太阳能替代煤炭），从而延长其使用寿命。"}]},"guide2":{"keyIntro":"","keyPoints":[{"label":"这部分是本章的“核心公理”，也是高考大题中最爱设置的“踩分点”","body":[]},{"label":"环境问题产生的“天平原理”（必背核心！）","body":["当人类向大自然索取资源的速度，超过了资源本身及其替代品的再生速度时  产生资源短缺和生态破坏。","当人类向大自然排放废弃物的数量，超过了自然环境的自净能力时  产生环境污染。"]},{"label":"“可再生资源”并非取之不尽","body":["多数可再生资源（如森林、地下水、土壤），只有在合理开发利用的前提下，才可以再生。如果开发利用不合理（比如疯狂抽地下水、滥砍滥伐），它们的再生周期就会无限延长，甚至变成非可再生资源。"]},{"label":"自然环境“支撑服务”的特殊性","body":["供给、调节和文化服务，都是大自然直接给人类的好处。而支撑服务（如土壤形成、养分循环），是维持其他三种服务的基础。没有支撑服务，整个生态系统就会崩溃。"]}],"difficulties":[{"name":"自然环境的“调节服务”和“支撑服务”怎么区分？","plain":"“调节服务”就像是大自然的“空调和净化器”，它帮你挡风、降温、吸灰尘。比如：森林能防风固沙、湿地能调蓄洪水。“支撑服务”就像是大自然的“地基和砖头”。比如：植物的光合作用造出了氧气，微生物把落叶变成了土壤。","method":["考试时，只要看到“涵养水源、保持水土、防风固沙、净化水质”这四个词，毫不犹豫地选“调节服务”！"]},{"name":"地下水不仅会枯竭，还会形成“地下水漏斗”","plain":"咱们喝的水，很多是抽的地下水。如果像华北平原那样，城市和工厂疯狂抽水，地下水补不回来，地下的水面就会凹下去一个大坑，这就叫“地下水漏斗”。危害与突破（大题常考）： 地下水漏斗不仅会导致水资源枯竭，还会引发地面沉降（楼房开裂、马路塌陷）；如果在沿海地区（如渤海湾），还会导致海水倒灌，让地下水变咸，连庄稼都种不活了。","method":[]}],"examFocus":[{"point":"“绿水青山”的文化与供给服务（浙江大政方针）","direction":"结合浙江“千村示范、万村整治”工程（千万工程），考查乡村生态振兴的意义。","angle":["咱们桐庐的富春江、大奇山，风景秀丽。以前可能只是好看（发挥了文化服务，发展旅游业）；现在通过生态保护，水质变好了，农产品更安全了（提升了供给服务），森林变得更茂密了，调节气候能力更强了（提升了调节服务）。这证明了保护环境就是保护生产力。"]},{"point":"生物多样性减少的原因及危害（高频大题）","direction":"给出某濒危动物（如江豚、藏羚羊）的案例，问生物多样性为何降低？","angle":["原因：栖息地被破坏（修路、建大坝、砍森林，这是最主要原因！）；过度捕杀；外来物种入侵；环境污染。","危害：破坏食物链，导致生态系统的稳定性（支撑服务）下降；丧失大量潜在的生物基因资源。"]},{"point":"可再生资源的过度利用","direction":"为什么某些地区的渔业资源枯竭了？或者地下水变咸了？","angle":["核心句式：“人类的开发利用强度，超过了该资源的自然更新（再生）速度，导致资源日益枯竭。”"]}],"confusions":[{"term":"生态破坏 vs 环境污染","wrong":"以为两者是一回事，混着用。","right":["再次强调！生态破坏是“好东西变少了”（如水土流失、荒漠化、物种灭绝）；环境污染是“坏东西变多了”（如雾霾、水体富营养化、重金属超标）。"]},{"term":"自然灾害 vs 环境问题","wrong":"以为地震、台风也是环境问题。","right":["自然灾害是老天爷引发的异常（往往不受人控制，如地震、海啸）；环境问题是人类活动不合理引发的恶果（如过度放牧导致的沙尘暴）。"]},{"term":"非可再生资源","wrong":"以为矿产资源明天就会用完。","right":["虽然矿产无法再生，但随着科技水平的提高，人类可以发现新矿床、提高开采利用率、或者寻找替代品（如用太阳能替代煤炭），从而延长其使用寿命。"]}],"review":[{"label":"高效复习方法（家乡联想法）","body":["学这四个服务功能时，直接代入咱们家乡！","桐庐富春江： 江里的鱼和水，是供给服务；江面吹来的凉风能降低夏天的温度，是调节服务；周末爸爸带你去江边绿道骑车、看“富春山居图”的实景，这是文化服务；而江底的泥沙沉淀、水草进行光合作用，则是默默无闻的支撑服务。"]},{"label":"趣味记忆技巧","body":["自然环境四大服务口诀： “供食物、调气候、文旅游、撑基础”。","环境问题机理天平： 左手“索取 > 恢复”，右手“排放 > 自净”。"]},{"label":"答题注意事项","body":["只要高考大题问到“人类过度活动带来了什么危害”，除了写经济损失外，一定要往“生态系统的服务功能下降”上靠拢。比如：导致供给服务减弱（水不够用了）、调节服务下降（气候变恶劣了）。用上这些专业词汇，你的试卷就是满分卷！"]},{"label":"写给你的话","body":["聪明善良的女孩，真正的地理学，最终都会走向“哲学”。人类不是地球的霸主，只是大自然借住的客人。我们每一次呼吸的氧气、喝下的每一口水，都是大自然慷慨提供的“服务”。学习这一章，不仅是为了应对高考的试卷，更是为了在心中种下一颗“敬畏自然”的种子。当我们懂得了自然资源的来之不易，我们就拥有了守护家乡、守护国家未来的大智慧。加油，地球的小卫士！"]}]}},{"id":"x3u2","title":"自然资源与国家安全","diagram":"security","tags":["resource","security"],"teacher":"糖糖，国家安全题要落到资源供给、运输通道、储备、多元化和替代技术，不能停在口号。","concepts":["资源安全指资源稳定、可持续、可承受地满足经济社会发展需求。","粮食安全受耕地数量质量、水资源、种业、技术和贸易影响。","能源安全受资源储量、进口依存度、运输通道、价格波动和替代技术影响。","战略性矿产关系产业链供应链和国家安全。","这一章围绕着四大维度的“安全”展开，请在脑海中建立以下宏观框架：","第二章 自然资源与国家安全","第一节 水资源与国家安全","水资源短缺的类型（资源型、水质型、工程型）"],"traps":["资源安全只看储量，不看供需和通道。","只写增加进口，不写多元化和储备。","忽视节约和效率提升。","粮食安全 vs 农业经济发展：误区是“把这两者混为一谈，答大题时全写经济。”；正确辨析是“农业经济发展是为了让农民**“赚钱”（可以种花卉、种草莓）； 粮食安全是为了让全国人民“保命活下去”**（必须种水稻、小麦等主粮）。耕地必须优先保主粮！”。","资源型缺水 vs 水质型缺水：误区是“以为南方绝对不缺水。”；正确辨析是“华北缺水主要是资源型缺水（天不下雨）；而像咱们长三角部分地区，水网密布，但如果工厂乱排污导致水不能喝了，这就叫水质型缺水。”。","石油安全：误区是“以为我国石油可以自给自足。”；正确辨析是“我国虽然有大庆、胜利油田，但石油对外依存度极高（超过70%），且进口极度依赖“马六甲海峡”，这是我国能源安全最大的软肋。”。"],"chain":["资源禀赋","供需格局","通道风险","储备替代","安全保障"],"cards":["资源安全","粮食安全","能源安全","战略性矿产","进口依存度","粮食安全 vs 农业经济发展","资源型缺水 vs 水质型缺水","石油安全"],"guide":{"file":"高中地理选修三·第二单元学习指南.docx","examStatus":"高考地位： 压轴大题的“核心灵魂”！在浙江选考中，分值在 8-10分。每年高考的最后一道综合大题，几乎一定会落脚在“粮食安全”、“能源安全”或“海洋权益”上。","commonTypes":"常考题型： 浙江卷最爱考“我国某项能源工程（如风电、光伏、核电）的建设对能源安全的意义”；或者结合某地的农业发展，考查“如何保障国家的粮食安全”。","goal":"学习目标： 牢记“18亿亩耕地红线”的深刻意义；掌握解决能源短缺的“开源节流”万能公式；明白我国为什么要大力建设海洋人工岛礁。","framework":["这一章围绕着四大维度的“安全”展开，请在脑海中建立以下宏观框架：","第二章 自然资源与国家安全","第一节 水资源与国家安全","水资源短缺的类型（资源型、水质型、工程型）","保障水资源安全的对策（开源、节流、治污、调配）","第二节 耕地资源与国家安全（极其重要！）","耕地的基本国情：一多三少（总量多，人均少，高质量少，后备少）","粮食安全战略：“藏粮于地，藏粮于技”","耕地保护红线：坚守18亿亩","第三节 矿产资源与国家安全","矿产国情：总量大，人均少，贫矿多，富矿少","能源安全威胁：石油、天然气高度依赖进口（马六甲困局）","保障能源安全：战略储备、进口渠道多元化、开发新能源（风、光、核）","第四节 海洋空间资源与国家安全"],"mistakes":[{"term":"粮食安全 vs 农业经济发展","wrong":"把这两者混为一谈，答大题时全写经济。","right":"农业经济发展是为了让农民**“赚钱”（可以种花卉、种草莓）； 粮食安全是为了让全国人民“保命活下去”**（必须种水稻、小麦等主粮）。耕地必须优先保主粮！"},{"term":"资源型缺水 vs 水质型缺水","wrong":"以为南方绝对不缺水。","right":"华北缺水主要是资源型缺水（天不下雨）；而像咱们长三角部分地区，水网密布，但如果工厂乱排污导致水不能喝了，这就叫水质型缺水。"},{"term":"石油安全","wrong":"以为我国石油可以自给自足。","right":"我国虽然有大庆、胜利油田，但石油对外依存度极高（超过70%），且进口极度依赖“马六甲海峡”，这是我国能源安全最大的软肋。"}]},"guide2":{"keyIntro":"","keyPoints":[{"label":"这部分是应对国家安全类大题的“黄金踩分点”，请务必背熟","body":[]},{"label":"国家粮食安全的核心战略——“藏粮于地，藏粮于技”","body":["藏粮于地： 坚决保护耕地数量（严禁违规建房占地）；提升耕地质量（建设高标准农田，防治土壤污染和退化）；保护生态环境。","藏粮于技： 靠科技吃饭！培育优良品种（如袁隆平的杂交水稻）；提高农业机械化水平；发展节水农业和智慧农业。"]},{"label":"保障能源安全的“万能应对模板”","body":[]},{"label":"当题目问“我国该如何保障石油/天然气等能源安全”时，牢记这四步","body":["内增（开源）： 加大国内勘探开发力度；大力发展新能源（风、光、水、核），优化能源结构。","外拓（渠道）： 实施能源进口多元化（不能只靠中东，还要靠俄罗斯、非洲），增加陆上管道运输，避开单一的海上咽喉。","储备（防断）： 建立国家石油战略储备基地（如咱们浙江镇海就有大型战略储备库）。","节流（减耗）： 提高技术，降低能耗；调整产业结构，发展低能耗的高新技术产业。"]},{"label":"水资源短缺的三大类型","body":["资源型缺水： 老天爷本来就不下雨，没水（如我国西北、华北）。","水质型缺水： 水很多，但全被污染了，不能喝（如我国江南水乡曾经的部分地区）。","工程型缺水： 降水丰富，但地形留不住水，又没修水库（如云贵高原的喀斯特地貌区，水全漏地下去了）。"]}],"difficulties":[{"name":"为什么咱们国家非要死守“18亿亩耕地红线”？","plain":"有人说，我们国家这么有钱，粮食不够去国外买不就行了？错！","method":["粮食是国家的命脉！如果把饭碗交到别人手里，一旦发生战争或国际冲突，别人只要切断粮食出口，我们就会不战而败。因此，“中国人的饭碗任何时候都要牢牢端在自己手中，饭碗主要装中国粮”。这是不可触碰的底线！"]},{"name":"新能源的优缺点评价（风、光、核电）","plain":"传统煤炭污染大，我们要换新能源，但新能源也有自己的小脾气。","method":["风能/太阳能： 优点是极其清洁、可再生；缺点是极度不稳定（靠天吃饭，没风没太阳就停电），且占地面积巨大。","核电： 优点是能量密集、发电量极其稳定，几乎不排放温室气体；缺点是技术要求极高，一旦泄漏后果不堪设想（如日本福岛），且核废料难处理。我国多建在沿海（如浙江三门核电站、秦山核电站），方便冷却水循环。"]}],"examFocus":[{"point":"浙江的能源突围战（高频大题）","direction":"浙江经济极度发达，但常规能源（煤油气）极度匮乏。问浙江是如何保障能源安全的？","angle":["外部调入：实施“西电东送”、“西气东输”和“外电入浙”。","内部开发：在东海大力发展海上风电；在沿海建设核电站（秦山、三门）；在乡村和厂房屋顶推广分布式光伏发电。","产业升级：淘汰高耗能产业，发展数字经济。"]},{"point":"海洋空间资源与永暑礁建设（维护国家安全）","direction":"我国在南海吹沙填海，建设人工岛礁有什么战略意义？","angle":["极大地改善了驻岛人员的生存环境；为我国渔民和过往商船提供避风、补给和救援服务；最重要的是，宣示了国家领土主权，极大地加强了我国对南海海域的实际管控能力，保障了海上交通咽喉的安全。"]},{"point":"城市化与耕地保护的矛盾","direction":"某地发展工业占用了良田，该如何协调？","angle":["必须严格落实“占补平衡”制度（占了一亩良田，必须在其他地方开垦出一亩同样质量的良田）；实行基本农田的永久保护；提高城市土地利用率（建高楼），不盲目摊大饼。"]}],"confusions":[{"term":"粮食安全 vs 农业经济发展","wrong":"把这两者混为一谈，答大题时全写经济。","right":["农业经济发展是为了让农民“赚钱”（可以种花卉、种草莓）；","粮食安全是为了让全国人民“保命活下去”（必须种水稻、小麦等主粮）。耕地必须优先保主粮！"]},{"term":"资源型缺水 vs 水质型缺水","wrong":"以为南方绝对不缺水。","right":["华北缺水主要是资源型缺水（天不下雨）；而像咱们长三角部分地区，水网密布，但如果工厂乱排污导致水不能喝了，这就叫水质型缺水。"]},{"term":"石油安全","wrong":"以为我国石油可以自给自足。","right":["我国虽然有大庆、胜利油田，但石油对外依存度极高（超过70%），且进口极度依赖“马六甲海峡”，这是我国能源安全最大的软肋。"]}],"review":[{"label":"高效复习方法（看新闻学地理）","body":["选修三是最需要你关注“新闻联播”的一本书。当你看到新闻里说“神舟飞船发射”、“我国自主研发的抗旱小麦丰收”或者“海上大型风电场并网发电”时，你要马上反应过来：这分别是属于“拓展太空资源”、“藏粮于技”和“保障能源安全”。用新闻印证课本，你的视野会极其开阔。"]},{"label":"趣味记忆技巧","body":["能源安全万能口诀： “内增外拓，建库储备，提技节流，清洁替代”。","耕地国情口诀： “一多三少（总量多，人均少，优质少，后备少）”。"]},{"label":"答题注意事项","body":["做综合大题时，只要看到“粮食”、“能源”或“海岛”的主题，最后总结的时候一定要强行扣上“有利于保障国家粮食/能源/国防安全”这顶大帽子。阅卷老师看到这句话，直接给你打高分！"]},{"label":"写给你的话","body":["也许你觉得“国家安全”离我们很远，其实它就在我们每天端起的饭碗里，在我们每天点亮的台灯中。一个拥有14亿人口的庞大国家，要保证所有人顿顿吃饱饭、夜夜有灯明，这本身就是一个了不起的奇迹。学完这一章，你就不再只是一个普通的学生，而是拥有了“大国格局”的青年。带着这份底气和责任感，咱们去迎接高中地理的终极决战吧！"]}]}},{"id":"x3u3","title":"生态环境保护与国家安全","diagram":"ecology","tags":["ecology","environment","sustain"],"teacher":"糖糖，生态安全题必须把生态功能说具体：涵养水源、保持水土、防风固沙、维护生物多样性。","concepts":["生态安全关系生态系统结构稳定、功能持续和人类福祉。","重要生态功能区承担水源涵养、水土保持、防风固沙和生物多样性维护。","碳排放治理需要国际合作、能源转型、产业升级和节能减排。","生态保护红线和国土空间管控是保障生态安全的重要制度。","这一章的逻辑从“底线”延伸到“全球”，请在脑海中建立以下宏大框架：","第三章 环境安全与国家安全","第一节 环境安全对国家安全的影响","环境安全的本质：环境处于没有危险或不受威胁的状态。"],"traps":["生态保护区完全不能发展，应改为生态友好型发展。","生态修复只写植树造林，忽视因地制宜。","生物多样性保护等同于保护单个物种。","碳达峰 vs 碳中和：误区是“以为碳达峰就是不排碳了。”；正确辨析是“碳达峰是排放量到了“峰顶”（依然在排，只是不再增加了）；碳中和是“排放量=吸收量”（达到净零排放）。先达峰，后中和。”。","臭氧层破坏 vs 全球气候变暖：误区是“以为是同一种气体造成的。”；正确辨析是“全球变暖的罪魁祸首是二氧化碳、甲烷等温室气体； 臭氧层破坏（南极臭氧空洞）的罪魁祸首是制冷剂（如氟利昂）。虽然两者都是全球性环境问题，但机理完全不同。”。","生态保护红线 = 永久基本农田？：误区是“以为红线里就是种庄稼的田。”；正确辨析是“生态保护红线是为了保护水、大森林、珍稀动物（如水源涵养区、国家公园）；而永久基本农田是为了保粮食安全。两者是不同的“红线”，绝不能混淆。”。"],"chain":["生态功能","退化原因","安全影响","保护修复","制度保障"],"cards":["生态安全","生态红线","碳排放","水源涵养","生物多样性","碳达峰 vs 碳中和","臭氧层破坏 vs 全球气候变暖","生态保护红线 = 永久基本农田？"],"guide":{"file":"高中地理选修三·第三单元学习指南.docx","examStatus":"高考地位： 压轴大题的“时政风向标”！在浙江选考中，分值在 4-6分。这部分极少考死记硬背的理论，而是常常结合最新的国际时事（如联合国气候大会、日本核污水排海等）来考查你的综合分析能力。","commonTypes":"常考题型： 浙江卷极度偏爱考查“全球变暖对某地区（特别是沿海地区或极地）的影响”；以及结合具体的区域，考查“如何实现碳达峰与碳中和（减排措施）”。","goal":"学习目标： 深刻理解“生态保护红线”的不可逾越性；彻底弄懂“碳达峰”和“碳中和”到底是什么、怎么做；掌握突发环境事件与跨国污染的应对策略。","framework":["这一章的逻辑从“底线”延伸到“全球”，请在脑海中建立以下宏大框架：","第三章 环境安全与国家安全","第一节 环境安全对国家安全的影响","环境安全的本质：环境处于没有危险或不受威胁的状态。","环境安全问题的触发：突发性（如化工厂爆炸） vs 累积性（如全球变暖）。","第二节 环境污染与国家安全","突发环境事件：极具破坏性、隐蔽性、扩散性（如切尔诺贝利核泄漏）。","跨国环境污染：污染物通过河流、大气或贸易（洋垃圾）跨越国界。","第三节 生态保护与国家安全（守住底线）","建立自然保护区：核心区（严禁进入）、缓冲区、实验区。","划定生态保护红线：国家生态安全的底线和生命线！","第四节 全球气候变化与国家安全（全球视野）","现状与趋势：温室气体激增导致全球气候变暖。","带来的安全威胁：海平面上升、极端天气频发、粮食减产、物种灭绝。"],"mistakes":[{"term":"碳达峰 vs 碳中和","wrong":"以为碳达峰就是不排碳了。","right":"碳达峰是排放量到了“峰顶”（依然在排，只是不再增加了）；碳中和是“排放量=吸收量”（达到净零排放）。先达峰，后中和。"},{"term":"臭氧层破坏 vs 全球气候变暖","wrong":"以为是同一种气体造成的。","right":"全球变暖的罪魁祸首是二氧化碳、甲烷等温室气体； 臭氧层破坏（南极臭氧空洞）的罪魁祸首是制冷剂（如氟利昂）。虽然两者都是全球性环境问题，但机理完全不同。"},{"term":"生态保护红线 = 永久基本农田？","wrong":"以为红线里就是种庄稼的田。","right":"生态保护红线是为了保护水、大森林、珍稀动物（如水源涵养区、国家公园）；而永久基本农田是为了保粮食安全。两者是不同的“红线”，绝不能混淆。"}]},"guide2":{"keyIntro":"","keyPoints":[{"label":"这部分是应对“大国战略”类大题的“黄金踩分点”，请务必背熟","body":[]},{"label":"神圣不可侵犯的“生态保护红线”","body":["它指的是在生态空间范围内具有特殊重要作用、需要严格保护的区域边界。","金句法则： “生态保护红线原则上按禁止开发区域的要求进行管理，严禁不符合主体功能定位的各类开发活动。” （简单说：红线之内，绝不能建厂、建房地产！）"]},{"label":"“碳达峰”与“碳中和”（双碳目标，极高频考点！）","body":["碳达峰： 指二氧化碳排放量达到历史最高值后，不再增长，并开始逐步下降。（我国承诺在2030年前实现）。","碳中和： 指通过植树造林、节能减排等形式，抵消掉自己排放的二氧化碳，实现二氧化碳“净零排放”。（我国承诺在2060年前实现）。"]},{"label":"跨国环境污染的传输途径","body":["主要是通过大气环流（如西风带把污染吹到邻国）和水循环（如上游国家把毒水排入国际河流，流到下游国家）。此外，还有跨国废弃物非法转移（俗称“洋垃圾”）。"]}],"difficulties":[{"name":"突发性环境问题 vs 累积性环境问题","plain":"这就像是急性病和慢性病的区别。","method":["突发性： 突然发生，瞬间造成巨大伤亡（如毒气泄漏、油轮泄漏）。应对重点是“应急预警、快速切断污染源、紧急疏散”。","累积性： 每天恶化一点点，温水煮青蛙，等发现时已经病入膏肓（如全球变暖、土壤重金属污染）。应对重点是“源头减排、长期治理、转变经济发展方式”。"]},{"name":"如何实现“碳中和”？（万能答题公式）","plain":"碳中和就是一个简单的数学题：排放量 - 吸收量 = 0。","method":["减排（减少排放量）： ① 调整能源结构（少烧煤，多用风、光、核等清洁能源）；② 调整产业结构（淘汰高耗能产业，发展高新技术和第三产业）；③ 提高能源利用率（技术创新）。","增汇（增加吸收量）： ① 保护生态环境，植树造林（森林是最大的碳汇）；② 保护湿地和海洋；③ 研发碳捕集与封存技术（CCUS）。"]}],"examFocus":[{"point":"全球变暖对浙江等沿海地区的影响（必考情境）","direction":"给出海平面上升的数据图，问对我国东部沿海会产生什么威胁？","angle":["第一，淹没低洼的沿海土地和城市；第二，加剧风暴潮和台风等极端气象灾害的破坏力；第三，引起海水倒灌，导致地下水变咸，土壤盐碱化，严重威胁水安全和粮食安全。"]},{"point":"自然保护区的“三区”划分（选择题常客）","direction":"问某项人类活动能不能在保护区内开展。","angle":["核心区： 绝对禁区！未经批准任何人不得进入，严禁一切干扰活动。","缓冲区： 只允许进行非破坏性的科学研究观测。","实验区： 可以在合理范围内进行科普教育、生态旅游等活动。"]},{"point":"共同但有区别的责任（国际合作原则）","direction":"为什么发达国家应该在减排中承担更多责任？","angle":["全球气候变暖是历史累积的结果。发达国家在过去两百年的工业化进程中排放了海量的温室气体；而发展中国家现在还需要发展经济来解决老百姓的生存问题。因此，大家都有责任减排（共同），但发达国家理应出更多的钱、提供更多的技术（有区别）。"]}],"confusions":[{"term":"碳达峰 vs 碳中和","wrong":"以为碳达峰就是不排碳了。","right":["碳达峰是排放量到了“峰顶”（依然在排，只是不再增加了）；碳中和是“排放量=吸收量”（达到净零排放）。先达峰，后中和。"]},{"term":"臭氧层破坏 vs 全球气候变暖","wrong":"以为是同一种气体造成的。","right":["全球变暖的罪魁祸首是二氧化碳、甲烷等温室气体；","臭氧层破坏（南极臭氧空洞）的罪魁祸首是制冷剂（如氟利昂）。虽然两者都是全球性环境问题，但机理完全不同。"]},{"term":"生态保护红线 = 永久基本农田？","wrong":"以为红线里就是种庄稼的田。","right":["生态保护红线是为了保护水、大森林、珍稀动物（如水源涵养区、国家公园）；而永久基本农田是为了保粮食安全。两者是不同的“红线”，绝不能混淆。"]}],"review":[{"label":"高效复习方法（低碳生活代入法）","body":["这一章的知识，其实就在你每天的生活里！当你用支付宝积攒“蚂蚁森林”能量去种一棵树时，你就是在为国家做“增汇”；当你选择骑共享单车、坐杭州地铁而不是坐私家车时，你就是在做“减排”。你生活中的每一次绿色选择，其实都是在保卫“国家环境安全”。把这些词用到作文和答题里，格局瞬间拉满！"]},{"label":"趣味记忆技巧","body":["碳中和万能对策口诀： “调能源，调产业，提技术；多种树，护生态，促合作”。","保护区三区口诀： “核心绝禁入，缓冲可科研，实验能旅游”。"]},{"label":"答题注意事项","body":["高考大题一旦涉及到“全球变暖”、“跨国河流水污染”等跨越国界的问题，在提对策时，最后一条永远是：“加强国际合作与信息共享”。缺少了“国际合作”这四个字，这道题的灵魂就丢了一半！"]},{"label":"写给你的话","body":["亲爱的女孩，当你合上这本《资源、环境与国家安全》时，你高中三年的地理知识版图已经全部拼凑完整。","我们从第一天的“仰望星空”，看到了宇宙的浩瀚；我们走过高山大川、洋流季风，惊叹于大自然的鬼斧神工；我们观察人口迁徙、城市崛起、工业繁荣，理解了人类社会的生存智慧；最后，我们站在这里，凝视着全球变暖的危机与生态保护的红线，懂得了大国担当与人类命运共同体。","地理，赋予了你一双看透世界的“上帝之眼”。希望你在未来的日子里，无论是面对高考的试卷，还是面对人生的抉择，都能带着这份胸怀天下的地理大智慧，走得从容、走得辽阔。祝你高考大捷，前程似锦！"]}]}}]}],"realBank":[{"id":"r2024d","tags":["solar","earthmove"],"source":"2024年浙江1月解析卷第22-23题","stem":"K、Q两地学生观测日出时直立杆影年变化。根据夏至、冬至日出方位和北京时间差异，判断两地相对位置与昼长差异。","options":["杆影张角反映日出方位年变化，昼长年变化幅度大的地点纬度更高","杆影变化只反映经度差异，与纬度无关","夏至日我国各地日出均为正东","同一日期晨线与经线夹角各地完全不同"],"answer":0,"explain":"夏至日出东北、冬至日出东南；日出时间年变化幅度与纬度相关，时间中心可反推经度。"},{"id":"r2022d","tags":["solar","earthmove"],"source":"2022年浙江6月解析卷第19-20题","stem":"某中学生观测北极星光线与正午太阳光线夹角的年变化。符合“昼变短，夜比昼长”的时段是","options":["秋分日至冬至日","春分日至夏至日","夏至日至秋分日","冬至日至春分日"],"answer":0,"explain":"北半球秋分后昼短夜长，且到冬至前昼继续变短；北极星仰角等于当地纬度，可辅助判断太阳高度。"},{"id":"r2024a","tags":["population","industry","region"],"source":"2024年浙江1月解析卷第1-2题","stem":"关中—天水经济区人口点密度与阎良航空产业基地情境：人口分布主控自然因素和产业基地远离中心城区的原因。","options":["地形影响人口分布；阎良土地供给充足且航空产业基础较好","降水影响人口分布；阎良市场需求大且劳动力更丰富","植被影响人口分布；阎良靠近消费市场","气温影响人口分布；阎良运输成本最低"],"answer":0,"explain":"关中平原人口密集、山地高原稀疏，主控自然因素是地形；阎良航空产业起步早，土地供给更充足。"},{"id":"r2024b","tags":["zonal","ecology"],"source":"2024年浙江1月解析卷第3-4题","stem":"钦博拉索峰植被上限由4600米升至5185米，土壤温度升高。最合理的地理推理是","options":["地面吸收增加，森林带可能向高海拔扩展","地面辐射减少，雪线海拔下降","太阳辐射突然增强，自然带数量减少","大气辐射减少，上限植被必为高山草甸"],"answer":0,"explain":"土壤增温与地面吸收增加有关；热量条件改善可推动森林带向高海拔扩展。"},{"id":"r2024c","tags":["transport","city"],"source":"2024年浙江1月解析卷第5-6题","stem":"都市圈轨道交通与城市空间形态情境：市区地铁、市郊铁路、高速铁路的空间作用差异。","options":["市区地铁站点密，市郊铁路联系近远郊，高速铁路站点少且距离远","高速铁路站点最密，主要服务中心城区内部","市郊铁路只服务远距离跨省客运","轨道交通一定使通勤距离缩短"],"answer":0,"explain":"不同轨道交通服务尺度不同；轨道交通常促进近郊产业沿轴线集聚，而不是简单缩短距离。"},{"id":"r2023a","tags":["agriculture","ecology","sustain"],"source":"2023年浙江6月解析卷第1-2题","stem":"城市公园稻鱼生态系统将田埂改为鱼道，其主要生态作用是","options":["拓展生物通道","扩大水稻播种面积","保障游客安全","显著增加雨水下渗"],"answer":0,"explain":"鱼道把原本分割的稻田水体连通，利于鱼类活动，核心是生态连通性。"},{"id":"r2023b","tags":["landform","tectonic"],"source":"2023年浙江6月解析卷第3-4题","stem":"广东丹霞地貌发育于白垩纪红色地层，岩层有层理和砾石夹杂。该地貌物质组成及古气候判断为","options":["砂砾岩，暖湿","石灰岩，冷湿","花岗岩，暖干","石英岩，冷干"],"answer":0,"explain":"层理和砾石夹杂指向沉积形成的砂砾岩；流水沉积和副高、信风背景对应暖湿。"},{"id":"r2023c","tags":["resource","security","industry"],"source":"2023年浙江6月解析卷第5-6题","stem":"钨被列入战略性矿产资源，且企业构建钨全产业链。核心目的和下游环节分别是","options":["实现资源领域安全可控；钨制品回收利用","主导上游采掘；钨矿勘探采掘","扩大原矿贸易；钨矿石出口","降低环保要求；粗放冶炼加工"],"answer":0,"explain":"战略性矿产服务资源安全；回收利用属于产业链下游和循环利用。"},{"id":"r2023d","tags":["population","region"],"source":"2023年浙江1月解析卷第1-2题","stem":"中亚五国人口、面积和地形情境：人口密度计算及东南部人口较密集的自然因素。","options":["哈萨克斯坦人口密度较小；水源是东南部人口较密集的关键","塔吉克斯坦人口密度较小；热量是关键","土库曼斯坦人口密度较小；矿产是关键","吉尔吉斯斯坦人口密度较小；土壤是关键"],"answer":0,"explain":"中亚干旱，水资源是人口分布的突出限制因素；人口密度需人口除以面积。"},{"id":"r2023e","tags":["landform"],"source":"2023年浙江1月解析卷第3-4题","stem":"新疆东部雅丹地貌残丘岩壁上有“小蘑菇”，该地被视为畏途。最合理判断是","options":["风化侵蚀形成；风沙强劲且极度干旱","流水沉积形成；滑坡广布","冰川刨蚀形成；空气稀薄","海浪侵蚀形成；降水丰沛"],"answer":0,"explain":"雅丹位于干旱区，昼夜温差大、风力强，主要表现为风化和风蚀。"},{"id":"r2023f","tags":["ecology","sustain"],"source":"2023年浙江1月解析卷第5-6题","stem":"海南热带雨林国家公园生态系统生产总值高，净化空气属于哪类服务，主要原因是什么","options":["调节服务；森林面积大","文化服务；纬度跨度大","物质产品；土壤肥力高","供给服务；人口密度高"],"answer":0,"explain":"净化空气是调节服务；热带雨林面积广、生态功能强，使 GEP 高。"},{"id":"r2022a","tags":["landform","water"],"source":"2022年浙江6月解析卷第1-2题","stem":"青藏高原冰川消融研学用无人机和3S技术，最适合用于监测冰川面积变化的是","options":["RS遥感","GPS模拟移动","GIS直接测温","VR获取厚度"],"answer":0,"explain":"RS用于远距离获取地表信息，适合监测冰川面积变化；GIS偏分析处理。"},{"id":"r2022b","tags":["ocean","water"],"source":"2022年浙江6月解析卷第3-4题","stem":"北大西洋东部洋流情境：低纬流向高纬和高纬流向低纬的洋流性质及影响。","options":["低纬向高纬为暖流，高纬向低纬为寒流；寒流沿岸可降温减湿","两者均为暖流；沿岸必形成大型渔场","两者均为寒流；暖湿作用明显","低纬向高纬为寒流；高纬向低纬为暖流"],"answer":0,"explain":"洋流性质看水温来源；寒流对沿岸有降温减湿作用。"},{"id":"r2022c","tags":["tectonic","landform"],"source":"2022年浙江6月解析卷第5-6题","stem":"地质剖面图中寻找化石和判断褶皱构造，关键依据是","options":["化石多见于沉积岩；岩层弯曲可指示向斜或背斜","花岗岩最易保存化石；岩层越新越深","变质岩化石最多；断层必成谷","沉积物未成岩也一定含化石"],"answer":0,"explain":"化石保存依赖沉积岩环境；构造判断需看岩层形态和新老关系。"},{"id":"r2021a","tags":["environment","landform"],"source":"2021年浙江1月解析卷第1-2题","stem":"滑坡灾害和地理信息技术情境：BDS、GPS、GIS、RS功能辨析。","options":["BDS可监测滑坡体位移，GIS用于空间分析和模拟","GPS主要采集雨量，RS不能监测地表","GIS可直接导航定位，BDS只做地图制图","VR是获取滑坡体真实位移的主要技术"],"answer":0,"explain":"定位导航系统可用于位移监测，GIS重在空间数据分析处理。"},{"id":"r2021b","tags":["zonal","ecology"],"source":"2021年浙江1月解析卷第3-4题","stem":"洞庭湖区从陆地到水底植被差异，反映的分异类型和主导因素是","options":["地方性分异；水分和地形变化","纬度地带性；热量变化","干湿度地带性；距海远近","垂直分异；海拔剧烈变化"],"answer":0,"explain":"湖区小尺度环境差异属于地方性分异，水分和微地形是主控因素。"},{"id":"r2021c","tags":["industry","region"],"source":"2021年浙江1月解析卷第7-10题","stem":"产业转移与半导体产业分散布局情境：中部承接产业与企业空间组织。","options":["承接劳动密集型和资源密集型产业；互联网促进信息交流和布局分散","只承接技术密集型产业；交通衰退促使分散","承接产业与区域差异无关；分散必然降低效率","产业分散是为了避免所有技术合作"],"answer":0,"explain":"产业转移与区域发展阶段和成本差异有关，通信技术降低跨地域协作成本。"},{"id":"r2021d","tags":["atmosphere","monsoon"],"source":"2021年浙江1月解析卷第11-12题","stem":"气压带风带移动情境：北半球夏季气压带北移时，北印度洋洋流和黄河含沙量判断为","options":["北印度洋顺时针；黄河中游含沙量增加","北印度洋逆时针；黄河进入枯水期","副极地低压被陆地冷高压切断","地中海沿岸冬雨最明显"],"answer":0,"explain":"北半球夏季气压带风带北移，南亚夏季风影响北印度洋洋流顺时针，黄河流域进入雨季。"},{"id":"r2021e","tags":["atmosphere","agriculture","sustain"],"source":"2021年浙江1月解析卷第13-14题","stem":"大棚顶部搭建光伏发电系统，棚内受热过程和农业可持续效益判断为","options":["到达棚内太阳辐射减弱；提高土地利用率并增加经济效益","地面辐射增强；只会降低经济效益","大气吸收不受影响；土地利用率下降","地面反射增强；不影响生产方式"],"answer":0,"explain":"光伏板遮挡使入射太阳辐射减弱；同地兼顾种植和发电，提高综合效益。"},{"id":"r2019a","tags":["solar","atmosphere"],"source":"2019年浙江6月解析卷第3题","stem":"夏至日前后圣彼得堡出现“夜晚不黑”现象，主要因为大气对太阳辐射具有","options":["散射作用","反射作用","吸收作用","保温作用"],"answer":0,"explain":"太阳落到地平线下角度较小，大气散射使天空仍有亮度。"},{"id":"r2017a","tags":["solar","atmosphere"],"source":"2017年浙江11月解析卷第24-25题","stem":"火星大气稀薄而昼夜温差超过100℃，主要原因是","options":["白天大气削弱少，夜晚大气逆辐射弱","白天大气反射强，夜晚保温强","火星自转很慢，昼夜长短差异极大","火星表面吸收大气辐射多"],"answer":0,"explain":"大气稀薄导致白天削弱作用弱、夜晚保温作用弱。"},{"id":"r2012a","tags":["earthmove","solar"],"source":"2012年浙江解析卷第11题","stem":"地表点与太阳直射点纬线差为α、正午太阳高度为H，若H等于α，解题关键是","options":["用正午太阳高度公式建立纬度关系","只看当地海拔高度","只判断昼夜长短","用洋流性质判断热量"],"answer":0,"explain":"正午太阳高度类计算要从H=90°-纬度差入手。"},{"id":"r2018a","tags":["earthmove","solar"],"source":"2018年浙江11月解析卷综合题","stem":"某中学观测日落位置年内变化，比较两日正午太阳高度和日出地方时，最应先判断","options":["两日对应的太阳直射点位置","当地产业结构","盛行风向","河流含沙量"],"answer":0,"explain":"日出日落方位、昼长和太阳高度都由太阳直射点季节移动控制。"},{"id":"r2018b","tags":["resource","industry"],"source":"2018年浙江11月解析卷综合题","stem":"山西以煤炭、电力、焦化、冶金为主的工业结构，主要问题是","options":["资源消耗大、污染物排放多、经济效益偏低","第三产业比重过高导致能源不足","农业占比过高导致工业缺位","风能太阳能完全可以立即替代火电"],"answer":0,"explain":"资源型重工业结构容易带来高耗能、高污染和转型压力。"},{"id":"r2019b","tags":["industry","resource"],"source":"2019年浙江4月解析卷综合题","stem":"云南大型铜冶炼厂布局的有利区位主要包括","options":["接近铜矿产地、交通较便利、可利用城市基础设施","只依赖廉价劳动力","必须远离所有城市","只由气候热量决定"],"answer":0,"explain":"冶炼布局要看原料、交通、劳动力、技术和城市基础设施。"},{"id":"r2015a","tags":["water"],"source":"2015年浙江6月解析卷综合题","stem":"分析某河流水位全年较高且变化和缓，应重点联系","options":["降水补给、上游沼泽滞留径流和湿地调节","只有冰川补给","只有海拔高度","只看河口三角洲面积"],"answer":0,"explain":"河流水文特征要从补给、流域调蓄和季节变化综合分析。"},{"id":"r2015b","tags":["agriculture","industry"],"source":"2015年浙江6月解析卷综合题","stem":"某高海拔干旱区甜瓜品质好的自然原因，最典型的是","options":["光照充足、昼夜温差大、灌溉水源较稳定","全年阴雨、昼夜温差小","土壤盐碱化越强越好","远离市场即可品质好"],"answer":0,"explain":"特色农业区位要从光热水土和昼夜温差等自然条件切入。"},{"id":"r2016a","tags":["zonal","agriculture"],"source":"2016年浙江10月解析卷综合题","stem":"喜马拉雅山道路沿线自然带差异，主要体现","options":["海拔和坡向差异引起的垂直分异","经度差异引起的干湿度地带性","行政区差异","矿产分布差异"],"answer":0,"explain":"山地自然带变化受海拔、坡向导致的热量和水分差异影响。"},{"id":"r2016b","tags":["water","landform"],"source":"2016年浙江10月解析卷综合题","stem":"某流域河流泥沙丰富，自然和人为原因应包括","options":["流域面积、降水强度、地势坡度、植被破坏","只有河流长度","只有交通建设","只有纬度高低"],"answer":0,"explain":"含沙量要综合降水、坡度、土质、植被和人类活动。"},{"id":"r2014a","tags":["resource","environment"],"source":"2014年浙江解析卷综合题","stem":"北海油气田开采的评价，应同时关注","options":["资源条件、海上开采技术、市场和海洋环境风险","只看油气储量","只看当地人口密度","只看植被类型"],"answer":0,"explain":"资源开发评价要兼顾开发条件、经济收益和生态环境风险。"},{"id":"r2014b","tags":["ocean","environment"],"source":"2014年浙江解析卷综合题","stem":"海上原油泄漏扩散方向的判断，最需要结合","options":["洋流方向及盛行风","正午太阳高度","人口年龄结构","城市地租曲线"],"answer":0,"explain":"海洋污染扩散受洋流、风和海域条件影响。"},{"id":"r2014c","tags":["sustain","ecology"],"source":"2014年浙江解析卷综合题","stem":"荷兰实施“退耕还海”的生态意义主要是","options":["恢复湿地与潮滩生态，提升生物多样性和调蓄能力","扩大耕地面积","增加工业用地","提高地下水埋藏深度"],"answer":0,"explain":"退耕还海强调恢复自然生态空间和湿地服务功
