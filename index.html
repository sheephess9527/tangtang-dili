        const ExamTab = ({ unitData }) => {
            const [answers, setAnswers] = useState({});
            const [sortSequences, setSortSequences] = useState({});
            const [fillAnswers, setFillAnswers] = useState({});
            const [submitted, setSubmitted] = useState(false);
            const [score, setScore] = useState(0);

            if (!unitData || !unitData.questions || unitData.questions.length === 0) {
                return (
                    <div className="text-center mt-20 p-8 glass rounded-2xl">

                        <h3 className="text-xl font-bold text-slate-600 mb-2">题库正在紧锣密鼓整理中...</h3>
                        <p className="text-slate-400">当前章节的真题正在从浙江历年题库中解析，请先学习“名师点拨”内容，或前往【大气的运动】、【区域协调发展】体验实战。</p>
                    </div>
                );
            }

            const questions = unitData.questions;

            const handleMcqSelect = (qId, optionIdx) => { if(!submitted) setAnswers(p => ({...p, [qId]: optionIdx})); };
            const handleSortClick = (qId, optionId) => {
                if(submitted) return;
                setSortSequences(p => {
                    const c = p[qId] || [];
                    return c.includes(optionId) ? p : {...p, [qId]: [...c, optionId]};
                });
            };
            const resetSort = (qId) => { if(!submitted) setSortSequences(p => ({...p, [qId]: []})); };
            const handleFillChange = (qId, index, value) => {
                if(submitted) return;
                setFillAnswers(p => {
                    const arr = [...(p[qId] || [])];
                    arr[index] = value;
                    return {...p, [qId]: arr};
                });
            };

            const submitExam = () => {
                let correctCount = 0;
                questions.forEach(q => {
                    let isCorrect = false;
                    if (q.type === 'mcq' && answers[q.id] === q.answer) isCorrect = true;
                    else if (q.type === 'sort' && JSON.stringify(sortSequences[q.id] || []) === JSON.stringify(q.answer)) isCorrect = true;
                    else if (q.type === 'fill') {
                        const userFills = fillAnswers[q.id] || [];
                        const allMatched = q.answer.every((ans, idx) => (userFills[idx]||'').trim().includes(ans));
                        if (allMatched && q.answer.length === userFills.filter(Boolean).length) isCorrect = true;
                    }
                    if (isCorrect) correctCount++;
                });
                const finalScore = Math.round((correctCount / questions.length) * 100);
                setScore(finalScore);
                setSubmitted(true);
                const histKey = `score_${unitData.id}`;
                if (finalScore > safeStorage.get(histKey, 0)) safeStorage.set(histKey, finalScore);

                    <div className="flex items-center justify-between mb-8">

                                (q.type === 'sort' && JSON.stringify(sortSequences[q.id]||[]) === JSON.stringify(q.answer)) ||

                                <div key={q.id} className={`glass p-6 rounded-2xl shadow-sm border-l-4 ${submitted ? (isQCorrect ? 'border-nature-500' : 'border-rose-500') : 'border-earth-500'}`}>

                                    <h3 className="text-lg font-medium text-slate-800 mb-4 leading-relaxed whitespace-pre-line">
                                        <span className="font-black mr-2">{i + 1}.</span> 
                                        {q.type === 'fill' ? q.text.split('______').map((part, pIdx, arr) => (
                                            <span key={pIdx}>
                                                {part}
                                                {pIdx < arr.length - 1 && <input type="text" className="mx-2 border-b-2 border-slate-300 bg-transparent text-center outline-none focus:border-earth-500 w-24 text-earth-700 font-bold" disabled={submitted} value={fillAnswers[q.id]?.[pIdx] || ''} onChange={(e) => handleFillChange(q.id, pIdx, e.target.value)}/>}
                                            </span>
                                        )) : q.text}
                                    </h3>
                                    {q.type === 'mcq' && (
                                        <div className="space-y-3">
                                            {q.options.map((opt, optIdx) => {
                                                const isSelected = answers[q.id] === optIdx;
                                                const isCorrectAns = q.answer === optIdx;
                                                let btnClass = "w-full text-left px-5 py-3 rounded-xl border transition-all text-sm font-medium " + 
                                                    (!submitted ? (isSelected ? "bg-earth-50 border-earth-400 text-earth-800" : "bg-white border-slate-200 hover:border-earth-300 text-slate-600") : 
                                                    (isCorrectAns ? "bg-nature-50 border-nature-500 text-nature-800 font-bold" : (isSelected ? "bg-rose-50 border-rose-400 text-rose-700 line-through opacity-70" : "bg-slate-50 border-slate-200 text-slate-400 opacity-50")));
                                                return <button key={optIdx} onClick={() => handleMcqSelect(q.id, optIdx)} className={btnClass} disabled={submitted}>{opt}</button>
                                            })}
                                        </div>
                                    )}
                                    {q.type === 'sort' && (
                                        <div>
                                            <div className="flex flex-wrap gap-3 mb-4">
                                                {q.options.map(opt => {
                                                    const isPicked = (sortSequences[q.id] || []).includes(opt.id);
                                                    return <button key={opt.id} onClick={() => handleSortClick(q.id, opt.id)} disabled={submitted || isPicked} className={`px-4 py-2 rounded-lg text-sm border font-medium transition-all ${isPicked ? 'bg-slate-100 border-slate-200 text-slate-400 opacity-50 cursor-not-allowed' : 'bg-white border-earth-200 text-earth-700 hover:bg-earth-50 shadow-sm'}`}>{opt.id}. {opt.text}</button>

                                                    <span className="text-slate-500 text-sm mr-2">你的顺序：</span>

                                            </div>

                                        </div>
                                    )}
                                </div>
                            );
                        })}

                    <div className="text-center mt-32 animate-fade-in">
                        <div className="w-24 h-24 bg-nature-100 rounded-full flex items-center justify-center mx-auto mb-6"><Icons.Award className="w-12 h-12 text-nature-600" /></div>
                        <h2 className="text-3xl font-black text-slate-800 mb-4">太棒了，糖糖！</h2>
                        <p className="text-slate-600 mb-8">本单元的易错概念你已经全部攻克！</p>
                        <button onClick={() => { setQueue([...unitData.flashcards]); setCompleted(false); }} className="bg-earth-500 text-white px-8 py-3 rounded-xl font-bold shadow-lg">再过一遍</button>
                    </div>
                );
            }

            const currentCard = queue[0];
            if (!currentCard) return null;

            const handleKnow = () => {
                setIsFlipped(false);
                setTimeout(() => {
                    const newQueue = queue.slice(1);
                    if (newQueue.length === 0) setCompleted(true);
                    else setQueue(newQueue);
                }, 200);
            };

            const handleDontKnow = () => {
                setIsFlipped(false);
                setTimeout(() => setQueue([...queue.slice(1), currentCard]), 200);
            };

            return (
                <div className="max-w-md mx-auto pt-10 perspective-1000">
                    <div className="text-center mb-6 text-slate-500 font-medium">剩余卡片：<span className="text-earth-600 font-black text-lg">{queue.length}</span> 张</div>
                    <div className={`relative w-full h-80 transition-transform duration-500 transform-style-3d cursor-pointer shadow-apple rounded-3xl ${isFlipped ? 'rotate-y-180' : ''}`} onClick={() => setIsFlipped(!isFlipped)}>
                        <div className="absolute w-full h-full backface-hidden bg-white border border-slate-100 rounded-3xl flex flex-col items-center justify-center p-8 text-center">
                            <span className="text-sm text-earth-500 font-bold mb-4 tracking-widest uppercase">点击翻转背诵</span>
                            <h2 className="text-3xl font-black text-slate-800">{currentCard.front}</h2>
                        </div>
                        <div className="absolute w-full h-full backface-hidden bg-gradient-to-br from-earth-500 to-blue-600 rounded-3xl flex flex-col items-center justify-center p-8 text-center rotate-y-180 shadow-apple-glow text-white">
                            <span className="text-sm text-blue-200 font-bold mb-4 tracking-widest uppercase">核心得分点</span>
                            <p className="text-xl font-medium leading-relaxed">{currentCard.back}</p>
                        </div>
                    </div>
                    <div className={`flex justify-between mt-10 transition-opacity duration-300 ${isFlipped ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                        <button onClick={(e) => { e.stopPropagation(); handleDontKnow(); }} className="flex items-center justify-center gap-2 w-[45%] py-4 bg-white border border-rose-200 text-rose-500 rounded-2xl font-bold hover:bg-rose-50"><Icons.Refresh /> 没记住</button>
                        <button onClick={(e) => { e.stopPropagation(); handleKnow(); }} className="flex items-center justify-center gap-2 w-[45%] py-4 bg-slate-800 text-white rounded-2xl font-bold hover:bg-slate-900"><Icons.Check /> 彻底掌握</button>
                    </div>
                </div>
            );
        };

        const Dashboard = () => {
            const [activeBookId, setActiveBookId] = useState('b1');
            const [activeUnitId, setActiveUnitId] = useState('b1-u1');
            const [activeTab, setActiveTab] = useState('notes');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);

            // 安全获取当前书册的所有单元
            const activeUnits = UNIT_DB[activeBookId] || [];
            // 如果书册里没有任何单元，给一个默认的空单元防止白屏
            const safeUnits = activeUnits.length > 0 ? activeUnits : [{ id: 'empty', title: '章节开发中', teacherMsg: '更多知识点敬请期待' }];
            const activeUnitData = safeUnits.find(u => u.id === activeUnitId) || safeUnits[0];

            return (
                <div className="min-h-screen flex flex-col md:flex-row overflow-hidden bg-slate-50">
                    <div className="md:hidden bg-white border-b border-slate-200 p-4 flex justify-between items-center sticky top-0 z-50">
                        <h1 className="font-extrabold text-slate-800">糖糖地理通</h1>
                        <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 bg-slate-100 rounded-lg"><Icons.Map /></button>
                    </div>

                    <div className={`${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 fixed md:static inset-y-0 left-0 w-72 glass z-40 flex flex-col shadow-[10px_0_30px_rgba(0,0,0,0.02)] transition-transform duration-300`}>
                        <div className="p-6 pb-4">
                            <div className="bg-gradient-to-r from-slate-800 to-slate-700 rounded-2xl p-5 shadow-lg text-white">
                                <div className="text-xs text-slate-300 font-bold mb-1 uppercase tracking-wider">历年真题库已接入</div>
                                <div className="text-lg font-black">糖糖同学，</div>
                                <div className="text-sm font-medium mt-1 text-earth-300 flex items-center gap-1"><Icons.Target /> 目标：浙江卷地理 95+</div>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto no-scrollbar px-4 space-y-2 pb-6">
                            <div className="text-xs font-bold text-slate-400 pl-2 mt-4 mb-2">高中全册矩阵</div>
                            {BOOKS.map(book => {
                                const isActive = activeBookId === book.id;
                                const Icon = Icons[book.icon] || Icons.Book;
                                return (
                                    <button key={book.id} onClick={() => { setActiveBookId(book.id); setActiveUnitId(UNIT_DB[book.id]?.[0]?.id); setIsSidebarOpen(false); setActiveTab('notes'); }}
                                        className={`w-full flex items-center gap-3 px-4 py-4 rounded-2xl font-bold transition-all text-left text-sm
                                            ${isActive ? 'bg-white shadow-apple text-earth-600 border border-slate-100 relative before:absolute before:left-0 before:top-3 before:bottom-3 before:w-1.5 before:bg-earth-500 before:rounded-r-full' : 'text-slate-500 hover:bg-white/50 hover:text-slate-800'}`}>
                                        <div className={`${isActive ? 'text-earth-500' : 'text-slate-400'}`}><Icon /></div>
                                        {book.name}
                                    </button>
                                );
                            })}
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col h-screen overflow-hidden bg-slate-50/50">
                        <div className="p-4 md:p-6 pb-0 overflow-x-auto no-scrollbar flex gap-3 whitespace-nowrap border-b border-slate-200">
                            {safeUnits.map(unit => (
                                <button key={unit.id} onClick={() => { setActiveUnitId(unit.id); setActiveTab('notes'); }}
                                    className={`px-5 py-2.5 rounded-t-xl font-bold text-sm transition-all border-b-2
                                        ${activeUnitId === unit.id ? 'bg-white text-earth-600 border-earth-500' : 'bg-transparent text-slate-500 border-transparent hover:text-slate-800 hover:bg-white/50'}`}>
                                    {unit.title}
                                </button>
                            ))}
                        </div>

                        <div className="px-4 md:px-6 pt-4 pb-2 flex gap-2">
                            {[{ id: 'notes', name: '名师点拨' }, { id: 'test', name: '全真卷演练' }, { id: 'flashcards', name: '3D 识字卡' }].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                                    className={`flex-1 py-3 rounded-2xl font-black text-sm transition-all shadow-sm border
                                        ${activeTab === tab.id ? 'border-slate-800 text-white bg-slate-800' : 'border-slate-200 text-slate-500 bg-white hover:border-slate-300 hover:text-slate-800'}`}>
                                    {tab.name}
                                </button>
                            ))}
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 md:p-8 no-scrollbar relative">
                            {activeTab === 'notes' && <NotesTab unitData={activeUnitData} />}
                            {activeTab === 'test' && <ExamTab unitData={activeUnitData} />}
                            {activeTab === 'flashcards' && <FlashcardTab unitData={activeUnitData} />}
                        </div>
                    </div>
                    {isSidebarOpen && <div className="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-30 md:hidden" onClick={() => setIsSidebarOpen(false)}></div>}
                </div>
            );
        };

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(() => safeStorage.get('isLoggedIn', false));
            const handleLogin = () => { setIsLoggedIn(true); safeStorage.set('isLoggedIn', true); };
            return <div className="font-sans antialiased text-slate-800">{isLoggedIn ? <Dashboard /> : <LoginPage onLogin={handleLogin} />}</div>;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
