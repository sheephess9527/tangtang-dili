  <script id="geo-data" type="application/json">{"books": [{"id": "b1", "name": "必修第一册", "source": "地理必修第一册.pdf：第一章宇宙中的地球、第二章地球表面形态、第三章地球上的大气、第四章地球上的水、第五章地球上的植被与土壤。", "units": [{"id": "b1u1", "title": "宇宙中的地球", "diagram": "solar", "tags": ["solar", "earthmove"], "teacher": "糖糖，这章教材从地球的宇宙环境、太阳对地球的影响切入。考试最爱把太阳辐射、太阳活动和地球运动混在一题里，先判能量来源，再判时空变化。", "concepts": ["天体系统有层级，地球位于太阳系，适宜生命存在与日地距离、大气、水和稳定环境有关。", "太阳辐射是地表过程的主要能量来源，影响气温、水循环、生物生长和人类能源利用。", "太阳活动以黑子、耀斑等为代表，可影响无线电短波通信、磁暴和极光。", "读天文题要抓日期、纬度、太阳直射点、昼夜长短和正午太阳高度。", "第一章 宇宙中的地球", "第一节 地球的宇宙环境", "认识天体与天体系统（层次级别）", "太阳系中的一颗普通行星（八大行星特征）"], "traps": ["把太阳辐射强弱直接等同于气温高低，漏掉大气削弱、地形和下垫面。", "把太阳活动说成所有气象灾害的直接原因，因果过度扩大。", "地方时计算忘记经度每 15 度差 1 小时，东西方向反判。", "流星体 vs 陨石：误区是“以为掉在地上的陨石是天体。”；正确辨析是“流星体在太空中，是天体。一旦掉进大气层燃烧叫流星现象，落到地面的残骸叫陨石。陨石不是天体，它只是地球的一部分了。”。", "太阳辐射 vs 太阳活动：误区是“以为极光是太阳辐射造成的。”；正确辨析是“太阳辐射是常规的“光和热”，提供动力；太阳活动是偶然的“发脾气”（黑子、耀斑），会引发极光、磁暴等异常现象。”。", "地壳 vs 岩石圈：误区是“以为这两个是同一个东西。”；正确辨析是“地壳只是地球最外面的一层薄皮。岩石圈 = 地壳 + 上地幔顶部（软流层以上坚硬的岩石部分）。岩石圈比地壳要厚！”。", "古生代 vs 中生代：误区是“记不清恐龙和煤炭属于哪个时代。”；正确辨析是“古生代是“海洋生物+蕨类植物”时代（第一次大造煤）；中生代是“爬行动物（恐龙）+裸子植物”时代（第二次大造煤）。”。"], "chain": ["判日期", "定直射点", "推昼夜长短", "算太阳高度", "联系生产生活"], "cards": ["天体系统", "太阳辐射", "太阳活动", "地方时", "正午太阳高度", "流星体 vs 陨石", "太阳辐射 vs 太阳活动", "地壳 vs 岩石圈", "古生代 vs 中生代"], "guide": {"file": "高中地理必修一·第一单元学习指南.docx", "examStatus": "高考地位： 在浙江省的地理学考和选考中，本章属于基础入门章节。分值通常在 2-4分 左右，常以选择题的形式出现。", "commonTypes": "常考题型： 浙江卷非常喜欢结合最新的时事热点（比如咱们国家的神舟飞船发射、火星探测器“天问一号”、或者某地新发现的化石遗迹）来创设真实的情境，考查你对地球环境、太阳活动和地球圈层结构的理解。", "goal": "学习目标： 宏观上建立宇宙观，知道地球为什么“独一无二”；微观上掌握太阳能量、地球历史演变，以及地球内部和外部是由哪些“圈子”组成的。", "framework": ["第一章 宇宙中的地球", "第一节 地球的宇宙环境", "认识天体与天体系统（层次级别）", "太阳系中的一颗普通行星（八大行星特征）", "存在生命的特殊性（外部安全、内部适宜）", "第二节 太阳对地球的影响", "太阳辐射（能量来源、分布规律及影响因素）", "太阳活动（太阳大气层结构、黑子与耀斑、对地球的影响）", "第三节 地球的历史", "化石与地层（记录地球历史的“书页”）", "地质年代表（前寒武纪 古生代 中生代 新生代）", "第四节 地球的圈层结构", "探视内部的工具：地震波（横波与纵波）", "地球内部圈层（地壳、地幔、地核，以及关键的“莫霍面”与“古登堡面”）"], "mistakes": [{"term": "流星体 vs 陨石", "wrong": "以为掉在地上的陨石是天体。", "right": "流星体在太空中，是天体。一旦掉进大气层燃烧叫流星现象，落到地面的残骸叫陨石。陨石不是天体，它只是地球的一部分了。"}, {"term": "太阳辐射 vs 太阳活动", "wrong": "以为极光是太阳辐射造成的。", "right": "太阳辐射是常规的“光和热”，提供动力；太阳活动是偶然的“发脾气”（黑子、耀斑），会引发极光、磁暴等异常现象。"}, {"term": "地壳 vs 岩石圈", "wrong": "以为这两个是同一个东西。", "right": "地壳只是地球最外面的一层薄皮。岩石圈 = 地壳 + 上地幔顶部（软流层以上坚硬的岩石部分）。岩石圈比地壳要厚！"}, {"term": "古生代 vs 中生代", "wrong": "记不清恐龙和煤炭属于哪个时代。", "right": "古生代是“海洋生物+蕨类植物”时代（第一次大造煤）；中生代是“爬行动物（恐龙）+裸子植物”时代（第二次大造煤）。"}]}}, {"id": "b1u2", "title": "地球表面形态", "diagram": "landform", "tags": ["landform", "tectonic"], "teacher": "糖糖，教材第二章把流水地貌、风成地貌、喀斯特地貌串起来。题目看到地貌照片，不急着背名称，先判物质、动力和形成环境。", "concepts": ["流水侵蚀常形成峡谷、瀑布、沟谷，流水堆积常形成冲积扇、冲积平原和三角洲。", "风成地貌高频考雅丹、风蚀蘑菇、新月形沙丘，关键是干旱区、风力和颗粒搬运。", "喀斯特地貌发育于可溶性岩石区，溶蚀和淀积形成峰林、溶洞、石钟乳等。", "内力奠定地表起伏，外力不断侵蚀、搬运、堆积并改造地貌。", "第二章 地球表面形态", "第一节 流水地貌（南方最常见，重点！）", "流水侵蚀地貌（上游）：V形谷、峡谷、瀑布", "流水堆积地貌（中下游及河口）：冲积扇/洪积扇、冲积平原、三角洲"], "traps": ["把所有沉积地貌都写成河口三角洲，忽视山前冲积扇和风积沙丘。", "看到蘑菇状残丘只写沉积作用，漏掉风化和风蚀。", "背斜成山、向斜成谷机械套用，不看岩性和外力差异侵蚀。", "V形谷 vs U形谷：误区是“以为两者都是流水冲出来的。”；正确辨析是“V形谷是流水下切侵蚀形成的（水流像锋利的刀往下切）；U形谷是冰川刨蚀形成的（冰川像巨大的推土机，把谷底推平变宽）。”。", "冲积扇 vs 三角洲：误区是“位置搞错，以为都在海边。”；正确辨析是“冲积扇/洪积扇位于河流出山口（山地平原交界处）；三角洲位于河流入海口或入湖口。”。", "风化作用 vs 风力侵蚀：误区是“看到“风”字就以为是风吹的。”；正确辨析是“风化作用是岩石在原地被风吹日晒、温度变化破坏变成碎块（静止的）；风力侵蚀是风把沙子吹起来当“砂纸”打磨岩石（运动的，如风蚀蘑菇）。”。", "石笋 vs 钟乳石：误区是“分不清溶洞里哪个朝上哪个朝下。”；正确辨析是“都在地下溶洞！长在洞顶往下挂的是钟乳石，长在地上往上长的是石笋。两者相连变成石柱。”。"], "chain": ["岩性与构造", "外力动力", "侵蚀搬运堆积", "地貌形态", "区域影响"], "cards": ["流水地貌", "雅丹地貌", "冲积扇", "喀斯特", "地质剖面", "V形谷 vs U形谷", "冲积扇 vs 三角洲", "风化作用 vs 风力侵蚀", "石笋 vs 钟乳石"], "guide": {"file": "高中地理必修一·第二单元学习指南.docx", "examStatus": "高考地位： 这是自然地理的绝对核心章节！在浙江省的学考和选考中，分值通常在 4-8分，且选择题和综合大题（特别是描述地貌形成过程）都会考查。", "commonTypes": "常考题型： 浙江卷极度偏爱“真实景观图”与“地理演化过程”的结合。比如给你一张照片（河谷、沙丘、或者溶洞），让你判断它是怎么形成的，以及它对当地人修路、建房有什么影响。", "goal": "学习目标： 认识流水、风力、海浪和冰川这四把“雕刻刀”是如何雕刻大地的；重点掌握河流地貌的演变规律，以及学会分析地貌对人类生活的影响。", "framework": ["第二章 地球表面形态", "第一节 流水地貌（南方最常见，重点！）", "流水侵蚀地貌（上游）：V形谷、峡谷、瀑布", "流水堆积地貌（中下游及河口）：冲积扇/洪积扇、冲积平原、三角洲", "河曲与牛轭湖演变（凹岸与凸岸）", "第二节 风成地貌（西北干旱区常见）", "风蚀地貌：风蚀蘑菇、风蚀柱、雅丹地貌", "风积地貌：沙丘（新月形沙丘最典型）", "第三节 喀斯特地貌（西南地区及浙江部分地区）", "地表喀斯特：溶沟、石林、峰林、孤峰", "地下喀斯特：溶洞（如瑶琳仙境）、地下暗河、钟乳石、石笋", "第四节 海岸地貌与冰川地貌", "海岸地貌：海蚀崖、海蚀柱（侵蚀）；海滩、沙洲（堆积）", "冰川地貌：U形谷、角峰、冰斗（高纬度或高海拔地区）"], "mistakes": [{"term": "V形谷 vs U形谷", "wrong": "以为两者都是流水冲出来的。", "right": "V形谷是流水下切侵蚀形成的（水流像锋利的刀往下切）；U形谷是冰川刨蚀形成的（冰川像巨大的推土机，把谷底推平变宽）。"}, {"term": "冲积扇 vs 三角洲", "wrong": "位置搞错，以为都在海边。", "right": "冲积扇/洪积扇位于河流出山口（山地平原交界处）；三角洲位于河流入海口或入湖口。"}, {"term": "风化作用 vs 风力侵蚀", "wrong": "看到“风”字就以为是风吹的。", "right": "风化作用是岩石在原地被风吹日晒、温度变化破坏变成碎块（静止的）；风力侵蚀是风把沙子吹起来当“砂纸”打磨岩石（运动的，如风蚀蘑菇）。"}, {"term": "石笋 vs 钟乳石", "wrong": "分不清溶洞里哪个朝上哪个朝下。", "right": "都在地下溶洞！长在洞顶往下挂的是钟乳石，长在地上往上长的是石笋。两者相连变成石柱。"}]}}, {"id": "b1u3", "title": "地球上的大气", "diagram": "thermal", "tags": ["atmosphere", "monsoon"], "teacher": "糖糖，大气题的底层钥匙是热力环流。任何风、雨、云、锋面、气压带，都要从受热差异和气压差一步步推。", "concepts": ["大气受热过程包括太阳辐射到达地面、地面辐射加热大气、大气逆辐射保温。", "近地面受热空气上升形成低压，受冷空气下沉形成高压，进而形成水平气压差。", "风向受水平气压梯度力、地转偏向力和摩擦力共同影响。", "气压带风带随太阳直射点季节移动，影响降水季节分配和洋流方向。", "第三章 地球上的大气", "第一节 大气的组成与垂直分层", "大气的组成：干洁空气（氧、氮、二氧化碳、臭氧）、水汽、杂质", "大气的垂直分层：对流层、平流层、高层大气"], "traps": ["把光伏板遮光后的棚内变化只写大气逆辐射增强，漏掉到达地面的太阳辐射减弱。", "高空和近地面气压状况对应反了。", "气压带风带名称、风向和降水性质错配。", "高气压 vs 低气压：误区是“以为高压的气压数值一定大于低压。”；正确辨析是“错误！ 高低气压是在同一个水平面上比较的。如果是垂直方向，无论什么情况，越往高处气压越低（哪怕是高空的高压区，它的气压值也绝对比近地面低）。”。", "大气辐射 vs 大气逆辐射：误区是“以为大气只向地面辐射热量。”；正确辨析是“大气吸收热量后，是向四面八方辐射的。其中射向宇宙空间的叫大气辐射，只有射向地面的那一部分，才叫大气逆辐射（起保温作用）。”。", "近地面风 vs 高空风：误区是“以为风最终都会穿过等压线吹。”；正确辨析是“近地面风受摩擦力影响，风向最终与等压线呈一夹角斜交；高空风没有摩擦力，风向最终偏转到与等压线平行。”。", "谷风 vs 山风：误区是“记不清白天是谷风还是山风。”；正确辨析是“白天吹谷风（山坡被太阳晒热，气流沿山坡往上爬）；夜晚吹山风（山坡冷得快，冷空气沿山坡往下沉淀）。”。"], "chain": ["受热差异", "垂直运动", "气压差", "风向水汽", "天气气候结果"], "cards": ["大气受热过程", "热力环流", "气压带", "风带", "地转偏向力", "高气压 vs 低气压", "大气辐射 vs 大气逆辐射", "近地面风 vs 高空风", "谷风 vs 山风"], "guide": {"file": "高中地理必修一·第三单元学习指南.docx", "examStatus": "高考地位： 核心重头戏！浙江省无论学考还是选考，大气的知识点必考无疑，分值一般在 6-10分 左右。既有选择题，也会在大题中作为原因分析的踩分点出现。", "commonTypes": "常考题型： 浙江卷不考死记硬背，最喜欢考“现象背后的原理”。比如：为什么深秋的早晨往往有霜冻？为什么沿海地区（如咱们浙江舟山）白天和晚上的风向是反过来的？农民伯伯为什么要给果树熏烟？", "goal": "学习目标： 搞懂大气的“分层结构”，彻底弄清“大气是怎么变热的（受热过程）”，并且熟练画出“热力环流”的各种变体（海陆风、山谷风、城市风）。", "framework": ["第三章 地球上的大气", "第一节 大气的组成与垂直分层", "大气的组成：干洁空气（氧、氮、二氧化碳、臭氧）、水汽、杂质", "大气的垂直分层：对流层、平流层、高层大气", "第二节 大气的受热过程", "削弱作用：反射、散射、吸收", "核心过程：“太阳暖大地” “大地暖大气” “大气还大地”", "保温作用：大气逆辐射（温室效应原理）", "第三节 大气热力环流（重点与难点）", "热力环流的形成原理（热胀冷缩）", "常见局地环流：海陆风、山谷风、城市热岛环流", "大气水平运动：风（水平气压梯度力、地转偏向力、摩擦力）"], "mistakes": [{"term": "高气压 vs 低气压", "wrong": "以为高压的气压数值一定大于低压。", "right": "错误！ 高低气压是在同一个水平面上比较的。如果是垂直方向，无论什么情况，越往高处气压越低（哪怕是高空的高压区，它的气压值也绝对比近地面低）。"}, {"term": "大气辐射 vs 大气逆辐射", "wrong": "以为大气只向地面辐射热量。", "right": "大气吸收热量后，是向四面八方辐射的。其中射向宇宙空间的叫大气辐射，只有射向地面的那一部分，才叫大气逆辐射（起保温作用）。"}, {"term": "近地面风 vs 高空风", "wrong": "以为风最终都会穿过等压线吹。", "right": "近地面风受摩擦力影响，风向最终与等压线呈一夹角斜交；高空风没有摩擦力，风向最终偏转到与等压线平行。"}, {"term": "谷风 vs 山风", "wrong": "记不清白天是谷风还是山风。", "right": "白天吹谷风（山坡被太阳晒热，气流沿山坡往上爬）；夜晚吹山风（山坡冷得快，冷空气沿山坡往下沉淀）。"}]}}, {"id": "b1u4", "title": "地球上的水", "diagram": "water", "tags": ["water", "ocean"], "teacher": "糖糖，教材第四章从水循环、海水性质和洋流展开。洋流题一定看流向和纬度，水循环题一定看环节是否被人类活动改变。", "concepts": ["水循环由蒸发、水汽输送、降水、下渗、地表径流和地下径流等环节组成。", "海水温度、盐度和密度受纬度、蒸发降水、径流、洋流等影响。", "暖流增温增湿，寒流降温减湿；寒暖流交汇或上升流海区常形成渔场。", "河流水文特征要分流量、汛期、水位变化、含沙量、结冰期和流速。", "这一章的结构非常清爽，主要分为“循环”和“海洋”两大部分。请在脑海中建立以下框架：", "第四章 地球上的水", "水循环的类型：海陆间循环（最重要）、陆地内循环、海上内循环（水量最大）", "水循环的环节：蒸发、水汽输送、降水、地表径流、下渗、地下径流"], "traps": ["只看纬度不看洋流性质，误判沿岸气候。", "把水循环各环节都说成增加径流，忽视下渗和蒸发。", "水文特征和水系特征混写。", "海陆间循环 vs 海上内循环：误区是“以为海陆间循环水量最大。”；正确辨析是“海上内循环的水量是最大的（因为地球上71%是海洋，大部分水在海上蒸发又下雨落回海里）。但对人类最重要的是海陆间循环，它能不断为陆地补充淡水。”。", "风暴潮 vs 海啸：误区是“以为两者都是风吹出来的。”；正确辨析是“风暴潮是强风（如台风）引起的沿海海水暴涨，属于气象灾害；海啸是海底地震、火山爆发引起的巨浪，属于地质灾害。”。", "波浪 vs 潮汐 vs 洋流：误区是“分不清这三种海水的运动方式。”；正确辨析是“波浪是风吹的（表面起伏）；潮汐是月亮太阳吸的（海水每天有规律的涨落）；洋流是一条“海洋里的宽阔大河”（常年沿着同一个方向大规模流动）。”。", "冰川融水 vs 积雪融水：误区是“以为两者出现的时间一样。”；正确辨析是“季节性积雪融水通常在春季补给河流（如东北的春汛）；冰川融水通常在夏季气温最高时补给河流（如西北的新疆塔里木河）。”。"], "chain": ["水源补给", "流域下垫面", "季节变化", "人类活动", "水文响应"], "cards": ["水循环", "洋流", "寒流", "河流补给", "渔场", "海陆间循环 vs 海上内循环", "风暴潮 vs 海啸", "波浪 vs 潮汐 vs 洋流", "冰川融水 vs 积雪融水"], "guide": {"file": "高中地理必修一·第四单元学习指南.docx", "examStatus": "高考地位： 核心必考章节！在浙江省的学考和选考中，分值通常在 4-6分。不管是选择题还是综合大题，水循环和海水性质几乎年年“准时报到”。", "commonTypes": "常考题型： 浙江卷非常喜欢考查“人类活动对水循环的影响”（比如修水库、铺透水砖、城市内涝），以及结合具体的近海区域（比如舟山渔场、红海、波罗的海）考查海水的盐度和温度。", "goal": "学习目标： 熟练画出水循环的各个环节，弄懂人类能改变哪些环节；掌握海水“温度、盐度、密度”的分布规律；明白海浪、潮汐和洋流是怎么动起来的。", "framework": ["这一章的结构非常清爽，主要分为“循环”和“海洋”两大部分。请在脑海中建立以下框架：", "第四章 地球上的水", "水循环的类型：海陆间循环（最重要）、陆地内循环、海上内循环（水量最大）", "水循环的环节：蒸发、水汽输送、降水、地表径流、下渗、地下径流", "水循环的地理意义：更新淡水资源、塑造地表形态、调节全球热量", "第二节 海水的性质", "海水温度：随纬度降低（由低纬向高纬递减），随深度降低（1000米以下保持低温）", "海水盐度：副热带海域最高，向赤道和两极递减（呈“马鞍形”曲线）", "海水密度：由赤道向两极逐渐变大，与温度呈负相关", "第三节 海水的运动", "海浪：风浪、涌浪、海啸、风暴潮", "潮汐：月球和太阳引力引起（白天的叫潮，晚上的叫汐）", "洋流：暖流（增温增湿）、寒流（降温减湿）"], "mistakes": [{"term": "海陆间循环 vs 海上内循环", "wrong": "以为海陆间循环水量最大。", "right": "海上内循环的水量是最大的（因为地球上71%是海洋，大部分水在海上蒸发又下雨落回海里）。但对人类最重要的是海陆间循环，它能不断为陆地补充淡水。"}, {"term": "风暴潮 vs 海啸", "wrong": "以为两者都是风吹出来的。", "right": "风暴潮是强风（如台风）引起的沿海海水暴涨，属于气象灾害；海啸是海底地震、火山爆发引起的巨浪，属于地质灾害。"}, {"term": "波浪 vs 潮汐 vs 洋流", "wrong": "分不清这三种海水的运动方式。", "right": "波浪是风吹的（表面起伏）；潮汐是月亮太阳吸的（海水每天有规律的涨落）；洋流是一条“海洋里的宽阔大河”（常年沿着同一个方向大规模流动）。"}, {"term": "冰川融水 vs 积雪融水", "wrong": "以为两者出现的时间一样。", "right": "季节性积雪融水通常在春季补给河流（如东北的春汛）；冰川融水通常在夏季气温最高时补给河流（如西北的新疆塔里木河）。"}]}}, {"id": "b1u5", "title": "植被与土壤", "diagram": "ecology", "tags": ["ecology", "zonal"], "teacher": "糖糖，教材第五章讲主要植被、自然环境和土壤。浙江卷常把植被上限、土壤温度、生态服务放一起考，重点是整体性和差异性。", "concepts": ["植被分布受水热条件控制，森林、草原、荒漠体现水分和热量差异。", "土壤形成受成土母质、气候、生物、地貌、时间和人类活动共同影响。", "山地垂直带谱受纬度、海拔、相对高度、坡向和水分影响。", "生态系统服务包括供给服务、调节服务、文化服务和支持功能。", "这一章的知识非常具象，我们可以通过“地上长什么”和“地下踩什么”来构建框架：", "第五章 地球上的植被与土壤", "第一节 主要植被与自然环境", "认识植被：自然植被 vs 人工植被"], "traps": ["把植被上限上升简单理解成自然带数量减少。", "土壤肥力只归因于气候，忽视生物残体和人类耕作。", "生态服务分类混乱，把净化空气归到文化服务。", "常绿阔叶林 vs 落叶阔叶林：误区是“以为只有东北才有落叶阔叶林。”；正确辨析是“常绿阔叶林在南方（如浙江，亚热带）；落叶阔叶林在北方（如华北、山东，温带）。北方的树到了秋天为了防寒保水，会把叶子全部落光。”。", "土壤厚度 vs 土壤肥力：误区是“以为土层越厚，土壤就越肥沃。”；正确辨析是“大错特错！ 土壤厚度取决于风化时间长短和地势（平原土厚，陡坡土薄）。但肥力主要看“有机质”的多少。表层有机质厚的才是好土。”。", "成土母质 vs 土壤：误区是“以为石头碎了就是土壤。”；正确辨析是“成土母质只是岩石风化后的碎屑，它没有肥力。成土母质 + 生物提供有机质 = 真正的土壤。母质是土壤的“骨架”，有机质是土壤的“灵魂”。”。", "高山林线：误区是“以为山越高，树长得越好。”；正确辨析是“山上森林分布的最高界线叫“林线”。超过林线，因为太冷或风太大，树木就无法生长了，只能长高山草甸或灌木。”。"], "chain": ["水热条件", "植被类型", "土壤发育", "生态功能", "保护利用"], "cards": ["植被上限", "土壤剖面", "垂直带谱", "生态系统服务", "地域分异", "常绿阔叶林 vs 落叶阔叶林", "土壤厚度 vs 土壤肥力", "成土母质 vs 土壤", "高山林线"], "guide": {"file": "高中地理必修一·第五单元学习指南.docx", "examStatus": "高考地位： 这一章在浙江省学考和选考中分值一般在 4-6分，虽然分值不算最高，但往往是综合大题里分析“农业生产条件”或“生态环境破坏”的重要得分点。", "commonTypes": "常考题型： 浙江卷非常喜欢考“植物形态如何反映气候特征”（比如给你看一种奇特的沙漠植物，问你当地气候怎样），以及“土壤剖面的判读”与“红壤/黑土的改良与保护”。", "goal": "学习目标： 能够看图认出主要的植被类型（森林、草原、荒漠）；能倒背如流“土壤是由什么变来的”（成土因素）；掌握咱们南方红壤的特点及改良方法。", "framework": ["这一章的知识非常具象，我们可以通过“地上长什么”和“地下踩什么”来构建框架：", "第五章 地球上的植被与土壤", "第一节 主要植被与自然环境", "认识植被：自然植被 vs 人工植被", "森林（热带雨林、常绿阔叶林、落叶阔叶林、针叶林）", "草原（热带草原、温带草原）", "荒漠（热带荒漠、温带荒漠）", "植被与环境的相互作用（植物对环境的“指示作用”）", "第二节 土壤的形成", "土壤剖面构造：有机质层（最表面） 腐殖质层 淋溶层 淀积层 母质层 母岩层", "土壤形成因素（核心考点）：", "成土母质（岩石风化而来，提供矿物质）", "气候（决定风化速度和有机质分解速度）", "生物（最活跃因素，提供有机质）"], "mistakes": [{"term": "常绿阔叶林 vs 落叶阔叶林", "wrong": "以为只有东北才有落叶阔叶林。", "right": "常绿阔叶林在南方（如浙江，亚热带）；落叶阔叶林在北方（如华北、山东，温带）。北方的树到了秋天为了防寒保水，会把叶子全部落光。"}, {"term": "土壤厚度 vs 土壤肥力", "wrong": "以为土层越厚，土壤就越肥沃。", "right": "大错特错！ 土壤厚度取决于风化时间长短和地势（平原土厚，陡坡土薄）。但肥力主要看“有机质”的多少。表层有机质厚的才是好土。"}, {"term": "成土母质 vs 土壤", "wrong": "以为石头碎了就是土壤。", "right": "成土母质只是岩石风化后的碎屑，它没有肥力。成土母质 + 生物提供有机质 = 真正的土壤。母质是土壤的“骨架”，有机质是土壤的“灵魂”。"}, {"term": "高山林线", "wrong": "以为山越高，树长得越好。", "right": "山上森林分布的最高界线叫“林线”。超过林线，因为太冷或风太大，树木就无法生长了，只能长高山草甸或灌木。"}]}}]}, {"id": "b2", "name": "必修第二册", "source": "地理必修第二册.pdf：围绕人口、乡村和城镇、产业区位、交通运输、环境与发展组织人文地理主干。", "units": [{"id": "b2u1", "title": "人口", "diagram": "region", "tags": ["population", "region"], "teacher": "糖糖，人口题不是只算密度。浙江真题喜欢把人口分布放进地形、水源、产业和交通的真实区域里考。", "concepts": ["人口分布受自然条件和社会经济条件共同影响，地形、水源和交通常是区域尺度关键。", "人口密度等于人口数量除以面积，不能只看柱状图一端。", "人口迁移受就业、教育、医疗、生态、政策和家庭因素影响。", "人口结构变化会影响养老、就业、消费和公共服务布局。", "人文地理的逻辑性很强，通常遵循“现象 原因 影响”的思路：", "第一章 人口与地理环境", "第一节 人口分布", "世界人口分布规律（四大人口稠密区）"], "traps": ["把人口总量大直接判断为人口密度大。", "只写经济因素，忽略地形和水源限制。", "把人口老龄化只写成负面，不写产业和服务需求变化。", "人口迁移 vs 人口流动：误区是“以为去外地旅游、出差就是人口迁移。”；正确辨析是“人口迁移必须满足两个条件：跨越行政区界线 + 长期定居（通常指1年以上）。旅游、每天跨城通勤、短期探亲，只能叫人口流动。”。", "资源环境承载力 vs 人口合理容量：误区是“以为这两个词是一个意思。”；正确辨析是“资源环境承载力（极限值）： 地球最多能挤下多少人（为了生存），数字大。 人口合理容量（最适宜值）： 地球养活多少人生活质量最高（为了生活好），数字小。”。", "影响人口容量的因素：消费水平：误区是“以为越有钱，消费水平越高，能养活的人就越多。”；正确辨析是“完全相反！ 消费水平越高，每个人消耗的资源就越多，地球能养活的总人数就越少。消费水平与人口容量呈负相关！”。"], "chain": ["读人口数量", "读面积与密度", "判自然约束", "找经济交通", "写分布原因"], "cards": ["人口密度", "人口迁移", "人口容量", "老龄化", "人口结构", "人口迁移 vs 人口流动", "资源环境承载力 vs 人口合理容量", "影响人口容量的因素：消费水平"], "guide": {"file": "高中地理必修二·第一单元学习指南.docx", "examStatus": "高考地位： 人文地理的基础章节！在浙江省学考和选考中，分值一般在 4-6分。主要以选择题形式出现，尤其喜欢考查图表阅读（如人口金字塔图、人口统计折线图）。", "commonTypes": "常考题型： 浙江卷非常喜欢结合时事热点与真实数据。比如给你某省份近十年的人口变化图，让你判断是出生率下降还是人口外流；或者结合“银发经济”、“异地养老”等社会现象考查人口迁移的原因。", "goal": "学习目标： 弄清人都住在哪儿（分布）、为什么搬家（迁移）、以及地球到底能养活多少人（人口容量）。学会看懂“人口金字塔图”是本章的终极武器！", "framework": ["人文地理的逻辑性很强，通常遵循“现象 原因 影响”的思路：", "第一章 人口与地理环境", "第一节 人口分布", "世界人口分布规律（四大人口稠密区）", "中国人口分布特征（胡焕庸线：黑河—腾冲线）", "影响因素（自然环境因素为主，社会经济因素日益重要）", "第二节 人口迁移", "概念：跨越行政界线 + 居住地长期改变", "动力机制：推拉理论（推力、拉力、中间阻力）", "影响因素：经济（最主要）、政治、生态环境、社会文化等", "人口迁移的影响（对迁入地 vs 对迁出地）", "第三节 人口容量", "资源环境承载力（地球最多能养活多少人？——生存底线）", "人口合理容量（地球养活多少人最舒服？——最佳状态）"], "mistakes": [{"term": "人口迁移 vs 人口流动", "wrong": "以为去外地旅游、出差就是人口迁移。", "right": "人口迁移必须满足两个条件：跨越行政区界线 + 长期定居（通常指1年以上）。旅游、每天跨城通勤、短期探亲，只能叫人口流动。"}, {"term": "资源环境承载力 vs 人口合理容量", "wrong": "以为这两个词是一个意思。", "right": "资源环境承载力（极限值）： 地球最多能挤下多少人（为了生存），数字大。 人口合理容量（最适宜值）： 地球养活多少人生活质量最高（为了生活好），数字小。"}, {"term": "影响人口容量的因素：消费水平", "wrong": "以为越有钱，消费水平越高，能养活的人就越多。", "right": "完全相反！ 消费水平越高，每个人消耗的资源就越多，地球能养活的总人数就越少。消费水平与人口容量呈负相关！"}]}}, {"id": "b2u2", "title": "乡村和城镇", "diagram": "city", "tags": ["city", "transport"], "teacher": "糖糖，城镇题要读空间结构。商业看客流和交通，工业看土地和环境，交通会改变城市形态和产业集聚。", "concepts": ["城市功能区由土地利用竞争形成，中心商务区交通便利、地价高、服务业集聚。", "城镇化表现为人口、产业和土地利用向城镇集中。", "轨道交通提高可达性，常促进近郊产业沿轴线集聚。", "乡村振兴要同时考虑产业、生态、文化、治理和基础设施。", "请在脑海中把城市想象成一个巨大的拼图：", "第二章 城镇和乡村", "第一节 城乡空间结构", "聚落形态：乡村（农业为主） vs 城镇（非农业为主）"], "traps": ["把城镇化水平等同于城市人口总量。", "认为轨道交通一定缩短通勤距离，实际是扩大通勤范围和重塑空间。", "乡村发展只写旅游，忽略农业基础和公共服务。", "城镇化水平 vs 城镇化速度：误区是“以为发达国家现在城镇化速度很快。”；正确辨析是“发达国家： 城镇化水平高（80%以上），但现在速度慢（甚至停滞或出现逆城市化）。 发展中国家（如中国）： 城镇化水平中等，但目前速度极快（正处于加速阶段）。”。", "郊区城市化 vs 逆城市化：误区是“以为两者是一回事，都是往城外跑。”；正确辨析是“郊区城市化： 城市在“长胖”，市区人口向郊区扩张，属于城镇化中期加速阶段。 逆城市化： 城市中心“空心化”，人口迁往更远的乡村或小城镇，属于城镇化后期成熟阶段。”。", "商业区面积：误区是“因为商业区最繁华，所以以为它占地面积最大。”；正确辨析是“错误！ 商业区只占城市总面积的一小部分（多在中心）。居住区才是城市中面积最大的功能区！”。"], "chain": ["空间位置", "交通可达", "土地利用", "人口产业", "形态变化"], "cards": ["城市功能区", "城镇化", "都市圈", "轨道交通", "乡村振兴", "城镇化水平 vs 城镇化速度", "郊区城市化 vs 逆城市化", "商业区面积"], "guide": {"file": "高中地理必修二·第二单元学习指南.docx", "examStatus": "高考地位： 人文地理的核心压轴章节！在浙江省学考和选考中，分值在 6-8分，选择题和综合大题（特别是城市规划布局、城镇化问题）必考！", "commonTypes": "常考题型： 浙江卷最爱考“合理布局工业区与商业区”（给你风向玫瑰图和河流，让你决定化工厂建哪）；以及结合浙江的“美丽乡村建设”、“特色小镇”考查地域文化与景观。", "goal": "学习目标： 知道城市里“三大功能区”怎么分布；学会用地租理论解释房价和商铺位置；掌握城镇化的“S型曲线”以及城镇化带来的“城市病”该怎么治。", "framework": ["请在脑海中把城市想象成一个巨大的拼图：", "第二章 城镇和乡村", "第一节 城乡空间结构", "聚落形态：乡村（农业为主） vs 城镇（非农业为主）", "城镇内部功能区：", "商业区（市中心、交通干线两侧）", "居住区（面积最大，分高级与低级）", "工业区（城市边缘、交通便利处）", "影响空间结构的因素：经济因素（地租/最关键）、历史、社会、行政", "第二节 地域文化与城乡景观", "地域文化的含义与特点", "景观体现：建筑风格（如江南水乡的白墙黑瓦与斜顶）、空间格局", "第三节 城镇化进程及其影响", "城镇化的标志（最主要标志：城市人口占总人口比重上升）"], "mistakes": [{"term": "城镇化水平 vs 城镇化速度", "wrong": "以为发达国家现在城镇化速度很快。", "right": "发达国家： 城镇化水平高（80%以上），但现在速度慢（甚至停滞或出现逆城市化）。 发展中国家（如中国）： 城镇化水平中等，但目前速度极快（正处于加速阶段）。"}, {"term": "郊区城市化 vs 逆城市化", "wrong": "以为两者是一回事，都是往城外跑。", "right": "郊区城市化： 城市在“长胖”，市区人口向郊区扩张，属于城镇化中期加速阶段。 逆城市化： 城市中心“空心化”，人口迁往更远的乡村或小城镇，属于城镇化后期成熟阶段。"}, {"term": "商业区面积", "wrong": "因为商业区最繁华，所以以为它占地面积最大。", "right": "错误！ 商业区只占城市总面积的一小部分（多在中心）。居住区才是城市中面积最大的功能区！"}]}}, {"id": "b2u3", "title": "产业区位", "diagram": "industry", "tags": ["industry", "agriculture", "resource"], "teacher": "糖糖，产业区位是提分大户。农业、工业、服务业分别建模板，但每次答题都要回到材料，不要空背。", "concepts": ["农业区位包括气候、地形、土壤、水源、市场、交通、劳动力、技术和政策。", "工业区位包括原料、能源、市场、交通、土地、劳动力、技术、环境容量和产业基础。", "产业链上游偏资源采掘，中游偏加工制造，下游偏产品应用、回收和服务。", "产业集聚可共享基础设施、降低成本、加强协作，也可能带来污染和拥堵。", "这一章的知识极其对称，你只需要掌握一套“万能分析框架”，就能横扫农、工、服三大产业：", "第三章 产业区位因素", "第一节 农业区位因素", "自然因素：气候（光、热、水、昼夜温差）、地形、土壤、水源（相对稳定）"], "traps": ["农业只答自然条件，不写市场、交通和技术。", "高新技术产业误写成依赖廉价劳动力。", "把下游产业链误判为采掘和冶炼。", "光照 vs 热量：误区是“以为光照强的地方一定热量丰富。”；正确辨析是“大错特错！ 光照看晴天多少和海拔（如青藏高原光照极强，但因为海拔高，热量极差，冻得人发抖）。热量主要看纬度和温度。”。", "工业集聚 vs 工业分散：误区是“以为企业扎堆在一起只有好处没有坏处。”；正确辨析是“集聚有弊端： 扎堆过度会导致地价上涨、交通拥堵、污染加剧。此时，一些企业为了寻找更便宜的土地和劳动力，就会**“工业分散”**（把工厂搬到东南亚或中西部去）。”。", "自然因素的变化：误区是“以为随着时代发展，气候和地形也变了。”；正确辨析是“自然因素是相对稳定的，几十年内气候地形基本不变；社会经济因素是不断变化的（交通越来越好，科技越来越发达）。”。"], "chain": ["自然基础", "市场需求", "交通土地", "技术劳动力", "政策环境"], "cards": ["农业区位", "工业区位", "产业链", "产业集聚", "产业转移", "光照 vs 热量", "工业集聚 vs 工业分散", "自然因素的变化"], "guide": {"file": "高中地理必修二·第三单元学习指南.docx", "examStatus": "高考地位： 人文地理的绝对霸主，没有之一！在浙江省学考和选考中，分值极高（8-12分甚至更多）。每年高考最后两道大题中，必有一题是“分析某产业的区位优势或发展条件”。", "commonTypes": "常考题型： 浙江卷最爱考“为什么某种特色农产品种在这里？”（如新疆长绒棉、某地的茶树）；以及“为什么某类高新技术产业或跨国公司要在这建厂？”。", "goal": "学习目标： 建立起一套无坚不摧的“区位分析模板”（自然因素 + 社会经济因素）；学会判断不同工业的“主导区位因素”（比如它是怕原料坏掉，还是需要大量廉价劳动力）。", "framework": ["这一章的知识极其对称，你只需要掌握一套“万能分析框架”，就能横扫农、工、服三大产业：", "第三章 产业区位因素", "第一节 农业区位因素", "自然因素：气候（光、热、水、昼夜温差）、地形、土壤、水源（相对稳定）", "社会经济因素：市场（决定规模和类型）、交通、政策、劳动力、科技（不断变化）", "第二节 工业区位因素", "五大指向型工业：原料指向型、市场指向型、动力指向型、劳动力指向型、技术指向型", "工业区位因素的发展变化：原料、动力影响减弱；市场、技术、交通影响增强；环境因素日益突出", "工业空间布局：工业集聚（扎堆） vs 工业分散（跨国）", "第三节 服务业区位因素", "商业服务业（超市、商场）：受市场（人口密度、消费水平）、交通影响最大", "现代服务业（软件开发、金融）：受人才、技术、网络通信、生态环境影响最大"], "mistakes": [{"term": "光照 vs 热量", "wrong": "以为光照强的地方一定热量丰富。", "right": "大错特错！ 光照看晴天多少和海拔（如青藏高原光照极强，但因为海拔高，热量极差，冻得人发抖）。热量主要看纬度和温度。"}, {"term": "工业集聚 vs 工业分散", "wrong": "以为企业扎堆在一起只有好处没有坏处。", "right": "集聚有弊端： 扎堆过度会导致地价上涨、交通拥堵、污染加剧。此时，一些企业为了寻找更便宜的土地和劳动力，就会**“工业分散”**（把工厂搬到东南亚或中西部去）。"}, {"term": "自然因素的变化", "wrong": "以为随着时代发展，气候和地形也变了。", "right": "自然因素是相对稳定的，几十年内气候地形基本不变；社会经济因素是不断变化的（交通越来越好，科技越来越发达）。"}]}}, {"id": "b2u4", "title": "交通运输与区域发展", "diagram": "transport", "tags": ["transport", "city"], "teacher": "糖糖，交通题先问为什么修，再问修了影响谁。影响要分经济、社会、空间和生态，不能只写促进发展。", "concepts": ["交通线路布局受地形地质、河流、城镇、产业、技术、资金和国防等因素影响。", "交通枢纽强化区域联系，降低运输成本，带动产业和城镇发展。", "不同交通方式适合不同距离、时效和货物类型。", "交通建设也可能扰动生态、诱发地质风险，需要避让和防护。", "这一章可以概括为三个词：“修路”、“战略”与“向海”。", "第四章 区域发展战略", "第一节 交通运输与区域发展", "交通运输方式的选择（铁路、公路、水运、航空、管道）"], "traps": ["只写自然条件，不写经济需求和产业联系。", "把所有交通影响都写成有利，漏生态和安全风险。", "铁路、公路、水运、航空适用场景混淆。", "高铁/动车运货：误区是“以为高铁可以用来运煤炭或大宗矿石。”；正确辨析是“大错特错！ 高铁和动车通常是**“客运专线”**（只载人），极少数情况会运送快递包裹。大宗笨重货物依然靠普通铁路货运列车或水运。”。", "交通线路越密集越好：误区是“以为城市里立交桥和马路修得越多越好。”；正确辨析是“交通线路建设要适度并注重合理布局。过度建设会占用大量宝贵的耕地，破坏生态环境，并且浪费建设资金。”。", "“一带”与“一路”：误区是“分不清哪个是海上的，哪个是陆上的。”；正确辨析是““一带”是“丝绸之路经济带”（陆上，通往中亚、欧洲）；“一路”是“21世纪海上丝绸之路”（海上，通往东南亚、非洲）。”。"], "chain": ["运输需求", "自然约束", "技术资金", "线路站点", "区域影响"], "cards": ["交通区位", "交通枢纽", "运输方式", "区域联系", "物流通道", "高铁/动车运货", "交通线路越密集越好", "“一带”与“一路”"], "guide": {"file": "高中地理必修二·第四单元学习指南.docx", "examStatus": "高考地位： 这一章在浙江省的学考和选考中分值约为 6-8分。它是高考综合大题的“万金油”，尤其是“交通运输的意义”和“生态环境保护”，几乎是逢考必出的踩分点。", "commonTypes": "常考题型： 浙江卷极度偏爱考查“某条新修的高铁/大桥/跨海通道带来的影响”；以及结合国家战略（如长江经济带、一带一路），考查区域协作与生态保护。", "goal": "学习目标： 掌握评价交通线路建设的“万能模板”；理解长江经济带“共抓大保护，不搞大开发”的核心理念；搞懂我们在海洋上到底拥有哪些权利（领海与专属经济区的区别）。", "framework": ["这一章可以概括为三个词：“修路”、“战略”与“向海”。", "第四章 区域发展战略", "第一节 交通运输与区域发展", "交通运输方式的选择（铁路、公路、水运、航空、管道）", "交通运输布局的原则（自然基础、社会经济决定、技术保障）", "交通对区域发展的影响（对聚落形态、对商业网点、对经济发展）", "第二节 我国宏观区域发展战略", "长江经济带发展战略（横跨东中西，核心：生态优先、绿色发展）", "京津冀协同发展战略（疏解北京非首都功能）", "“一带一路”倡议（陆上丝绸之路经济带 + 21世纪海上丝绸之路）", "第三节 海洋权益与我国海洋发展战略", "海洋权益的划分（内水、领海、毗连区、专属经济区、大陆架）", "我国海洋国情与海洋战略（维护海洋权益、发展海洋经济、保护海洋生态）"], "mistakes": [{"term": "高铁/动车运货", "wrong": "以为高铁可以用来运煤炭或大宗矿石。", "right": "大错特错！ 高铁和动车通常是**“客运专线”**（只载人），极少数情况会运送快递包裹。大宗笨重货物依然靠普通铁路货运列车或水运。"}, {"term": "交通线路越密集越好", "wrong": "以为城市里立交桥和马路修得越多越好。", "right": "交通线路建设要适度并注重合理布局。过度建设会占用大量宝贵的耕地，破坏生态环境，并且浪费建设资金。"}, {"term": "“一带”与“一路”", "wrong": "分不清哪个是海上的，哪个是陆上的。", "right": "“一带”是“丝绸之路经济带”（陆上，通往中亚、欧洲）；“一路”是“21世纪海上丝绸之路”（海上，通往东南亚、非洲）。"}]}}, {"id": "b2u5", "title": "环境与发展", "diagram": "governance", "tags": ["sustain", "ecology", "environment"], "teacher": "糖糖，环境题要戒掉空话。先写问题表现，再写原因、危害、治理和可持续发展路径。", "concepts": ["可持续发展包括生态持续、经济持续和社会持续。", "环境问题成因既有自然背景，也有人类活动强度、产业结构和治理能力。", "低碳发展依靠能源结构优化、产业升级、节能技术和绿色生活方式。", "生态治理要因地制宜，工程措施、生物措施和制度措施结合。"], "traps": ["治理措施只写植树造林，缺少产业、技术和制度。", "把资源短缺和环境污染混为一谈。", "只写保护环境，不写发展方式转型。"], "chain": ["问题表现", "成因分析", "影响对象", "治理措施", "发展转型"], "cards": ["可持续发展", "循环经济", "双碳目标", "生态补偿", "环境承载力"]}]}, {"id": "x1", "name": "选择性必修1", "source": "地理选择性必修1 自然地理基础.pdf：地球运动、岩石圈、大气运动、陆地水与洋流、自然环境整体性与差异性。", "units": [{"id": "x1u1", "title": "地球运动", "diagram": "solar", "tags": ["earthmove", "solar"], "teacher": "糖糖，选择性必修1第一章把自转和公转讲细。做题必须画直射点和晨昏线，脑内裸算很容易错。", "concepts": ["地球自转产生昼夜交替、地方时差异和水平运动偏转。", "黄赤交角导致太阳直射点在南北回归线之间移动。", "昼夜长短看直射点所在半球，正午太阳高度从直射纬线向两侧递减。", "地转偏向力北半球右偏、南半球左偏，赤道附近不偏。", "这一章的知识环环相扣，千万不要孤立地背，要顺着这条“逻辑链”去想：", "第一章 地球的运动", "第一节 地球的自转（绕着地轴转）", "运动特征：方向（自西向东）、周期（恒星日/太阳日）、速度（角速度与线速度）"], "traps": ["把太阳直射点移动方向和昼长变化方向混为一谈。", "时区计算没有先统一东加西减。", "极昼极夜范围与直射点纬度对应错。", "远日点 vs 夏至日：误区是“以为地球离太阳越近就越热（近日点是夏天）。”；正确辨析是“大错特错！ 地球冷热取决于太阳照得直不直，不取决于距离！近日点是1月初（最冷的时候，地球跑得最快）；远日点是7月初（最热的时候，地球跑得最慢）。”。", "地方时 vs 区时：误区是“以为北京时间就是北京（116°E）的地方时。”；正确辨析是“北京时间是整个东八区的统一区时（采用的是120°E的地方时，即咱们浙江杭州的经度附近！）。北京本地的地方时其实比“北京时间”晚16分钟。”。", "极昼范围 vs 直射点纬度：误区是“算不出极昼的纬度。”；正确辨析是“记住神级公式：极昼（极夜）的最低纬度 + 太阳直射点的纬度 = 90°。比如直射20°N，那么70°N及其以北全部极昼。”。", "昼变长 vs 昼长夜短：误区是“以为直射点向北移，北半球就一定是昼长夜短。”；正确辨析是“状态与趋势要分开！ 直射点从南回归线向赤道移动时（冬至到春分），北半球昼在变长，但依然是昼短夜长。只有直射点越过赤道进入北半球，才是昼长夜短。”。"], "chain": ["日期", "直射点", "晨昏线", "昼夜太阳高度", "地理影响"], "cards": ["恒星日", "太阳日", "黄赤交角", "晨昏线", "地转偏向力", "远日点 vs 夏至日", "地方时 vs 区时", "极昼范围 vs 直射点纬度", "昼变长 vs 昼长夜短"], "guide": {"file": "高中地理选修一·第一单元学习指南.docx", "examStatus": "高考地位： 核心区分度章节！在浙江选考中，分值通常在 4-6分（多为选择题，偶尔穿插在大题中作为背景条件）。这部分得分率普遍偏低，是真正的“学霸拉分题”。", "commonTypes": "常考题型： 浙江卷绝对不会让你死算天文公式！它最爱考“真实生活情境”。比如：买房子怎么选楼层采光最好？山坡上的太阳能光伏板该怎么调节角度？在杭州某个日落的傍晚，你的影子朝向哪里？", "goal": "学习目标： 攻克空间想象的难关。彻底搞懂地方时/区时的计算；掌握“太阳直射点”这个万能钥匙，推导昼夜长短和正午太阳高度的变化规律。", "framework": ["这一章的知识环环相扣，千万不要孤立地背，要顺着这条“逻辑链”去想：", "第一章 地球的运动", "第一节 地球的自转（绕着地轴转）", "运动特征：方向（自西向东）、周期（恒星日/太阳日）、速度（角速度与线速度）", "地理意义1：昼夜交替（晨昏线的判读）", "地理意义2：产生时差（地方时、区时、国际日界线）", "地理意义3：地转偏向力（北右，南左，赤道无）", "第二节 地球的公转（绕着太阳转）", "运动特征：轨道（椭圆）、周期（恒星年/回归年）、速度（近日点最快，远日点最慢）", "核心关键：黄赤交角（目前为23°26′，决定了直射点的移动范围）", "第三节 地球公转的地理意义（重点与难点！）", "正午太阳高度的变化（随纬度和季节如何变化）", "昼夜长短的变化（随纬度和季节如何变化）", "四季更替与五带的划分"], "mistakes": [{"term": "远日点 vs 夏至日", "wrong": "以为地球离太阳越近就越热（近日点是夏天）。", "right": "大错特错！ 地球冷热取决于太阳照得直不直，不取决于距离！近日点是1月初（最冷的时候，地球跑得最快）；远日点是7月初（最热的时候，地球跑得最慢）。"}, {"term": "地方时 vs 区时", "wrong": "以为北京时间就是北京（116°E）的地方时。", "right": "北京时间是整个东八区的统一区时（采用的是120°E的地方时，即咱们浙江杭州的经度附近！）。北京本地的地方时其实比“北京时间”晚16分钟。"}, {"term": "极昼范围 vs 直射点纬度", "wrong": "算不出极昼的纬度。", "right": "记住神级公式：极昼（极夜）的最低纬度 + 太阳直射点的纬度 = 90°。比如直射20°N，那么70°N及其以北全部极昼。"}, {"term": "昼变长 vs 昼长夜短", "wrong": "以为直射点向北移，北半球就一定是昼长夜短。", "right": "状态与趋势要分开！ 直射点从南回归线向赤道移动时（冬至到春分），北半球昼在变长，但依然是昼短夜长。只有直射点越过赤道进入北半球，才是昼长夜短。"}]}}, {"id": "x1u2", "title": "岩石圈与地表形态", "diagram": "tectonic", "tags": ["tectonic", "landform"], "teacher": "糖糖，岩石圈题要把岩石类型、地质构造和外力地貌分开。化石找沉积岩，板块边界看生长或消亡。", "concepts": ["岩浆岩、沉积岩、变质岩可通过岩石圈物质循环相互转化。", "化石多保存在沉积岩中，岩浆岩和变质岩通常不保存化石。", "板块生长边界常形成裂谷和海岭，消亡边界常形成海沟、岛弧和褶皱山。", "褶皱、断层等构造会影响地貌、矿产、水文和工程建设。", "地质学的逻辑非常严密，请在脑海中建立这个“内外双修”的框架：", "第二章 岩石圈与地表形态", "第一节 岩石圈物质循环", "三大类岩石：岩浆岩（侵入型、喷出型）、沉积岩（有层理、有化石）、变质岩"], "traps": ["把砂岩、石灰岩这类沉积岩和花岗岩混淆。", "海岭、海沟对应的板块边界判反。", "地质构造和地貌形态不分。", "喷出岩 vs 侵入岩：误区是“以为岩浆岩全在地面上。”；正确辨析是“喷出岩（如玄武岩）： 喷出地表，冷却快，岩石里常有气孔； 侵入岩（如花岗岩）： 没喷出来，在地下慢慢冷却，极其坚硬，质地致密，是上好的建材。”。", "断层 vs 断裂：误区是“以为石头裂开了就是断层。”；正确辨析是“岩石裂开了叫“断裂”（或节理）。只有当裂开的两侧岩块发生了明显的“上下或左右位移（错位）”，才能叫断层！”。", "变质岩的来源：误区是“觉得变质岩很神秘。”；正确辨析是“变质岩就是原来的石头在地下深处被**“高温高压”烤变了质。比如：石灰岩变成大理岩**，页岩变成板岩。”。"], "chain": ["岩石类型", "构造运动", "外力改造", "地貌表现", "工程资源意义"], "cards": ["岩石圈循环", "沉积岩", "化石", "板块边界", "断层", "喷出岩 vs 侵入岩", "断层 vs 断裂", "变质岩的来源"], "guide": {"file": "高中地理选修一·第二单元学习指南.docx", "examStatus": "高考地位： 自然地理的核心得分区！在浙江选考中分值极高（6-8分），常常在选择题组压轴，或者在综合题第一问中让你“简述某地貌的形成过程”。", "commonTypes": "常考题型： 浙江卷最喜欢给你一张“地质剖面切面图”，让你判断：这里发生过几次断层？哪块岩石最老？这些岩层是先弯曲的还是先断裂的？", "goal": "学习目标： 熟练辨认三大类岩石；彻底搞懂“背斜”和“向斜”的区别及应用；掌握判读地质年代先后顺序的“终极法则”。", "framework": ["地质学的逻辑非常严密，请在脑海中建立这个“内外双修”的框架：", "第二章 岩石圈与地表形态", "第一节 岩石圈物质循环", "三大类岩石：岩浆岩（侵入型、喷出型）、沉积岩（有层理、有化石）、变质岩", "物质循环过程（岩浆 岩石 新岩浆）", "第二节 地表形态的变化", "内力作用（能量来自地球内部）：地壳运动、岩浆活动、变质作用", "地质构造（内力作用的痕迹）：", "褶皱：背斜（岩层向上拱）、向斜（岩层向下弯）", "断层：地垒（块状山地）、地堑（谷地或盆地）", "外力作用（能量来自太阳辐射）：风化、侵蚀、搬运、堆积", "第三节 地表形态与人类活动", "地形对聚落的影响（平原密集，山区沿河谷分布）", "地形对交通线的影响（山区修路沿等高线呈“之”字形）"], "mistakes": [{"term": "喷出岩 vs 侵入岩", "wrong": "以为岩浆岩全在地面上。", "right": "喷出岩（如玄武岩）： 喷出地表，冷却快，岩石里常有气孔； 侵入岩（如花岗岩）： 没喷出来，在地下慢慢冷却，极其坚硬，质地致密，是上好的建材。"}, {"term": "断层 vs 断裂", "wrong": "以为石头裂开了就是断层。", "right": "岩石裂开了叫“断裂”（或节理）。只有当裂开的两侧岩块发生了明显的“上下或左右位移（错位）”，才能叫断层！"}, {"term": "变质岩的来源", "wrong": "觉得变质岩很神秘。", "right": "变质岩就是原来的石头在地下深处被**“高温高压”烤变了质。比如：石灰岩变成大理岩**，页岩变成板岩。"}]}}, {"id": "x1u3", "title": "大气运动", "diagram": "thermal", "tags": ["atmosphere", "monsoon"], "teacher": "糖糖，这章讲气压带、风带及其对气候的影响。先定半球和季节，再判气压带风带是否移动。", "concepts": ["三圈环流由高低纬受热不均、地转偏向力和地表差异共同塑造。", "气压带风带随太阳直射点南北移动而季节移动。", "季风由海陆热力性质差异和气压带风带季节移动共同影响。", "地中海气候、热带草原气候等降水季节性与气压带风带控制有关。", "大气的运动是一个从“全球宏观”到“区域微观”的过程，请在脑海中建立以下逻辑树：", "第三章 大气的运动", "第一节 气压带、风带的形成与移动", "三圈环流（低纬、中纬、高纬环流）"], "traps": ["把东亚季风和南亚季风成因完全写成一样。", "只背北顺南逆，忽略北印度洋季风洋流季节反向。", "用山谷风解释全球尺度季风。", "冷锋降水 vs 暖锋降水：误区是“记不清雨到底下在锋前还是锋后。”；正确辨析是“记住：“冷锋锋后雨，暖锋锋前雨”。其实雨都下在“冷气团”那一侧，因为冷气团重在下面，暖空气被迫抬升成云。”。", "季风 vs 信风：误区是“以为它们是一回事，都是风带吹的。”；正确辨析是“信风是全球性大气环流，一年四季方向不变（如东北信风）；季风是由于海陆热力差异引起的，风向随季节发生完全反转（冬西北、夏东南）。”。", "热带季风 vs 热带草原气候：误区是“看降水柱状图时分不清这两个。”；正确辨析是“两者都是全年高温，分干湿两季。区别看降水量：热带季风（如印度）的雨季降水极其猛烈（最高月能超过500mm），是“突变”；热带草原（如非洲）降水相对少（最高月200-300mm），是“渐变”。”。"], "chain": ["受热差异", "气压带风带", "季节移动", "风向水汽", "气候结果"], "cards": ["三圈环流", "副热带高压", "信风", "西风带", "季风", "冷锋降水 vs 暖锋降水", "季风 vs 信风", "热带季风 vs 热带草原气候"], "guide": {"file": "高中地理选修一·第三单元学习指南.docx", "examStatus": "高考地位： 自然地理的“重中之重”！在浙江选考中，分值在 8-12分 左右。极大概率会出一道综合大题（让你分析某个地区为什么会形成某种气候，或者某种极端天气对农业的影响）。", "commonTypes": "常考题型： 浙江卷最爱考“气候特征的判读”（给你气温降水柱状图，让你判断是哪种气候）；以及结合真实的灾害天气（如寒潮、台风、暴雨），考查天气系统的演变过程。", "goal": "学习目标： 闭着眼睛能画出全球的“七压六带”；掌握一套百发百中的“气候类型判断口诀”；能够精准区分冷锋、暖锋、气旋和反气旋。", "framework": ["大气的运动是一个从“全球宏观”到“区域微观”的过程，请在脑海中建立以下逻辑树：", "第三章 大气的运动", "第一节 气压带、风带的形成与移动", "三圈环流（低纬、中纬、高纬环流）", "全球“七压六带”的分布规律", "气压带风带的季节移动（跟着太阳直射点走：夏北移，冬南移）", "季风环流（海陆热力性质差异、气压带风带的季节移动）", "第二节 气压带、风带与气候", "单一气压带/风带控制的气候（如：热带雨林气候、温带海洋性气候）", "交替控制下的气候（如：地中海气候、热带草原气候）", "世界主要气候类型的特征、分布及成因", "第三节 天气系统（重点！）", "锋面系统：冷锋、暖锋、准静止锋", "气压系统：气旋（低压）、反气旋（高压）"], "mistakes": [{"term": "冷锋降水 vs 暖锋降水", "wrong": "记不清雨到底下在锋前还是锋后。", "right": "记住：“冷锋锋后雨，暖锋锋前雨”。其实雨都下在“冷气团”那一侧，因为冷气团重在下面，暖空气被迫抬升成云。"}, {"term": "季风 vs 信风", "wrong": "以为它们是一回事，都是风带吹的。", "right": "信风是全球性大气环流，一年四季方向不变（如东北信风）；季风是由于海陆热力差异引起的，风向随季节发生完全反转（冬西北、夏东南）。"}, {"term": "热带季风 vs 热带草原气候", "wrong": "看降水柱状图时分不清这两个。", "right": "两者都是全年高温，分干湿两季。区别看降水量：热带季风（如印度）的雨季降水极其猛烈（最高月能超过500mm），是“突变”；热带草原（如非洲）降水相对少（最高月200-300mm），是“渐变”。"}]}}, {"id": "x1u4", "title": "陆地水与洋流", "diagram": "water", "tags": ["water", "ocean"], "teacher": "糖糖，陆地水和洋流题常考读图。河流写水文特征，洋流写寒暖性质、流向和影响。", "concepts": ["陆地水体包括河流、湖泊、沼泽、冰川和地下水，彼此存在补给关系。", "河流补给类型决定汛期，如雨水补给看雨季，冰雪融水补给看气温。", "洋流按性质分寒流和暖流，按成因有风海流、密度流和补偿流。", "洋流影响气候、渔场、航海和污染扩散。", "这一章的知识从陆地延伸到海洋，再上升到海空联合，逻辑递进非常清晰：", "第四章 水的运动", "第一节 陆地水体及其相互关系", "陆地水体类型：河流、湖泊、冰川、地下水等"], "traps": ["含沙量只看降水，不看植被、土质和人类活动。", "暖流和寒流只按南北方向判断，忽略纬度来源。", "水库作用只写发电，漏防洪、供水、灌溉和生态。", "春汛 vs 夏汛：误区是“以为春汛水量比夏汛大。”；正确辨析是“东北的河流虽然有春汛，但全年的主汛期依然是夏汛！ 因为夏季的雨水补给量远远大于春季的积雪融水量。”。", "冰川融水 vs 积雪融水：误区是“以为两者是一回事。”；正确辨析是“冰川（永久性冰雪）融水： 发生在夏季（气温最高时），影响我国西北； 季节性积雪融水： 发生在春季（刚刚回暖越过0℃时），影响我国东北。”。", "寒流一定冷？暖流一定热？：误区是“以为寒流的水温绝对低于暖流。”；正确辨析是“大错特错！ 寒暖流是相对概念，是和“同纬度的周边海水”比。低纬度的寒流（比如赤道附近的秘鲁寒流），水温绝对比高纬度的暖流（比如挪威暖流）要高得多！”。"], "chain": ["补给来源", "季节变化", "地形植被", "工程活动", "水文特征"], "cards": ["陆地水体", "河流补给", "水文特征", "暖流", "寒流", "春汛 vs 夏汛", "冰川融水 vs 积雪融水", "寒流一定冷？暖流一定热？"], "guide": {"file": "高中地理选修一·第四单元学习指南.docx", "examStatus": "高考地位： 极高频大题考区！在浙江选考中，分值约为 6-10分。这部分极少考死记硬背，几乎全是给你一个陌生的湖泊或河流，让你算“水账”，或者考查极端天气（如厄尔尼诺）对全球的影响。", "commonTypes": "常考题型： 浙江卷最爱考“内陆湖泊面积变化的原因分析”（如咸海、青海湖的变迁）；以及“洋流对海洋渔场和气候的影响”；近年来“海气相互作用（厄尔尼诺/拉尼娜）”也是压轴大题的热门。", "goal": "学习目标： 熟练掌握河流的五种补给类型及流量曲线图判读；闭上眼睛能画出全球洋流分布模式图；彻底弄懂厄尔尼诺和拉尼娜是怎么“捣乱”的。", "framework": ["这一章的知识从陆地延伸到海洋，再上升到海空联合，逻辑递进非常清晰：", "第四章 水的运动", "第一节 陆地水体及其相互关系", "陆地水体类型：河流、湖泊、冰川、地下水等", "河流的五大补给类型：雨水、季节性积雪融水、冰川融水、地下水、湖泊水", "相互关系：“丰水期”河水补给湖泊/地下水；“枯水期”湖泊/地下水补给河水", "第二节 洋流及其地理意义", "洋流的分类：暖流（由水温高流向水温低）、寒流（由水温低流向水温高）", "全球洋流分布规律（核心图）：副热带海区大洋环流（北顺南逆）、副极地海区大洋环流（北逆南无）", "洋流对地理环境的影响（气候、海洋生物、航海、海洋污染）", "第三节 海洋与大气相互作用（最难点！）", "正常年份的海气水分、热量交换（沃克环流）", "厄尔尼诺现象（赤道中东太平洋异常增温及影响）", "拉尼娜现象（赤道中东太平洋异常降温及影响）"], "mistakes": [{"term": "春汛 vs 夏汛", "wrong": "以为春汛水量比夏汛大。", "right": "东北的河流虽然有春汛，但全年的主汛期依然是夏汛！ 因为夏季的雨水补给量远远大于春季的积雪融水量。"}, {"term": "冰川融水 vs 积雪融水", "wrong": "以为两者是一回事。", "right": "冰川（永久性冰雪）融水： 发生在夏季（气温最高时），影响我国西北； 季节性积雪融水： 发生在春季（刚刚回暖越过0℃时），影响我国东北。"}, {"term": "寒流一定冷？暖流一定热？", "wrong": "以为寒流的水温绝对低于暖流。", "right": "大错特错！ 寒暖流是相对概念，是和“同纬度的周边海水”比。低纬度的寒流（比如赤道附近的秘鲁寒流），水温绝对比高纬度的暖流（比如挪威暖流）要高得多！"}]}}, {"id": "x1u5", "title": "整体性与差异性", "diagram": "ecology", "tags": ["zonal", "ecology"], "teacher": "糖糖，整体性写牵一发而动全身，差异性写纬度、干湿度和垂直分异。2024 浙江就考了植被上限和山地带谱。", "concepts": ["自然环境要素相互联系，气候、水文、土壤、植被、地貌会联动变化。", "纬度地带性由热量差异主导，干湿度地带性由水分差异主导。", "山地垂直分异随海拔变化，基带取决于山地所在水平自然带。", "气候变暖可推动某些植被带向高纬或高海拔扩展。", "这一章只有两个核心词汇：“整体”（相互联系）和“差异”（各有不同）。请在脑海中建立以下框架：", "第五章 自然环境的整体性与差异性", "第一节 自然环境的整体性", "五大自然地理要素：气候、地貌、水文、土壤、生物（植被是最直观的标志）"], "traps": ["植被上限上升不等于雪线下降。", "比较垂直带谱忘记基带和相对高度。", "只写气候变化，不写土壤、水文、植被响应。", "林线 vs 雪线：误区是“以为两者受同一个因素影响。”；正确辨析是“雪线看降水（降水多，雪线低）； 林线（森林能长到的最高界线）主要看热量和风（气温高，林线高；风太大，树长不高，林线低）。”。", "经度地带性 vs 纬度地带性：误区是“名字和方向容易记反。”；正确辨析是“纬度地带性： 随纬度变化（南北变），是热量主导； 经度地带性（干湿度地带性）： 随经度变化（东西变，如从沿海到内陆），是水分主导。”。", "整体性 vs 差异性：误区是“在大题里不知用哪个原理答题。”；正确辨析是“题目问**“A导致B、B导致C”（因果关系、牵一发而动全身）用整体性**； 题目问**“为什么甲地和乙地不一样”用差异性**。”。"], "chain": ["主导因素", "要素联系", "空间分异", "具体表现", "利用保护"], "cards": ["自然环境整体性", "纬度地带性", "干湿度地带性", "垂直带谱", "基带", "林线 vs 雪线", "经度地带性 vs 纬度地带性", "整体性 vs 差异性"], "guide": {"file": "高中地理选修一·第五单元学习指南.docx", "examStatus": "高考地位： 综合大题的“万能钥匙”！在浙江选考中，分值在 8-10分。这部分极少考单纯的选择题，而是经常作为压轴大题的核心答题逻辑（比如让你评价某项工程对生态环境的影响，或者分析某座大山的植被分布）。", "commonTypes": "常考题型： 浙江卷最爱考“山地垂直自然带谱的判读”（如喜马拉雅山、天山、长白山的植被分布规律）；以及利用“整体性原理”分析人类砍伐森林、修建水库带来的连锁反应。", "goal": "学习目标： 熟记自然环境的五大要素；深刻理解“牵一发而动全身”的道理；闭上眼睛能画出水平地域分异规律，并彻底搞懂“雪线”和“林线”的判断秘诀。", "framework": ["这一章只有两个核心词汇：“整体”（相互联系）和“差异”（各有不同）。请在脑海中建立以下框架：", "第五章 自然环境的整体性与差异性", "第一节 自然环境的整体性", "五大自然地理要素：气候、地貌、水文、土壤、生物（植被是最直观的标志）", "要素间相互联系、相互制约（物质循环与能量交换）", "“牵一发而动全身”（一个要素改变，引起其他要素甚至整个环境改变）", "第二节 自然环境的地域差异（地域分异规律）", "纬度地带性分异： 东西延伸、南北更替（以热量为基础，如从海南到黑龙江）", "干湿度（经度）地带性分异： 南北延伸、东西更替（以水分为基础，如从浙江到新疆）", "垂直分异规律： 随海拔升高而变化（水热状况同时改变，如“一山有四季”）", "地方性分异（非地带性）： 不按套路出牌（受地形起伏、洋流、地下水等局部因素干扰，如沙漠里的绿洲）"], "mistakes": [{"term": "林线 vs 雪线", "wrong": "以为两者受同一个因素影响。", "right": "雪线看降水（降水多，雪线低）； 林线（森林能长到的最高界线）主要看热量和风（气温高，林线高；风太大，树长不高，林线低）。"}, {"term": "经度地带性 vs 纬度地带性", "wrong": "名字和方向容易记反。", "right": "纬度地带性： 随纬度变化（南北变），是热量主导； 经度地带性（干湿度地带性）： 随经度变化（东西变，如从沿海到内陆），是水分主导。"}, {"term": "整体性 vs 差异性", "wrong": "在大题里不知用哪个原理答题。", "right": "题目问**“A导致B、B导致C”（因果关系、牵一发而动全身）用整体性**； 题目问**“为什么甲地和乙地不一样”用差异性**。"}]}}]}, {"id": "x2", "name": "选择性必修2", "source": "地理选择性必修2区域发展.pdf：区域、资源环境与发展、城市产业发展、区际联系与协调。", "units": [{"id": "x2u1", "title": "区域与区域发展", "diagram": "region", "tags": ["region", "population"], "teacher": "糖糖，区域题第一步永远是定位。位置、自然条件、资源、人口、产业、交通和政策一起看，答案才不单薄。", "concepts": ["区域具有范围、边界、层级和内部相似性，并与外部保持联系。", "区域差异来自自然条件、资源禀赋、历史基础、产业结构和政策制度。", "区域发展阶段不同，主导问题和优化方向不同。", "区域比较要抓优势、限制、联系和发展路径。", "这一章的逻辑是一条直线：先认识它是什么，再看它走到了哪一步，最后看不同地方怎么合作。", "第一章 认识区域", "第一节 区域及其类型", "区域的含义：地球表面一定的空间范围。"], "traps": ["把所有区域边界都理解成行政边界。", "只比较自然条件，不比较交通和产业。", "区域发展只写资金不足，漏环境约束。", "第一、二、三产业：误区是“分不清哪些算三产。”；正确辨析是“一产是直接从大自然获取（农林牧渔）；二产是加工制造（工业、建筑业）；三产是服务（交通、旅游、金融、互联网、外卖等）。”。", "高效益阶段 = 没有工业？：误区是“以为到了最高阶段，就不搞制造业了。”；正确辨析是“大错特错！ 高效益阶段依然有工业，只不过从“低端劳动密集型（如制衣）”升级成了**“高端技术密集型（如造大飞机、芯片、新能源汽车）”**。实体经济永远是根本！”。", "区域界线的性质：误区是“以为所有的地图分界线都是一条严丝合缝的线。”；正确辨析是“再次强调：自然区域多为过渡性质（模糊界线）；人文行政区域多为明确界线。”。"], "chain": ["区域定位", "优势条件", "限制因素", "发展阶段", "优化方向"], "cards": ["区域", "区域差异", "区域联系", "发展阶段", "主体功能区", "第一、二、三产业", "高效益阶段 = 没有工业？", "区域界线的性质"], "guide": {"file": "高中地理选修二·第一单元学习指南.docx", "examStatus": "高考地位： 宏观背景章节，综合大题的基础！在浙江选考中，分值约为 4-6分。它本身可能不会出很难的计算题，但它是后面所有“区域经济发展”大题的理论基石。", "commonTypes": "常考题型： 浙江卷最喜欢给你两个截然不同的地方（比如浙江 vs 贵州，或者美国东北部 vs 中国长三角），让你对比它们的区域特征；或者给出一组产业数据图，让你判断这个城市正处于什么“发展阶段”。", "goal": "学习目标： 搞懂“区域”到底是什么（四大特征）；学会看产业结构变化图，精准判断一个地方是穷还是富（发展阶段）；掌握“因地制宜”这个地理学的最高智慧。", "framework": ["这一章的逻辑是一条直线：先认识它是什么，再看它走到了哪一步，最后看不同地方怎么合作。", "第一章 认识区域", "第一节 区域及其类型", "区域的含义：地球表面一定的空间范围。", "区域的四大特征：整体性、差异性、开放性、动态性。", "区域的类型：均质区（如气候区）、结节区/功能区（如都市圈）。", "第二节 区域发展阶段（核心！）", "传统农业为主体阶段（以第一产业为主，穷）", "工业化阶段（以第二产业为主，快速致富，但污染重）", "高效益的综合发展阶段（以第三产业和高新技术为主，富裕且环保）", "第三节 区域发展差异与因地制宜", "区域差异的比较（自然环境差异 vs 社会经济差异）", "我国的区域差异（南方与北方、东部与西部）", "因地制宜原则（宜农则农，宜工则工，扬长避短）"], "mistakes": [{"term": "第一、二、三产业", "wrong": "分不清哪些算三产。", "right": "一产是直接从大自然获取（农林牧渔）；二产是加工制造（工业、建筑业）；三产是服务（交通、旅游、金融、互联网、外卖等）。"}, {"term": "高效益阶段 = 没有工业？", "wrong": "以为到了最高阶段，就不搞制造业了。", "right": "大错特错！ 高效益阶段依然有工业，只不过从“低端劳动密集型（如制衣）”升级成了**“高端技术密集型（如造大飞机、芯片、新能源汽车）”**。实体经济永远是根本！"}, {"term": "区域界线的性质", "wrong": "以为所有的地图分界线都是一条严丝合缝的线。", "right": "再次强调：自然区域多为过渡性质（模糊界线）；人文行政区域多为明确界线。"}]}}, {"id": "x2u2", "title": "资源环境与区域发展", "diagram": "resource", "tags": ["resource", "environment", "industry"], "teacher": "糖糖，资源型地区不是资源多就一定发达。要写开发条件、环境代价、产业链延伸和转型。", "concepts": ["资源开发受资源禀赋、市场需求、交通条件、技术水平和生态约束影响。", "资源型地区可能面临产业单一、生态破坏、就业压力和财政困难。", "资源安全强调供给稳定、运输通道、储备体系、替代技术和需求管理。", "循环利用和绿色矿山建设有助于提高资源利用效率。", "这一章的结构非常像在医院看病，分为两大“科室”：", "第二章 资源、环境与区域发展", "第一节 生态脆弱区的综合治理（给环境治病）", "常见病症：土地荒漠化（西北干旱区）、水土流失（黄土高原）、石漠化（西南喀斯特地区）"], "traps": ["资源丰富等同于经济发达。", "治理矿区只写停采，忽视就业和替代产业。", "只从调入地角度评价资源调配。", "生态退化 vs 环境污染：误区是“把水土流失说成是环境污染。”；正确辨析是“生态退化（生态破坏）： 是指植被破坏、水土流失、荒漠化、生物多样性减少（主要是**“少了”什么）； 环境污染： 是指雾霾、水污染、乱扔垃圾（主要是“多了”**什么有害物质）。”。", "资源枯竭型城市转型 = 放弃工业？：误区是“以为煤挖完了，就不搞工业，全去搞旅游了。”；正确辨析是“绝对不是！ 转型不是完全抛弃工业，而是**“延长产业链”（以前只卖原煤，现在把煤变成电、变成化工产品卖），并发展新兴工业**（制造装备等），同时辅助发展第三产业。”。", "打坝淤地 vs 修建水库：误区是“以为两者作用完全一样。”；正确辨析是“打坝淤地主要在黄土高原的沟谷里，核心目的是**“拦泥沙、造耕地”；修建水库主要在大江大河上，核心目的是“防洪、发电、灌溉”**。”。"], "chain": ["资源禀赋", "开发条件", "环境影响", "产业链升级", "转型治理"], "cards": ["资源开发", "资源枯竭", "战略性矿产", "产业链", "生态修复", "生态退化 vs 环境污染", "资源枯竭型城市转型 = 放弃工业？", "打坝淤地 vs 修建水库"], "guide": {"file": "高中地理选修二·第二单元学习指南.docx", "examStatus": "高考地位： 综合大题的“提分大户”！在浙江选考中，分值在 8-10分 左右。这是体现国家“生态文明建设”核心价值观的绝对主阵地。", "commonTypes": "常考题型： 浙江卷最喜欢给你一个深受生态破坏（如沙漠化、水土流失）或经济衰退（如挖光了煤炭的老矿城）折磨的地区，让你“分析其衰落的原因，并提出重振雄风的对策”。", "goal": "学习目标： 掌握“生态脆弱区”发病的原因与治病药方；搞懂“资源枯竭型城市”该如何涅槃重生；熟练默写高考必考的“可持续发展对策模板”。", "framework": ["这一章的结构非常像在医院看病，分为两大“科室”：", "第二章 资源、环境与区域发展", "第一节 生态脆弱区的综合治理（给环境治病）", "常见病症：土地荒漠化（西北干旱区）、水土流失（黄土高原）、石漠化（西南喀斯特地区）", "发病原因：自然原因（气候、地形、土壤异常） + 人为原因（过度开垦、放牧、樵采等）", "治病药方：工程措施（打坝淤地）、生物措施（植树种草）、农业技术措施（滴灌、轮作）、管理措施（生态移民）", "第二节 资源枯竭型城市的转型发展（给经济治病）", "生命周期：兴起期 繁荣期 衰退期（资源枯竭/环境恶化）", "衰退原因：产业结构单一、资源面临枯竭、环境污染严重、新技术革命的冲击", "经济：调整产业结构（发展新兴工业和第三产业）", "生态：治理环境污染，恢复生态", "社会：完善交通，加强工人的职业培训"], "mistakes": [{"term": "生态退化 vs 环境污染", "wrong": "把水土流失说成是环境污染。", "right": "生态退化（生态破坏）： 是指植被破坏、水土流失、荒漠化、生物多样性减少（主要是**“少了”什么）； 环境污染： 是指雾霾、水污染、乱扔垃圾（主要是“多了”**什么有害物质）。"}, {"term": "资源枯竭型城市转型 = 放弃工业？", "wrong": "以为煤挖完了，就不搞工业，全去搞旅游了。", "right": "绝对不是！ 转型不是完全抛弃工业，而是**“延长产业链”（以前只卖原煤，现在把煤变成电、变成化工产品卖），并发展新兴工业**（制造装备等），同时辅助发展第三产业。"}, {"term": "打坝淤地 vs 修建水库", "wrong": "以为两者作用完全一样。", "right": "打坝淤地主要在黄土高原的沟谷里，核心目的是**“拦泥沙、造耕地”；修建水库主要在大江大河上，核心目的是“防洪、发电、灌溉”**。"}]}}, {"id": "x2u3", "title": "城市产业与区域发展", "diagram": "urban", "tags": ["city", "industry", "transport"], "teacher": "糖糖，城市群和产业转移题看分工协作。核心城市负责辐射带动，不是把所有产业都留在中心。", "concepts": ["城市群依靠交通通信和产业联系形成网络化空间结构。", "产业转移受劳动力、土地、市场、环境政策、产业基础和技术变化影响。", "创新、人才、资本和高端服务支撑区域产业升级。", "都市圈轨道交通会改变通勤、产业布局和空间形态。", "这一章的逻辑是“点—线—面”的动态演变：", "第三章 城市、产业与区域发展", "第一节 城市的辐射功能", "腹地（城市服务的范围）：腹地越大，城市越强"], "traps": ["产业转移方向固定理解为发达地区到欠发达地区。", "只写承接产业的好处，漏污染转移和低端锁定。", "中心城市等级高不代表所有服务距离最近。", "产业转移 vs 产业集聚：误区是“以为两者是对立的。”；正确辨析是“其实是相辅相成的。产业转移是企业从A地搬到B地；搬到B地后，往往会吸引上下游企业跟着一起来，从而在B地形成新的产业集聚。”。", "劳动密集型转移 = 低级落后？：误区是“以为中西部承接这些产业吃亏了。”；正确辨析是“对于处在“工业化初期”的中西部或落后国家来说，承接劳动密集型产业是积累资金、解决老百姓吃饭（就业）问题的必经之路，饭要一口一口吃，不能直接跨越去造芯片。”。", "交通的发展与产业转移：误区是“以为路修好了，落后地区的工厂就多了。”；正确辨析是“不一定。路修好了确实降低了运输成本（有利于承接产业），但也可能加剧落后地区的**“虹吸效应”**（当地的人才和资源跑得更快了）。需要综合分析。”。"], "chain": ["核心城市", "交通网络", "产业分工", "要素流动", "协同治理"], "cards": ["城市群", "都市圈", "产业转移", "创新网络", "区域分工", "产业转移 vs 产业集聚", "劳动密集型转移 = 低级落后？", "交通的发展与产业转移"], "guide": {"file": "高中地理选修二·第三单元学习指南.docx", "examStatus": "高考地位： 必考压轴大戏！在浙江选考中，分值在 8-10分 左右。不仅选择题爱考数据图，综合大题的最后一问往往就是“评价某产业转移对当地的影响”。", "commonTypes": "常考题型： 浙江卷最爱考“上海对长三角（特别是浙江）的辐射带动作用”，以及“为什么浙江的服装厂/鞋厂要搬到中西部或者东南亚去（产业转移）”。", "goal": "学习目标： 理解大城市是如何通过交通网带动周边发展的（辐射功能）；搞懂产业结构是怎么一步步“升级”的；熟练默写“产业转移对转出地和转入地的利与弊”（这可是价值4分的万能金句）。", "framework": ["这一章的逻辑是“点—线—面”的动态演变：", "第三章 城市、产业与区域发展", "第一节 城市的辐射功能", "腹地（城市服务的范围）：腹地越大，城市越强", "辐射功能的表现：产业转移、技术人才输出、资金支持", "典型案例：纽约的发展、上海对长三角的辐射", "第二节 地区产业结构变化", "产业结构变化的动力：经济发展、技术创新、国家政策", "产业演变的规律：一产下降 二产先升后降 三产持续上升", "典型案例：深圳从“小渔村”到“世界工厂”再到“中国硅谷”的蜕变", "第三节 产业转移对区域发展的影响（核心重头戏！）", "产业转移的规律：先转劳动/资源密集型，后转资本/技术密集型", "驱动力：追求更高的利润（降低土地和劳动力成本、开拓市场）", "对区域的影响：转出地（如浙江） vs 转入地（如中西部、越南）"], "mistakes": [{"term": "产业转移 vs 产业集聚", "wrong": "以为两者是对立的。", "right": "其实是相辅相成的。产业转移是企业从A地搬到B地；搬到B地后，往往会吸引上下游企业跟着一起来，从而在B地形成新的产业集聚。"}, {"term": "劳动密集型转移 = 低级落后？", "wrong": "以为中西部承接这些产业吃亏了。", "right": "对于处在“工业化初期”的中西部或落后国家来说，承接劳动密集型产业是积累资金、解决老百姓吃饭（就业）问题的必经之路，饭要一口一口吃，不能直接跨越去造芯片。"}, {"term": "交通的发展与产业转移", "wrong": "以为路修好了，落后地区的工厂就多了。", "right": "不一定。路修好了确实降低了运输成本（有利于承接产业），但也可能加剧落后地区的**“虹吸效应”**（当地的人才和资源跑得更快了）。需要综合分析。"}]}}, {"id": "x2u4", "title": "区际联系与区域协调", "diagram": "coordination", "tags": ["coordination", "transport", "resource"], "teacher": "糖糖，区际联系题要同时写资源、产业、资金、技术、人口和生态补偿。跨区域工程一定分调出地、调入地和沿线。", "concepts": ["区域联系包括资源、产业、人口、资金、技术、信息和生态联系。", "区域协调发展强调优势互补、分工协作和公共服务均衡。", "跨区域工程需评价调出地、调入地和沿线地区影响。", "生态补偿体现保护责任、发展权和区域公平。", "这一章的逻辑非常清晰，主要分为“水”（流域内）和“源”（跨区域资源）两条主线：", "第四章 区际联系与区域协调发展", "第一节 流域内协调发展", "流域的特征：整体性强，上下游唇齿相依。"], "traps": ["只写调入地收益，漏调出地和沿线影响。", "把生态补偿理解成简单赔钱。", "忽视工程建设对生态和移民的影响。", "南水北调引发盐碱化：误区是“以为调水对生态全是好处。”；正确辨析是“要注意副作用！ 南水北调的东线和中线引水到华北后，如果管理不当发生渗漏，会导致华北平原地下水位上升。华北蒸发强烈，极其容易引发土壤次生盐碱化。”。", "西气东输解决所有能源问题：误区是“以为有了天然气，东部就不缺电了。”；正确辨析是“错误！ 西气东输、西电东送只能**“缓解”**东部的能源紧张，不能“彻底解决”。因为东部经济发展太快了，胃口太大。”。", "“一带一路”只属于中国：误区是“以为这是中国一厢情愿给别人修路。”；正确辨析是““一带一路”是国际大合作！ 核心是“共商共建共享”，目的是让沿线国家的基础设施互联互通，把中国的工业产能优势和沿线国家的资源/市场优势结合起来，是双赢。”。"], "chain": ["区域差异", "互补需求", "通道建设", "利益分配", "协调机制"], "cards": ["区域协调", "生态补偿", "西电东送", "南水北调", "产业协作", "南水北调引发盐碱化", "西气东输解决所有能源问题", "“一带一路”只属于中国"], "guide": {"file": "高中地理选修二·第四单元学习指南.docx", "examStatus": "高考地位： 高考必考的宏观大题阵地！在浙江选考中，分值在 8-10分。这部分最喜欢出在综合大题的最后两问，考查你对国家大政方针的理解。", "commonTypes": "常考题型： 浙江卷极度偏爱考查“某项跨区域工程（引水、引气、引电）对两地的影响”；以及“河流上下游该如何协同发展（流域治理）”。", "goal": "学习目标： 熟练默写“资源跨区域调配”对调出地和调入地的影响模板；深刻理解流域上下游“生态补偿”的逻辑；掌握“一带一路”倡议的核心精神。", "framework": ["这一章的逻辑非常清晰，主要分为“水”（流域内）和“源”（跨区域资源）两条主线：", "第四章 区际联系与区域协调发展", "第一节 流域内协调发展", "流域的特征：整体性强，上下游唇齿相依。", "流域协作的措施：水资源统一调配、水质保护（生态补偿机制）、水能梯级开发。", "典型案例：黄河流域的治理（上游修水库、中游保水土、下游固堤坝）。", "第二节 资源跨区域调配（核心重头戏！）", "根本原因：资源的自然分布不均 vs 区域经济发展对资源的需求不均。", "南水北调： 缓解北方（华北、西北）水荒。", "西气东输： 将新疆/中亚的天然气输送到长三角、珠三角。", "西电东送： 将西部的火电/水电输送到东部。", "评价模板：对调出地的影响 vs 对调入地的影响。", "第三节 “一带一路”倡议与国际合作", "核心理念：共商、共建、共享。"], "mistakes": [{"term": "南水北调引发盐碱化", "wrong": "以为调水对生态全是好处。", "right": "要注意副作用！ 南水北调的东线和中线引水到华北后，如果管理不当发生渗漏，会导致华北平原地下水位上升。华北蒸发强烈，极其容易引发土壤次生盐碱化。"}, {"term": "西气东输解决所有能源问题", "wrong": "以为有了天然气，东部就不缺电了。", "right": "错误！ 西气东输、西电东送只能**“缓解”**东部的能源紧张，不能“彻底解决”。因为东部经济发展太快了，胃口太大。"}, {"term": "“一带一路”只属于中国", "wrong": "以为这是中国一厢情愿给别人修路。", "right": "“一带一路”是国际大合作！ 核心是“共商共建共享”，目的是让沿线国家的基础设施互联互通，把中国的工业产能优势和沿线国家的资源/市场优势结合起来，是双赢。"}]}}]}, {"id": "x3", "name": "选择性必修3", "source": "地理选择性必修3 资源、环境与国家安全.pdf：资源环境与人类活动、自然资源与国家安全、生态环境保护与国家安全。", "units": [{"id": "x3u1", "title": "资源环境与人类活动", "diagram": "resource", "tags": ["resource", "environment"], "teacher": "糖糖，这册第一章强调人类活动和资源环境关系。答题要有系统观，不要把环境问题只怪给人口多。", "concepts": ["自然资源为人类活动提供物质和能量基础，但分布不均、数量有限。", "环境问题包括资源短缺、生态破坏和环境污染。", "人类活动强度、产业结构、技术水平和管理制度影响环境压力。", "资源环境承载力决定区域开发强度和发展方式。", "这一章的逻辑是“大自然能给我们什么 我们用了什么 我们做错了什么”：", "第一章 资源、环境与人类活动", "第一节 自然环境的服务功能", "供给服务：提供食物、水、木材、矿产等（最基础）"], "traps": ["环境问题只归因于自然条件。", "资源短缺、生态破坏、环境污染三类问题混写。", "只写限制开发，不写优化开发方式。", "生态破坏 vs 环境污染：误区是“以为两者是一回事，混着用。”；正确辨析是“再次强调！生态破坏是“好东西变少了”（如水土流失、荒漠化、物种灭绝）；环境污染是“坏东西变多了”（如雾霾、水体富营养化、重金属超标）。”。", "自然灾害 vs 环境问题：误区是“以为地震、台风也是环境问题。”；正确辨析是“自然灾害是老天爷引发的异常（往往不受人控制，如地震、海啸）；环境问题是人类活动不合理引发的恶果（如过度放牧导致的沙尘暴）。”。", "非可再生资源：误区是“以为矿产资源明天就会用完。”；正确辨析是“虽然矿产无法再生，但随着科技水平的提高，人类可以发现新矿床、提高开采利用率、或者寻找替代品（如用太阳能替代煤炭），从而延长其使用寿命。”。"], "chain": ["资源基础", "人类活动", "环境压力", "承载能力", "调控措施"], "cards": ["自然资源", "环境问题", "资源环境承载力", "人地关系", "绿色发展", "生态破坏 vs 环境污染", "自然灾害 vs 环境问题", "非可再生资源"], "guide": {"file": "高中地理选修三·第一单元学习指南.docx", "examStatus": "高考地位： 压轴大题的“价值观底座”！在浙江选考中，直接考查的分值约 4-6分，但它的理念（人地协调观）贯穿于所有大题的始末。阅卷老师非常看重你的答案里有没有“可持续发展”的觉悟。", "commonTypes": "常考题型： 浙江卷最喜欢考查“某项人类活动破坏了环境的哪种服务功能？”；或者给你一个真实的生态危机（如华北地下水漏斗、某地物种灭绝），让你分析其产生的原因和危害。", "goal": "学习目标： 牢记大自然免费提供给我们的“四大服务功能”；搞懂环境问题产生的根本原理（两个“速度”的失衡）；能够准确区分可再生资源与非可再生资源的界限。", "framework": ["这一章的逻辑是“大自然能给我们什么 我们用了什么 我们做错了什么”：", "第一章 资源、环境与人类活动", "第一节 自然环境的服务功能", "供给服务：提供食物、水、木材、矿产等（最基础）", "调节服务：调节气候、净化空气、涵养水源、防风固沙", "文化服务：提供精神享受、审美体验、游憩旅游（如富春江的风景）", "支撑服务：维持自然环境自身的稳定（如土壤形成、光合作用、养分循环），是其他所有服务的基础", "第二节 自然资源及其利用", "自然资源的属性：自然属性（天然存在）、社会属性（对人类有用）", "自然资源的分类：", "可再生资源（水、土地、生物、气候资源）", "非可再生资源（矿产资源，如煤、石油、铁矿）", "第三节 环境问题及其危害", "产生机理：人类索取 > 资源再生速度；人类排放 > 环境自净能力"], "mistakes": [{"term": "生态破坏 vs 环境污染", "wrong": "以为两者是一回事，混着用。", "right": "再次强调！生态破坏是“好东西变少了”（如水土流失、荒漠化、物种灭绝）；环境污染是“坏东西变多了”（如雾霾、水体富营养化、重金属超标）。"}, {"term": "自然灾害 vs 环境问题", "wrong": "以为地震、台风也是环境问题。", "right": "自然灾害是老天爷引发的异常（往往不受人控制，如地震、海啸）；环境问题是人类活动不合理引发的恶果（如过度放牧导致的沙尘暴）。"}, {"term": "非可再生资源", "wrong": "以为矿产资源明天就会用完。", "right": "虽然矿产无法再生，但随着科技水平的提高，人类可以发现新矿床、提高开采利用率、或者寻找替代品（如用太阳能替代煤炭），从而延长其使用寿命。"}]}}, {"id": "x3u2", "title": "自然资源与国家安全", "diagram": "security", "tags": ["resource", "security"], "teacher": "糖糖，国家安全题要落到资源供给、运输通道、储备、多元化和替代技术，不能停在口号。", "concepts": ["资源安全指资源稳定、可持续、可承受地满足经济社会发展需求。", "粮食安全受耕地数量质量、水资源、种业、技术和贸易影响。", "能源安全受资源储量、进口依存度、运输通道、价格波动和替代技术影响。", "战略性矿产关系产业链供应链和国家安全。", "这一章围绕着四大维度的“安全”展开，请在脑海中建立以下宏观框架：", "第二章 自然资源与国家安全", "第一节 水资源与国家安全", "水资源短缺的类型（资源型、水质型、工程型）"], "traps": ["资源安全只看储量，不看供需和通道。", "只写增加进口，不写多元化和储备。", "忽视节约和效率提升。", "粮食安全 vs 农业经济发展：误区是“把这两者混为一谈，答大题时全写经济。”；正确辨析是“农业经济发展是为了让农民**“赚钱”（可以种花卉、种草莓）； 粮食安全是为了让全国人民“保命活下去”**（必须种水稻、小麦等主粮）。耕地必须优先保主粮！”。", "资源型缺水 vs 水质型缺水：误区是“以为南方绝对不缺水。”；正确辨析是“华北缺水主要是资源型缺水（天不下雨）；而像咱们长三角部分地区，水网密布，但如果工厂乱排污导致水不能喝了，这就叫水质型缺水。”。", "石油安全：误区是“以为我国石油可以自给自足。”；正确辨析是“我国虽然有大庆、胜利油田，但石油对外依存度极高（超过70%），且进口极度依赖“马六甲海峡”，这是我国能源安全最大的软肋。”。"], "chain": ["资源禀赋", "供需格局", "通道风险", "储备替代", "安全保障"], "cards": ["资源安全", "粮食安全", "能源安全", "战略性矿产", "进口依存度", "粮食安全 vs 农业经济发展", "资源型缺水 vs 水质型缺水", "石油安全"], "guide": {"file": "高中地理选修三·第二单元学习指南.docx", "examStatus": "高考地位： 压轴大题的“核心灵魂”！在浙江选考中，分值在 8-10分。每年高考的最后一道综合大题，几乎一定会落脚在“粮食安全”、“能源安全”或“海洋权益”上。", "commonTypes": "常考题型： 浙江卷最爱考“我国某项能源工程（如风电、光伏、核电）的建设对能源安全的意义”；或者结合某地的农业发展，考查“如何保障国家的粮食安全”。", "goal": "学习目标： 牢记“18亿亩耕地红线”的深刻意义；掌握解决能源短缺的“开源节流”万能公式；明白我国为什么要大力建设海洋人工岛礁。", "framework": ["这一章围绕着四大维度的“安全”展开，请在脑海中建立以下宏观框架：", "第二章 自然资源与国家安全", "第一节 水资源与国家安全", "水资源短缺的类型（资源型、水质型、工程型）", "保障水资源安全的对策（开源、节流、治污、调配）", "第二节 耕地资源与国家安全（极其重要！）", "耕地的基本国情：一多三少（总量多，人均少，高质量少，后备少）", "粮食安全战略：“藏粮于地，藏粮于技”", "耕地保护红线：坚守18亿亩", "第三节 矿产资源与国家安全", "矿产国情：总量大，人均少，贫矿多，富矿少", "能源安全威胁：石油、天然气高度依赖进口（马六甲困局）", "保障能源安全：战略储备、进口渠道多元化、开发新能源（风、光、核）", "第四节 海洋空间资源与国家安全"], "mistakes": [{"term": "粮食安全 vs 农业经济发展", "wrong": "把这两者混为一谈，答大题时全写经济。", "right": "农业经济发展是为了让农民**“赚钱”（可以种花卉、种草莓）； 粮食安全是为了让全国人民“保命活下去”**（必须种水稻、小麦等主粮）。耕地必须优先保主粮！"}, {"term": "资源型缺水 vs 水质型缺水", "wrong": "以为南方绝对不缺水。", "right": "华北缺水主要是资源型缺水（天不下雨）；而像咱们长三角部分地区，水网密布，但如果工厂乱排污导致水不能喝了，这就叫水质型缺水。"}, {"term": "石油安全", "wrong": "以为我国石油可以自给自足。", "right": "我国虽然有大庆、胜利油田，但石油对外依存度极高（超过70%），且进口极度依赖“马六甲海峡”，这是我国能源安全最大的软肋。"}]}}, {"id": "x3u3", "title": "生态环境保护与国家安全", "diagram": "ecology", "tags": ["ecology", "environment", "sustain"], "teacher": "糖糖，生态安全题必须把生态功能说具体：涵养水源、保持水土、防风固沙、维护生物多样性。", "concepts": ["生态安全关系生态系统结构稳定、功能持续和人类福祉。", "重要生态功能区承担水源涵养、水土保持、防风固沙和生物多样性维护。", "碳排放治理需要国际合作、能源转型、产业升级和节能减排。", "生态保护红线和国土空间管控是保障生态安全的重要制度。", "这一章的逻辑从“底线”延伸到“全球”，请在脑海中建立以下宏大框架：", "第三章 环境安全与国家安全", "第一节 环境安全对国家安全的影响", "环境安全的本质：环境处于没有危险或不受威胁的状态。"], "traps": ["生态保护区完全不能发展，应改为生态友好型发展。", "生态修复只写植树造林，忽视因地制宜。", "生物多样性保护等同于保护单个物种。", "碳达峰 vs 碳中和：误区是“以为碳达峰就是不排碳了。”；正确辨析是“碳达峰是排放量到了“峰顶”（依然在排，只是不再增加了）；碳中和是“排放量=吸收量”（达到净零排放）。先达峰，后中和。”。", "臭氧层破坏 vs 全球气候变暖：误区是“以为是同一种气体造成的。”；正确辨析是“全球变暖的罪魁祸首是二氧化碳、甲烷等温室气体； 臭氧层破坏（南极臭氧空洞）的罪魁祸首是制冷剂（如氟利昂）。虽然两者都是全球性环境问题，但机理完全不同。”。", "生态保护红线 = 永久基本农田？：误区是“以为红线里就是种庄稼的田。”；正确辨析是“生态保护红线是为了保护水、大森林、珍稀动物（如水源涵养区、国家公园）；而永久基本农田是为了保粮食安全。两者是不同的“红线”，绝不能混淆。”。"], "chain": ["生态功能", "退化原因", "安全影响", "保护修复", "制度保障"], "cards": ["生态安全", "生态红线", "碳排放", "水源涵养", "生物多样性", "碳达峰 vs 碳中和", "臭氧层破坏 vs 全球气候变暖", "生态保护红线 = 永久基本农田？"], "guide": {"file": "高中地理选修三·第三单元学习指南.docx", "examStatus": "高考地位： 压轴大题的“时政风向标”！在浙江选考中，分值在 4-6分。这部分极少考死记硬背的理论，而是常常结合最新的国际时事（如联合国气候大会、日本核污水排海等）来考查你的综合分析能力。", "commonTypes": "常考题型： 浙江卷极度偏爱考查“全球变暖对某地区（特别是沿海地区或极地）的影响”；以及结合具体的区域，考查“如何实现碳达峰与碳中和（减排措施）”。", "goal": "学习目标： 深刻理解“生态保护红线”的不可逾越性；彻底弄懂“碳达峰”和“碳中和”到底是什么、怎么做；掌握突发环境事件与跨国污染的应对策略。", "framework": ["这一章的逻辑从“底线”延伸到“全球”，请在脑海中建立以下宏大框架：", "第三章 环境安全与国家安全", "第一节 环境安全对国家安全的影响", "环境安全的本质：环境处于没有危险或不受威胁的状态。", "环境安全问题的触发：突发性（如化工厂爆炸） vs 累积性（如全球变暖）。", "第二节 环境污染与国家安全", "突发环境事件：极具破坏性、隐蔽性、扩散性（如切尔诺贝利核泄漏）。", "跨国环境污染：污染物通过河流、大气或贸易（洋垃圾）跨越国界。", "第三节 生态保护与国家安全（守住底线）", "建立自然保护区：核心区（严禁进入）、缓冲区、实验区。", "划定生态保护红线：国家生态安全的底线和生命线！", "第四节 全球气候变化与国家安全（全球视野）", "现状与趋势：温室气体激增导致全球气候变暖。", "带来的安全威胁：海平面上升、极端天气频发、粮食减产、物种灭绝。"], "mistakes": [{"term": "碳达峰 vs 碳中和", "wrong": "以为碳达峰就是不排碳了。", "right": "碳达峰是排放量到了“峰顶”（依然在排，只是不再增加了）；碳中和是“排放量=吸收量”（达到净零排放）。先达峰，后中和。"}, {"term": "臭氧层破坏 vs 全球气候变暖", "wrong": "以为是同一种气体造成的。", "right": "全球变暖的罪魁祸首是二氧化碳、甲烷等温室气体； 臭氧层破坏（南极臭氧空洞）的罪魁祸首是制冷剂（如氟利昂）。虽然两者都是全球性环境问题，但机理完全不同。"}, {"term": "生态保护红线 = 永久基本农田？", "wrong": "以为红线里就是种庄稼的田。", "right": "生态保护红线是为了保护水、大森林、珍稀动物（如水源涵养区、国家公园）；而永久基本农田是为了保粮食安全。两者是不同的“红线”，绝不能混淆。"}]}}]}], "realBank": [{"id": "r2024d", "tags": ["solar", "earthmove"], "source": "2024年浙江1月解析卷第22-23题", "stem": "K、Q两地学生观测日出时直立杆影年变化。根据夏至、冬至日出方位和北京时间差异，判断两地相对位置与昼长差异。", "options": ["杆影张角反映日出方位年变化，昼长年变化幅度大的地点纬度更高", "杆影变化只反映经度差异，与纬度无关", "夏至日我国各地日出均为正东", "同一日期晨线与经线夹角各地完全不同"], "answer": 0, "explain": "夏至日出东北、冬至日出东南；日出时间年变化幅度与纬度相关，时间中心可反推经度。"}, {"id": "r2022d", "tags": ["solar", "earthmove"], "source": "2022年浙江6月解析卷第19-20题", "stem": "某中学生观测北极星光线与正午太阳光线夹角的年变化。符合“昼变短，夜比昼长”的时段是", "options": ["秋分日至冬至日", "春分日至夏至日", "夏至日至秋分日", "冬至日至春分日"], "answer": 0, "explain": "北半球秋分后昼短夜长，且到冬至前昼继续变短；北极星仰角等于当地纬度，可辅助判断太阳高度。"}, {"id": "r2024a", "tags": ["population", "industry", "region"], "source": "2024年浙江1月解析卷第1-2题", "stem": "关中—天水经济区人口点密度与阎良航空产业基地情境：人口分布主控自然因素和产业基地远离中心城区的原因。", "options": ["地形影响人口分布；阎良土地供给充足且航空产业基础较好", "降水影响人口分布；阎良市场需求大且劳动力更丰富", "植被影响人口分布；阎良靠近消费市场", "气温影响人口分布；阎良运输成本最低"], "answer": 0, "explain": "关中平原人口密集、山地高原稀疏，主控自然因素是地形；阎良航空产业起步早，土地供给更充足。"}, {"id": "r2024b", "tags": ["zonal", "ecology"], "source": "2024年浙江1月解析卷第3-4题", "stem": "钦博拉索峰植被上限由4600米升至5185米，土壤温度升高。最合理的地理推理是", "options": ["地面吸收增加，森林带可能向高海拔扩展", "地面辐射减少，雪线海拔下降", "太阳辐射突然增强，自然带数量减少", "大气辐射减少，上限植被必为高山草甸"], "answer": 0, "explain": "土壤增温与地面吸收增加有关；热量条件改善可推动森林带向高海拔扩展。"}, {"id": "r2024c", "tags": ["transport", "city"], "source": "2024年浙江1月解析卷第5-6题", "stem": "都市圈轨道交通与城市空间形态情境：市区地铁、市郊铁路、高速铁路的空间作用差异。", "options": ["市区地铁站点密，市郊铁路联系近远郊，高速铁路站点少且距离远", "高速铁路站点最密，主要服务中心城区内部", "市郊铁路只服务远距离跨省客运", "轨道交通一定使通勤距离缩短"], "answer": 0, "explain": "不同轨道交通服务尺度不同；轨道交通常促进近郊产业沿轴线集聚，而不是简单缩短距离。"}, {"id": "r2023a", "tags": ["agriculture", "ecology", "sustain"], "source": "2023年浙江6月解析卷第1-2题", "stem": "城市公园稻鱼生态系统将田埂改为鱼道，其主要生态作用是", "options": ["拓展生物通道", "扩大水稻播种面积", "保障游客安全", "显著增加雨水下渗"], "answer": 0, "explain": "鱼道把原本分割的稻田水体连通，利于鱼类活动，核心是生态连通性。"}, {"id": "r2023b", "tags": ["landform", "tectonic"], "source": "2023年浙江6月解析卷第3-4题", "stem": "广东丹霞地貌发育于白垩纪红色地层，岩层有层理和砾石夹杂。该地貌物质组成及古气候判断为", "options": ["砂砾岩，暖湿", "石灰岩，冷湿", "花岗岩，暖干", "石英岩，冷干"], "answer": 0, "explain": "层理和砾石夹杂指向沉积形成的砂砾岩；流水沉积和副高、信风背景对应暖湿。"}, {"id": "r2023c", "tags": ["resource", "security", "industry"], "source": "2023年浙江6月解析卷第5-6题", "stem": "钨被列入战略性矿产资源，且企业构建钨全产业链。核心目的和下游环节分别是", "options": ["实现资源领域安全可控；钨制品回收利用", "主导上游采掘；钨矿勘探采掘", "扩大原矿贸易；钨矿石出口", "降低环保要求；粗放冶炼加工"], "answer": 0, "explain": "战略性矿产服务资源安全；回收利用属于产业链下游和循环利用。"}, {"id": "r2023d", "tags": ["population", "region"], "source": "2023年浙江1月解析卷第1-2题", "stem": "中亚五国人口、面积和地形情境：人口密度计算及东南部人口较密集的自然因素。", "options": ["哈萨克斯坦人口密度较小；水源是东南部人口较密集的关键", "塔吉克斯坦人口密度较小；热量是关键", "土库曼斯坦人口密度较小；矿产是关键", "吉尔吉斯斯坦人口密度较小；土壤是关键"], "answer": 0, "explain": "中亚干旱，水资源是人口分布的突出限制因素；人口密度需人口除以面积。"}, {"id": "r2023e", "tags": ["landform"], "source": "2023年浙江1月解析卷第3-4题", "stem": "新疆东部雅丹地貌残丘岩壁上有“小蘑菇”，该地被视为畏途。最合理判断是", "options": ["风化侵蚀形成；风沙强劲且极度干旱", "流水沉积形成；滑坡广布", "冰川刨蚀形成；空气稀薄", "海浪侵蚀形成；降水丰沛"], "answer": 0, "explain": "雅丹位于干旱区，昼夜温差大、风力强，主要表现为风化和风蚀。"}, {"id": "r2023f", "tags": ["ecology", "sustain"], "source": "2023年浙江1月解析卷第5-6题", "stem": "海南热带雨林国家公园生态系统生产总值高，净化空气属于哪类服务，主要原因是什么", "options": ["调节服务；森林面积大", "文化服务；纬度跨度大", "物质产品；土壤肥力高", "供给服务；人口密度高"], "answer": 0, "explain": "净化空气是调节服务；热带雨林面积广、生态功能强，使 GEP 高。"}, {"id": "r2022a", "tags": ["landform", "water"], "source": "2022年浙江6月解析卷第1-2题", "stem": "青藏高原冰川消融研学用无人机和3S技术，最适合用于监测冰川面积变化的是", "options": ["RS遥感", "GPS模拟移动", "GIS直接测温", "VR获取厚度"], "answer": 0, "explain": "RS用于远距离获取地表信息，适合监测冰川面积变化；GIS偏分析处理。"}, {"id": "r2022b", "tags": ["ocean", "water"], "source": "2022年浙江6月解析卷第3-4题", "stem": "北大西洋东部洋流情境：低纬流向高纬和高纬流向低纬的洋流性质及影响。", "options": ["低纬向高纬为暖流，高纬向低纬为寒流；寒流沿岸可降温减湿", "两者均为暖流；沿岸必形成大型渔场", "两者均为寒流；暖湿作用明显", "低纬向高纬为寒流；高纬向低纬为暖流"], "answer": 0, "explain": "洋流性质看水温来源；寒流对沿岸有降温减湿作用。"}, {"id": "r2022c", "tags": ["tectonic", "landform"], "source": "2022年浙江6月解析卷第5-6题", "stem": "地质剖面图中寻找化石和判断褶皱构造，关键依据是", "options": ["化石多见于沉积岩；岩层弯曲可指示向斜或背斜", "花岗岩最易保存化石；岩层越新越深", "变质岩化石最多；断层必成谷", "沉积物未成岩也一定含化石"], "answer": 0, "explain": "化石保存依赖沉积岩环境；构造判断需看岩层形态和新老关系。"}, {"id": "r2021a", "tags": ["environment", "landform"], "source": "2021年浙江1月解析卷第1-2题", "stem": "滑坡灾害和地理信息技术情境：BDS、GPS、GIS、RS功能辨析。", "options": ["BDS可监测滑坡体位移，GIS用于空间分析和模拟", "GPS主要采集雨量，RS不能监测地表", "GIS可直接导航定位，BDS只做地图制图", "VR是获取滑坡体真实位移的主要技术"], "answer": 0, "explain": "定位导航系统可用于位移监测，GIS重在空间数据分析处理。"}, {"id": "r2021b", "tags": ["zonal", "ecology"], "source": "2021年浙江1月解析卷第3-4题", "stem": "洞庭湖区从陆地到水底植被差异，反映的分异类型和主导因素是", "options": ["地方性分异；水分和地形变化", "纬度地带性；热量变化", "干湿度地带性；距海远近", "垂直分异；海拔剧烈变化"], "answer": 0, "explain": "湖区小尺度环境差异属于地方性分异，水分和微地形是主控因素。"}, {"id": "r2021c", "tags": ["industry", "region"], "source": "2021年浙江1月解析卷第7-10题", "stem": "产业转移与半导体产业分散布局情境：中部承接产业与企业空间组织。", "options": ["承接劳动密集型和资源密集型产业；互联网促进信息交流和布局分散", "只承接技术密集型产业；交通衰退促使分散", "承接产业与区域差异无关；分散必然降低效率", "产业分散是为了避免所有技术合作"], "answer": 0, "explain": "产业转移与区域发展阶段和成本差异有关，通信技术降低跨地域协作成本。"}, {"id": "r2021d", "tags": ["atmosphere", "monsoon"], "source": "2021年浙江1月解析卷第11-12题", "stem": "气压带风带移动情境：北半球夏季气压带北移时，北印度洋洋流和黄河含沙量判断为", "options": ["北印度洋顺时针；黄河中游含沙量增加", "北印度洋逆时针；黄河进入枯水期", "副极地低压被陆地冷高压切断", "地中海沿岸冬雨最明显"], "answer": 0, "explain": "北半球夏季气压带风带北移，南亚夏季风影响北印度洋洋流顺时针，黄河流域进入雨季。"}, {"id": "r2021e", "tags": ["atmosphere", "agriculture", "sustain"], "source": "2021年浙江1月解析卷第13-14题", "stem": "大棚顶部搭建光伏发电系统，棚内受热过程和农业可持续效益判断为", "options": ["到达棚内太阳辐射减弱；提高土地利用率并增加经济效益", "地面辐射增强；只会降低经济效益", "大气吸收不受影响；土地利用率下降", "地面反射增强；不影响生产方式"], "answer": 0, "explain": "光伏板遮挡使入射太阳辐射减弱；同地兼顾种植和发电，提高综合效益。"}, {"id": "r2019a", "tags": ["solar", "atmosphere"], "source": "2019年浙江6月解析卷第3题", "stem": "夏至日前后圣彼得堡出现“夜晚不黑”现象，主要因为大气对太阳辐射具有", "options": ["散射作用", "反射作用", "吸收作用", "保温作用"], "answer": 0, "explain": "太阳落到地平线下角度较小，大气散射使天空仍有亮度。"}, {"id": "r2017a", "tags": ["solar", "atmosphere"], "source": "2017年浙江11月解析卷第24-25题", "stem": "火星大气稀薄而昼夜温差超过100℃，主要原因是", "options": ["白天大气削弱少，夜晚大气逆辐射弱", "白天大气反射强，夜晚保温强", "火星自转很慢，昼夜长短差异极大", "火星表面吸收大气辐射多"], "answer": 0, "explain": "大气稀薄导致白天削弱作用弱、夜晚保温作用弱。"}, {"id": "r2012a", "tags": ["earthmove", "solar"], "source": "2012年浙江解析卷第11题", "stem": "地表点与太阳直射点纬线差为α、正午太阳高度为H，若H等于α，解题关键是", "options": ["用正午太阳高度公式建立纬度关系", "只看当地海拔高度", "只判断昼夜长短", "用洋流性质判断热量"], "answer": 0, "explain": "正午太阳高度类计算要从H=90°-纬度差入手。"}, {"id": "r2018a", "tags": ["earthmove", "solar"], "source": "2018年浙江11月解析卷综合题", "stem": "某中学观测日落位置年内变化，比较两日正午太阳高度和日出地方时，最应先判断", "options": ["两日对应的太阳直射点位置", "当地产业结构", "盛行风向", "河流含沙量"], "answer": 0, "explain": "日出日落方位、昼长和太阳高度都由太阳直射点季节移动控制。"}, {"id": "r2018b", "tags": ["resource", "industry"], "source": "2018年浙江11月解析卷综合题", "stem": "山西以煤炭、电力、焦化、冶金为主的工业结构，主要问题是", "options": ["资源消耗大、污染物排放多、经济效益偏低", "第三产业比重过高导致能源不足", "农业占比过高导致工业缺位", "风能太阳能完全可以立即替代火电"], "answer": 0, "explain": "资源型重工业结构容易带来高耗能、高污染和转型压力。"}, {"id": "r2019b", "tags": ["industry", "resource"], "source": "2019年浙江4月解析卷综合题", "stem": "云南大型铜冶炼厂布局的有利区位主要包括", "options": ["接近铜矿产地、交通较便利、可利用城市基础设施", "只依赖廉价劳动力", "必须远离所有城市", "只由气候热量决定"], "answer": 0, "explain": "冶炼布局要看原料、交通、劳动力、技术和城市基础设施。"}, {"id": "r2015a", "tags": ["water"], "source": "2015年       if (type === "book") return <svg viewBox="0 0 24 24" className={c} fill="none"><path d="M5 4.5h8a4 4 0 0 1 4 4v11H8.5A3.5 3.5 0 0 0 5 23V4.5Z" stroke="currentColor" strokeWidth="1.8" /><path d="M17 7h2a2 2 0 0 1 2 2v10.5h-4" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" /></svg>;
      if (type === "spark") return <svg viewBox="0 0 24 24" className={c} fill="none"><path d="M12 3l1.8 5.1L19 10l-5.2 1.9L12 17l-1.8-5.1L5 10l5.2-1.9L12 3Z" stroke="currentColor" strokeWidth="1.8" strokeLinejoin="round" /></svg>;
      return <svg viewBox="0 0 24 24" className={c} fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" strokeWidth="1.8" /><path d="M4 9.2h16M4 14.8h16M12 3c2.4 2.6 3.6 5.6 3.6 9S14.4 18.4 12 21c-2.4-2.6-3.6-5.6-3.6-9S9.6 5.6 12 3Z" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" /></svg>;
    }

    function diagramTitle(type) {

    function Diagram({ type }) {

      if (type === "water") return <svg viewBox="0 0 520 260" className="h-56 w-full"><rect width="520" height="260" rx="22" fill="#eef8ff" /><path d="M35 205C120 150 170 205 245 155C320 105 405 158 490 108V230H35Z" fill="#9fe0b5" /><path d="M0 214C80 195 125 216 185 201C260 181 318 205 380 190C430 178 475 190 520 172V260H0Z" fill="#72c8ff" /><path d="M116 178C92 137 99 99 130 72" fill="none" stroke="#20a875" strokeWidth="7" strokeLinecap="round" /><path d="M170 62C245 28 313 30 382 66" fill="none" stroke="#1877f2" strokeWidth="7" strokeLinecap="round" /><path d="M360 188C332 161 310 148 280 145" fill="none" stroke="#1877f2" strokeWidth="7" strokeLinecap="round" /><text x="118" y="49" textAnchor="middle" fontSize="18" fontWeight="800" fill="#0f766e">蒸发</text><text x="280" y="36" textAnchor="middle" fontSize="18" fontWeight="800" fill="#1d4ed8">水汽输送</text><text x="397" y="92" textAnchor="middle" fontSize="18" fontWeight="800" fill="#075985">降水径流</text></svg>;
      if (type === "landform" || type === "tectonic") return <svg viewBox="0 0 520 260" className="h-56 w-full"><rect width="520" height="260" rx="22" fill="#fff8ed" /><path d="M24 210C96 126 145 154 210 84C260 35 320 110 370 84C420 58 460 130 498 98V230H24Z" fill="#b7e4c7" /><path d="M72 218C160 190 225 182 300 198C372 214 430 180 490 160" fill="none" stroke="#1877f2" strokeWidth="10" strokeLinecap="round" /><path d="M110 72C176 108 234 107 292 66C338 34 392 40 450 72" fill="none" stroke="#9a3412" strokeWidth="6" strokeLinecap="round" /><text x="260" y="36" textAnchor="middle" fontSize="19" fontWeight="800" fill="#78350f">岩性构造 + 外力过程 = 地貌</text></svg>;

      return <svg viewBox="0 0 520 260" className="h-56 w-full"><rect width="520" height="260" rx="22" fill="#f4fff7" /><circle cx="260" cy="130" r="62" fill="#20a875" opacity=".92" /><text x="260" y="126" textAnchor="middle" fontSize="20" fontWeight="800" fill="#fff">{diagramTitle(type)}</text><text x="260" y="150" textAnchor="middle" fontSize="14" fontWeight="700" fill="#fff">要素联动</text>{["气候","水文","土壤","植被","地貌"].map((t,i)=>{const a=(-90+i*72)*Math.PI/180; const x=260+Math.cos(a)*128; const y=130+Math.sin(a)*86; return <g key={t}><line x1="260" y1="130" x2={x} y2={y} stroke="#8bd6b1" strokeWidth="4" /><circle cx={x} cy={y} r="34" fill="#e0f2fe" stroke="#fff" strokeWidth="4" /><text x={x} y={y+6} textAnchor="middle" fontSize="16" fontWeight="800" fill="#142033">{t}</text></g>})}</svg>;
    }

    function Login({ onDone }) {
      const [pwd, setPwd] = useState("");
      const [bad, setBad] = useState(false);
      function submit() {
        if (pwd === "0315" || pwd === "0825") {

          setTimeout(() => setBad(false), 400);

    }

    function allUnits() {
      return BOOKS.reduce((arr, book) => arr.concat(book.units.map(unit => Object.assign({}, unit, { bookId: book.id, bookName: book.name, bookSource: book.source }))), []);
    }

    function sourceFor(unit) {
      const ids = UNIT_REAL[unit.id] || [];
      return ids.map(id => REAL_BANK.find(q => q.id === id)).filter(Boolean);
    }

    function makeExam(unit) {
      const linked = sourceFor(unit);
      const questions = [];
      const seen = {};
      linked.forEach((q, i) => {
        if (questions.length < 10 && !seen[q.stem]) {
          seen[q.stem] = true;
          questions.push({ id: unit.id + "-real-" + i, type: "choice", title: "浙江真题归类 " + (questions.length + 1), source: q.source, stem: q.stem, options: q.options, answer: q.answer, explain: q.explain });
        }
      });
      const guideMistakes = ((unit.guide || {}).mistakes || []);
      const conceptCount = unit.concepts.length;
      const trapCount = unit.traps.length;
      const generators = [
        i => ({
          source: "本单元学习指南·考点专项",
          stem: "根据本单元“" + unit.title + "”的知识框架，下列表述最符合教材主线的是",
          options: [unit.concepts[i % conceptCount], unit.traps[i % trapCount], "只要记住地名即可，不需要分析地理过程", "所有区域都可以套用完全相同的结论"],
          explain: "本题来自单元学习指南的核心考点，正确项保留了教材的因果链和适用条件。"
        }),
        i => ({
          source: "本单元学习指南·易错专项",
          stem: guideMistakes[i % Math.max(1, guideMistakes.length)] ? "关于“" + guideMistakes[i % guideMistakes.length].term + "”，正确辨析是" : "本单元高频易错点的正确处理方式是",
          options: guideMistakes[i % Math.max(1, guideMistakes.length)] ? [guideMistakes[i % guideMistakes.length].right, guideMistakes[i % guideMistakes.length].wrong, "把相近概念全部合并作答", "脱离材料直接背结论"] : ["先辨析概念边界，再结合材料建立因果链", "脱离材料直接背结论", "只看一个指标", "忽略尺度差异"],
          explain: "学习指南把这个点列入易错/易混名词，训练时要先辨概念边界，再回到材料。"
        }),
        i => ({
          source: "本单元学习指南·读图专项",
          stem: "遇到“" + unit.title + "”相关图表题，最稳妥的读图顺序是",
          options: [unit.chain.join(" → "), unit.chain.slice().reverse().join(" → "), unit.cards.slice(0, 5).join(" → "), "先写结论 → 再找材料 → 最后补概念"],
          explain: "读图题要先提取条件，再分析过程，最后写结果或措施。"
        })
      ];
      let gi = 0;
      while (questions.length < 10) {
        const built = generators[gi % generators.length](gi);
        const stem = built.stem + "（" + (questions.length + 1) + "）";
        if (!seen[stem]) {
          seen[stem] = true;
          questions.push({ id: unit.id + "-guide-" + gi, type: "choice", title: "单元专项选择 " + (questions.length + 1), source: built.source, stem: stem, options: built.options, answer: 0, explain: built.explain });
        }
        gi += 1;
      }
      for (let i = 0; i < 5; i += 1) {
        const correct = unit.chain.join(" → ");
        const wrongA = unit.chain.slice().reverse().join(" → ");
        const rotated = unit.chain.slice(1).concat(unit.chain[0]).join(" → ");
        questions.push({ id: unit.id + "-s-" + i, type: "sort", title: "大题逻辑排序 " + (i + 1), source: "本单元学习指南·逻辑链专项", stem: "把“" + unit.title + "”主观题答题链条排成最稳妥顺序。", options: [correct, wrongA, rotated, unit.cards.slice(0, 5).join(" → ")], answer: 0, explain: "本单元黄金链条是：" + correct + "。先条件，后过程，再结果或措施。" });
      }
      for (let i = 0; i < 5; i += 1) {
        const ans = unit.chain[i % unit.chain.length];
        questions.push({ id: unit.id + "-f-" + i, type: "fill", title: "模板填空 " + (i + 1), source: "本单元学习指南·模板专项", stem: "补全模板：分析“" + unit.cards[i % unit.cards.length] + "”时，先从【____】切入，再结合材料说明过程和影响。", answer: ans, explain: "参考关键词：" + ans + "。同义表达可接受，但必须落到材料。" });
      }
      return questions;
    }

    function Sidebar({ bookId, setBookId, setUnitId, progress }) {
      return <aside className="side glass sticky top-4 h-[calc(100vh-2rem)] overflow-hidden rounded-[28px] p-4"><div className="rounded-3xl bg-gradient-to-br from-blue-600 to-emerald-500 p-5 text-white shadow-xl"><div className="flex items-center gap-3"><div className="flex h-11 w-11 items-center justify-center rounded-2xl bg-white/20"><Icon type="spark" /></div><div><p className="text-lg font-black">糖糖同学</p><p className="text-sm font-bold opacity-90">目标：地理赋分 95+</p></div></div></div><div className="thin mt-5 space-y-2 overflow-y-auto pr-1" style={{maxHeight:"calc(100vh - 150px)"}}>{BOOKS.map(book => { const active = book.id === bookId; return <button key={book.id} onClick={()=>{ setBookId(book.id); setUnitId(book.units[0].id); }} className={"w-full rounded-2xl p-4 text-left transition " + (active ? "active-book" : "bg-white/66 text-slate-700 hover:bg-white")}><div className="flex items-center gap-3"><span className={"flex h-10 w-10 items-center justify-center rounded-xl " + (active ? "bg-white/20" : "bg-blue-50 text-blue-600")}><Icon type="book" /></span><span><span className="block font-black">{book.name}</span><span className={"block text-xs font-bold " + (active ? "text-white/85" : "text-slate-500")}>{book.units.length} 个教材单元</span></span></div><div className="mt-3 h-2 overflow-hidden rounded-full bg-white/35"><div className="h-full rounded-full bg-white" style={{width:(progress[book.id] || 5) + "%", opacity: active ? .95 : .45}}></div></div></button>; })}</div></aside>;
    }

    function Header({ book, unitId, setUnitId }) {
      return <header className="glass rounded-[28px] p-4"><div className="mb-3 flex flex-wrap items-end justify-between gap-3"><div><p className="text-sm font-black text-emerald-600">教材依据</p><h2 className="text-2xl font-black text-slate-900">{book.name}</h2></div><p className="max-w-2xl text-sm font-bold leading-6 text-slate-500">{book.source}</p></div><div className="thin flex gap-2 overflow-x-auto pb-1">{book.units.map(unit => <button key={unit.id} onClick={()=>setUnitId(unit.id)} className={"shrink-0 rounded-full px-5 py-3 text-sm font-black transition " + (unit.id === unitId ? "bg-slate-900 text-white" : "bg-white/75 text-slate-600 hover:bg-white")}>{unit.title}</button>)}</div></header>;
    }

    function Learn({ unit }) {
      const linked = sourceFor(unit);
      const guide = unit.guide || {};
      return <section className="space-y-5"><div className="glass rounded-[28px] p-5"><div className="flex gap-4"><div className="flex h-12 w-12 shrink-0 items-center justify-center rounded-2xl bg-emerald-100 text-emerald-700"><Icon type="spark" /></div><div><h3 className="text-xl font-black">老师寄语</h3><p className="mt-2 leading-8 text-slate-700">{unit.teacher}</p></div></div></div>{guide.file && <div className="glass rounded-[28px] p-5"><h3 className="text-xl font-black">学习指南精华</h3><div className="mt-4 grid gap-3 lg:grid-cols-3">{[guide.examStatus, guide.commonTypes, guide.goal].filter(Boolean).map((text,i)=><p key={i} className="rounded-2xl bg-white/75 p-4 text-sm font-semibold leading-7 text-slate-700">{text}</p>)}</div><div className="mt-4 grid gap-2 md:grid-cols-2">{(guide.framework || []).slice(0,10).map((text,i)=><div key={i} className="rounded-2xl bg-blue-50/70 p-3 text-sm font-bold leading-6 text-blue-900">#{i+1} {text}</div>)}</div></div>}<div className="grid gap-5 xl:grid-cols-[1.05fr_.95fr]"><div className="glass rounded-[28px] p-5"><h3 className="mb-4 text-xl font-black">核心概念与 SVG 简图解析</h3><Diagram type={unit.diagram} /><div className="mt-4 space-y-3">{unit.concepts.map((text,i)=><p key={i} className="rounded-2xl bg-white/72 p-4 leading-7 text-slate-700"><b className="text-blue-700">考点 {i+1}：</b>{text}</p>)}</div></div><div className="space-y-5"><div className="glass rounded-[28px] p-5"><h3 className="text-xl font-black">高频陷阱与避坑</h3><div className="mt-4 space-y-3">{unit.traps.map((text,i)=><div key={i} className="rounded-2xl border border-red-100 bg-white/75 p-4"><b className="text-red-500">陷阱 {i+1}</b><p className="mt-1 leading-7 text-slate-700">{text}</p></div>)}</div></div><div className="glass rounded-[28px] p-5"><h3 className="text-xl font-black">主观题万能逻辑链</h3><div className="mt-4 flex flex-wrap gap-2">{unit.chain.map((item,i)=><React.Fragment key={item}><span className="rounded-full bg-blue-50 px-4 py-2 text-sm font-black text-blue-700">{item}</span>{i < unit.chain.length - 1 && <span className="py-2 text-slate-400">→</span>}</React.Fragment>)}</div></div></div></div>{(guide.mistakes || []).length > 0 && <div className="glass rounded-[28px] p-5"><h3 className="text-xl font-black">易错/易混名词辨析</h3><div className="mt-4 grid gap-3 md:grid-cols-2">{guide.mistakes.map((m,i)=><div key={i} className="rounded-2xl bg-white/75 p-4"><p className="font-black text-red-500">{m.term}</p><p className="mt-2 text-sm leading-6 text-slate-500">误区：{m.wrong}</p><p className="mt-2 text-sm font-semibold leading-6 text-slate-700">正解：{m.right}</p></div>)}</div></div>}<div className="glass rounded-[28px] p-5"><h3 className="text-xl font-black">本单元真题归属</h3><div className="mt-4 grid gap-3 md:grid-cols-2">{linked.map(q=><div key={q.id} className="rounded-2xl bg-white/75 p-4"><p className="text-xs font-black text-emerald-600">{q.source}</p><p className="mt-2 text-sm leading-6 text-slate-700">{q.stem}</p></div>)}</div></div></section>;
    }

    function Exam({ unit, progress, setProgress }) {
      const questions = useMemo(()=>makeExam(unit), [unit.id]);
      const saved = progress.exam[unit.id] || {};
      const [answers, setAnswers] = useState(saved.answers || {});
      const [done, setDone] = useState(saved.done || false);
      useEffect(()=>{ const s = progress.exam[unit.id] || {}; setAnswers(s.answers || {}); setDone(s.done || false); }, [unit.id]);
      const score = questions.reduce((sum,q)=>{ const v = answers[q.id]; if (q.type === "fill") return sum + (String(v || "").includes(q.answer) ? 5 : 0); return sum + (Number(v) === q.answer ? 5 : 0); }, 0);
      function setAns(id, val) { const next = Object.assign({}, answers); next[id] = val; setAnswers(next); }
      function submit() { const wrong = questions.filter(q => q.type === "fill" ? !String(answers[q.id] || "").includes(q.answer) : Number(answers[q.id]) !== q.answer).map(q=>q.id); const nextExam = Object.assign({}, progress.exam); nextExam[unit.id] = { answers: answers, done: true, best: Math.max(saved.best || 0, score), wrong: wrong }; const next = Object.assign({}, progress, { exam: nextExam }); setProgress(next); setDone(true); store.set("geo-progress-v2", next); }
      function reset() { setAnswers({}); setDone(false); const nextExam = Object.assign({}, progress.exam); nextExam[unit.id] = { answers: {}, done: false, best: saved.best || 0, wrong: [] }; const next = Object.assign({}, progress, { exam: nextExam }); setProgress(next); store.set("geo-progress-v2", next); }
      return <section className="glass rounded-[28px] p-5"><div className="flex flex-wrap items-center justify-between gap-3"><div><h3 className="text-2xl font-black">20 题浙江卷实战</h3><p className="mt-1 text-sm font-bold text-slate-500">10 题真题母题选择 · 5 题逻辑排序 · 5 题模板填空</p></div><div className="rounded-2xl bg-white/80 px-5 py-3 text-right"><p className="text-xs font-black text-slate-500">得分</p><p className="text-2xl font-black text-blue-700">{done ? score + " / 100" : "待提交"}</p><p className="text-xs font-black text-emerald-600">历史最高 {saved.best || 0}</p></div></div><div className="mt-5 space-y-4">{questions.map((q,i)=><Question key={q.id} q={q} index={i} value={answers[q.id]} done={done} onChange={v=>setAns(q.id,v)} />)}</div><div className="sticky bottom-4 mt-6 flex justify-end gap-3 rounded-3xl bg-white/80 p-3 shadow-2xl backdrop-blur"><button onClick={reset} className="rounded-2xl bg-slate-100 px-5 py-3 font-black text-slate-700">重做本卷</button><button onClick={submit} className="rounded-2xl bg-gradient-to-r from-blue-600 to-emerald-500 px-6 py-3 font-black text-white shadow-lg">提交并收录错题</button></div></section>;
    }

    function Question({ q, index, value, done, onChange }) {
      const fill = q.type === "fill";
      const ok = fill ? String(value || "").includes(q.answer) : Number(value) === q.answer;
      return <article className="rounded-3xl border border-white/80 bg-white/75 p-4 shadow-sm"><div className="flex flex-wrap justify-between gap-3"><div><p className="text-xs font-black text-emerald-600">{q.source}</p><h4 className="mt-1 text-lg font-black">{index + 1}. {q.title}</h4></div>{done && <span className={"h-7 rounded-full px-3 py-1 text-xs font-black " + (ok ? "bg-emerald-100 text-emerald-700" : "bg-red-100 text-red-600")}>{ok ? "正确" : "需强化"}</span>}</div><p className="mt-3 leading-7 text-slate-700">{q.stem}</p>{fill ? <input value={value || ""} onChange={e=>onChange(e.target.value)} placeholder="填写关键词" className="mt-3 h-12 w-full rounded-2xl border border-blue-100 bg-blue-50/60 px-4 font-bold outline-none focus:border-blue-400" /> : <div className="mt-3 grid gap-2">{q.options.map((op,i)=><button key={i} onClick={()=>onChange(i)} className={"rounded-2xl border p-3 text-left text-sm font-bold leading-6 transition " + (Number(value) === i ? "border-blue-500 bg-blue-50 text-blue-800" : "border-slate-100 bg-white/70 text-slate-700 hover:bg-blue-50")}>{String.fromCharCode(65+i)}. {op}</button>)}</div>}{done && <div className="mt-3 rounded-2xl bg-slate-50 p-3 text-sm leading-7 text-slate-700"><b>解析：</b>{q.explain}<span className="ml-2 font-black text-blue-700">答案：{fill ? q.answer : String.fromCharCode(65 + q.answer)}</span></div>}</article>;
    }

    function Cards({ unit, progress, setProgress }) {
      const saved = progress.cards[unit.id] || [];
      function buildCards() {
        const guideCards = ((unit.guide || {}).mistakes || []).map((m,i)=>({ id: unit.id + "-mistake-" + i, front: m.term, back: "误区：" + m.wrong + "。正解：" + m.right }));
        const conceptCards = unit.cards.map((name,i)=>({ id: unit.id + "-card-" + i, front: name, back: name + "：定义要准确，材料要对应。答题时优先联想“" + unit.concepts[i % unit.concepts.length] + "”，再落到“" + unit.chain[i % unit.chain.length] + "”。" }));
        return conceptCards.concat(guideCards);
      }
      const base = buildCards().filter(c=>!saved.includes(c.id));
      const [queue, setQueue] = useState(base);
      const [flip, setFlip] = useState(false);
      useEffect(()=>{ setQueue(buildCards().filter(c=>!(progress.cards[unit.id] || []).includes(c.id))); setFlip(false); }, [unit.id, progress.cards]);
      const cur = queue[0];
      function remember() { if(!cur) return; const nextCards = Object.assign({}, progress.cards); nextCards[unit.id] = Array.from(new Set((progress.cards[unit.id] || []).concat(cur.id))); const next = Object.assign({}, progress, { cards: nextCards }); setProgress(next); store.set("geo-progress-v2", next); setQueue(queue.slice(1)); setFlip(false); }
      function again() { if(!cur) return; setQueue(queue.slice(1).concat(cur)); setFlip(false); }
      return <section className="glass rounded-[28px] p-5"><div className="flex flex-wrap items-center justify-between gap-3"><div><h3 className="text-2xl font-black">死磕识字卡</h3><p className="mt-1 text-sm font-bold text-slate-500">还不知道会排到队尾，直到全部记住</p></div><div className="rounded-2xl bg-white/80 px-4 py-3 text-sm font-black text-emerald-700">剩余 {queue.length} 张</div></div>{cur ? <div className={"card3d mx-auto mt-6 max-w-2xl " + (flip ? "flipped" : "")}><button onClick={()=>setFlip(!flip)} className="flip relative h-80 w-full"><div className="face absolute inset-0 flex flex-col items-center justify-center rounded-[30px] bg-gradient-to-br from-blue-600 to-emerald-500 p-8 text-center text-white shadow-2xl"><p className="text-sm font-black opacity-80">正面</p><p className="mt-4 text-4xl font-black">{cur.front}</p></div><div className="face back absolute inset-0 flex flex-col items-center justify-center rounded-[30px] bg-white p-8 text-center shadow-2xl"><p className="text-sm font-black text-emerald-600">背面解析</p><p className="mt-4 text-xl font-black leading-9 text-slate-800">{cur.back}</p></div></button><div className="mt-5 flex justify-center gap-3"><button onClick={again} className="rounded-2xl bg-amber-100 px-5 py-3 font-black text-amber-700">还不知道</button><button onClick={remember} className="flex items-center gap-2 rounded-2xl bg-emerald-600 px-5 py-3 font-black text-white"><Icon type="check" cls="h-4 w-4" />记住了</button></div></div> : <div className="mt-6 rounded-[30px] bg-white/75 p-10 text-center"><p className="text-3xl font-black text-emerald-600">本单元已清空</p><button onClick={()=>{ const nextCards = Object.assign({}, progress.cards); nextCards[unit.id] = []; const next = Object.assign({}, progress, { cards: nextCards }); setProgress(next); store.set("geo-progress-v2", next); }} className="mt-5 rounded-2xl bg-slate-900 px-5 py-3 font-black text-white">重新开始</button></div>}</section>;
    }

    function Wrong({ unit, progress }) {
      const questions = makeExam(unit);
      const wrongIds = (progress.exam[unit.id] || {}).wrong || [];
      const wrong = questions.filter(q=>wrongIds.includes(q.id));
      return <section className="glass rounded-[28px] p-5"><h3 className="text-2xl font-black">错题专项强化</h3><p className="mt-1 text-sm font-bold text-slate-500">提交训练后自动收录，按解析重练</p><div className="mt-5 space-y-3">{wrong.length ? wrong.map((q,i)=><article key={q.id} className="rounded-3xl bg-white/75 p-4"><p className="text-xs font-black text-red-500">{q.source}</p><h4 className="mt-1 font-black">{i+1}. {q.title}</h4><p className="mt-2 leading-7 text-slate-700">{q.stem}</p><p className="mt-2 rounded-2xl bg-red-50 p-3 text-sm leading-7 text-slate-700"><b>强化解析：</b>{q.explain}</p></article>) : <div className="rounded-[30px] bg-white/75 p-10 text-center"><p className="text-2xl font-black text-emerald-600">当前没有错题</p><p className="mt-2 font-bold text-slate-500">先完成并提交本单元 20 题训练。</p></div>}</div></section>;
    }

    function App() {
      const [authed, setAuthed] = useState(()=>store.get("geo-authed", false));
      const [bookId, setBookId] = useState(BOOKS[0].id);
      const [unitId, setUnitId] = useState(BOOKS[0].units[0].id);
      const [tab, setTab] = useState("learn");
      const [progress, setProgress] = useState(()=>store.get("geo-progress-v2", { exam: {}, cards: {} }));
      const book = BOOKS.find(b=>b.id===bookId) || BOOKS[0];
      const unit = book.units.find(u=>u.id===unitId) || book.units[0];
      const bookProgress = useMemo(()=>{ const out = {}; BOOKS.forEach(b=>{ const done = b.units.filter(u=>((progress.exam[u.id] || {}).best || 0) >= 80).length; out[b.id] = Math.max(5, Math.round(done / b.units.length * 100)); }); return out; }, [progress]);
      if (!authed) return <Login onDone={()=>setAuthed(true)} />;
      return <main className="p-4 lg:p-6"><div className="layout mx-auto grid max-w-[1500px] grid-cols-[310px_1fr] gap-5"><Sidebar bookId={bookId} setBookId={setBookId} setUnitId={id=>{setUnitId(id); setTab("learn");}} progress={bookProgress} /><div className="min-w-0 space-y-5"><Header book={book} unitId={unit.id} setUnitId={id=>{setUnitId(id); setTab("learn");}} /><nav className="glass flex flex-wrap gap-2 rounded-[28px] p-3">{[["learn","教材考点"],["exam","20题实战"],["cards","识字卡"],["wrong","错题本"]].map(t=><button key={t[0]} onClick={()=>setTab(t[0])} className={"rounded-2xl px-5 py-3 text-sm font-black transition " + (tab===t[0] ? "bg-slate-900 text-white" : "bg-white/70 text-slate-600 hover:bg-white")}>{t[1]}</button>)}</nav>{tab==="learn" && <Learn unit={unit} />}{tab==="exam" && <Exam unit={unit} progress={progress} setProgress={setProgress} />}{tab==="cards" && <Cards unit={unit} progress={progress} setProgress={setProgress} />}{tab==="wrong" && <Wrong unit={unit} progress={progress} />}</div></div></main>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
