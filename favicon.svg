<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#34A853"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a89fff;stop-opacity:.6"/>
      <stop offset="100%" style="stop-color:#6c63ff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- 背景圆 -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>

  <!-- 地球经线 -->
  <ellipse cx="32" cy="32" rx="14" ry="19" fill="none" stroke="white" stroke-width="1.5" opacity="0.9"/>
  <ellipse cx="32" cy="32" rx="7" ry="19" fill="none" stroke="white" stroke-width="1" opacity="0.6"/>

  <!-- 地球纬线 -->
  <line x1="18" y1="32" x2="46" y2="32" stroke="white" stroke-width="1" opacity="0.8"/>
  <line x1="19.5" y1="23" x2="44.5" y2="23" stroke="white" stroke-width="0.8" opacity="0.55"/>
  <line x1="19.5" y1="41" x2="44.5" y2="41" stroke="white" stroke-width="0.8" opacity="0.55"/>

  <!-- 糖糖圆点装饰 -->
  <circle cx="50" cy="13" r="5.5" fill="#FBBC04"/>
  <circle cx="50" cy="13" r="3" fill="#fff" opacity="0.4"/>

  <circle cx="13" cy="50" r="4" fill="#ff6b6b"/>
  <circle cx="13" cy="50" r="2" fill="#fff" opacity="0.4"/>

  <circle cx="52" cy="48" r="3" fill="#fff" opacity="0.85"/>
  <circle cx="14" cy="15" r="2.5" fill="#51cf66" opacity="0.9"/>
</svg>