<script>
const TOPICS = [{"id": "TOPIC-001", "title": "气候类型判断专题", "freq": 3, "linked_nodes": ["GEO-ZR-007", "GEO-ZR-006", "GEO-ZR-009"], "content": {"intro": "气候类型判断是浙江高考世界地理与自然地理综合题中的高频核心。常见材料包括气温曲线图、降水柱状图、区域分布图和成因分析题。", "core_points": ["两步判断法：先看最冷月气温，再看降水季节分配。", "最冷月大于15℃为热带；0℃至15℃多为亚热带或温带海洋性；小于0℃常为温带气候。", "全年多雨且均匀多为热带雨林或温带海洋性；夏雨型多为季风气候；冬雨型为地中海气候；全年少雨常为沙漠或大陆性气候。"], "template": "判断模板：①读最冷月气温确定热量带；②读降水总量与季节分配；③结合海陆位置、纬度位置、气压带风带判断成因；④写出对应自然带或农业类型。", "mistakes": ["把温带海洋性气候误判为地中海气候，关键是一个全年较均匀、一个冬雨夏干。", "只看年降水总量，不看季节分配。", "忽视大陆东岸/西岸位置对气候分布的限制。"], "practice_focus": "重点训练热带雨林、热带季风、地中海、温带海洋性、亚热带季风之间的区分。"}}, {"id": "TOPIC-002", "title": "地方时与区时计算专题", "freq": 3, "linked_nodes": ["GEO-ZR-002"], "content": {"intro": "地方时和区时计算是地球运动专题中的高频计算题，常与国际日界线、航班飞行、赛事直播、卫星发射等情境结合。", "core_points": ["经度每相差15°，时间相差1小时；每相差1°，时间相差4分钟。", "区时计算遵循“东加西减”；越过国际日界线时日期调整方向相反。", "地方时看经度，区时看时区中央经线。"], "template": "答题模板：①确定已知地点时区或地方时；②求两地经度或时区差；③按“东加西减”计算；④判断是否跨日期界线；⑤写出日期和具体时刻。", "mistakes": ["混淆地方时和区时。", "只算时刻不判断日期是否变化。", "把国际日界线加减一天方向记反。"], "practice_focus": "重点练习跨时区飞行、地球自转方向与晨昏线联合判断题。"}}, {"id": "TOPIC-003", "title": "正午太阳高度与楼间距专题", "freq": 3, "linked_nodes": ["GEO-ZR-003"], "content": {"intro": "正午太阳高度既是地球运动中的公式题，也是与城市规划、楼间距、太阳能布局相结合的应用题热点。", "core_points": ["公式：H=90°-|φ-δ|。", "冬至日通常用于楼间距最小标准计算，因为此时正午太阳高度最小、影长最大。", "太阳直射点所在纬线正午太阳高度为90°。"], "template": "解题模板：①判断日期对应的太阳直射点纬度δ；②代入公式计算正午太阳高度H；③若求影长或楼间距，再结合tan关系计算；④说明应用意义。", "mistakes": ["忘记绝对值。", "把夏至用于楼间距计算。", "不知道影长与太阳高度成反比。"], "practice_focus": "重点掌握夏至、冬至、春秋分四个特殊日期与40°N、23.5°N、0°等纬线结合的计算。"}}, {"id": "TOPIC-004", "title": "地质构造与工程选址专题", "freq": 3, "linked_nodes": ["GEO-ZR-005"], "content": {"intro": "地质构造题在浙江卷中常结合剖面图、工程选址、资源开发和地形成因综合考查，属于图文结合的高频题。", "core_points": ["背斜：中间老、两翼新；向斜：中间新、两翼老。", "背斜顶部受张力易侵蚀成谷，向斜槽部受挤压较稳固可成山。", "背斜利于储油气，向斜利于储水，断层常有泉水出露。"], "template": "作答模板：①先根据岩层新老判断构造类型；②再区分是构造还是地貌；③最后结合工程活动分析适宜性，如隧道选背斜、坝址避断层。", "mistakes": ["把背斜等同于山、向斜等同于谷。", "忽视断层处岩层破碎、渗漏严重。", "把找水和找油的构造条件混淆。"], "practice_focus": "重点练习“构造判断+工程应用+资源分布”三合一综合题。"}}, {"id": "TOPIC-005", "title": "三圈环流与气压带风带专题", "freq": 3, "linked_nodes": ["GEO-ZR-006", "GEO-ZR-007", "GEO-ZR-008"], "content": {"intro": "三圈环流是联系大气运动、气候分布和洋流形成的重要总框架，也是高考自然地理综合的主干知识。", "core_points": ["全球共有7个气压带、6个风带。", "赤道低压和极地高压属于热力原因；副热带高压和副极地低压属于动力原因。", "气压带风带随太阳直射点季节移动，北半球夏季整体北移。"], "template": "分析模板：①判断所在地纬度位置；②判断受哪一气压带或风带控制；③结合季节判断其移动情况；④推出天气、气候或洋流影响。", "mistakes": ["分不清热力成因和动力成因。", "把盛行西风在南北半球的风向记错。", "忽视气压带季节移动造成的旱雨季变化。"], "practice_focus": "重点训练三圈环流与地中海气候、热带草原气候、季风形成的联系。"}}, {"id": "TOPIC-006", "title": "天气系统：冷锋暖锋气旋反气旋专题", "freq": 3, "linked_nodes": ["GEO-ZR-008"], "content": {"intro": "天气系统是浙江高考自然地理图判题中的常客，尤其喜欢结合等压线图、锋面示意图和天气过程分析。", "core_points": ["冷锋过境：大风、降温、短时降水；暖锋过境：连续性降水、气温回升。", "低压（气旋）辐合上升，多阴雨；高压（反气旋）辐散下沉，多晴朗。", "梅雨对应准静止锋，伏旱对应副热带高压控制。"], "template": "分析模板：①先识别天气系统图形；②判断气流方向和气压分布；③写出过境前、过境时、过境后的天气变化；④联系生产生活影响。", "mistakes": ["冷锋和暖锋的雨区位置记反。", "把气旋和反气旋控制下的天气说反。", "把梅雨归因于台风。"], "practice_focus": "重点练习锋面系统与长江中下游梅雨、寒潮、台风等热点情境。"}}, {"id": "TOPIC-007", "title": "世界洋流与渔场专题", "freq": 3, "linked_nodes": ["GEO-ZR-009", "GEO-ZR-007"], "content": {"intro": "洋流题通常与气候形成、海雾、航海和渔场成因相结合，是世界地理题的重要切入口。", "core_points": ["北半球中低纬大洋环流顺时针，南半球中低纬逆时针。", "暖流增温增湿，寒流降温减湿。", "北海道、纽芬兰、北海渔场多由寒暖流交汇形成，秘鲁渔场由上升补偿流形成。"], "template": "作答模板：①先判断洋流类型和流向；②再分析其对沿岸气候、航海、渔场或污染扩散的影响；③必要时结合所在大陆东岸/西岸分析。", "mistakes": ["把洋流环流方向和气旋方向混淆。", "混淆北海道渔场与秘鲁渔场的成因。", "认为低纬沿海一定湿润，忽视寒流导致的沙漠分布。"], "practice_focus": "重点掌握北太平洋、北大西洋、北印度洋季风洋流及四大渔场。"}}, {"id": "TOPIC-008", "title": "农业区位因素与地域类型专题", "freq": 3, "linked_nodes": ["GEO-RW-002", "GEO-ZR-007"], "content": {"intro": "农业区位因素题是人文地理高频题，既考基础因素分类，也考主导因素判断和区位变化分析。", "core_points": ["自然因素包括气候、地形、土壤、水源；社会经济因素包括市场、交通、劳动力、科技、政策。", "主导因素判断要看“限制最强、决定最明显”的条件。", "农业地域类型需要结合气候、地形、经济发展水平和经营方式综合判断。"], "template": "分析模板：①先分自然和社会两类列点；②指出主导因素；③若问变化原因，再写交通、科技、政策和市场变化；④最后说明对产量、品质和布局的影响。", "mistakes": ["把所有因素简单罗列，不突出主导因素。", "只写自然因素，不写市场和交通。", "混淆季风水田农业与商品谷物农业的条件。"], "practice_focus": "重点练习茶叶、乳畜业、蔬菜基地、商品粮基地等典型案例。"}}, {"id": "TOPIC-009", "title": "工业区位与产业转移专题", "freq": 3, "linked_nodes": ["GEO-RW-007", "GEO-QY-005", "GEO-QY-001"], "content": {"intro": "工业区位与产业转移是浙江卷区域发展模块的高频综合题，常结合区域案例、政策背景和发展阶段分析。", "core_points": ["工业区位因素包括原料、能源、市场、交通、劳动力、科技、政策和环境。", "产业转移的核心逻辑是成本变化与比较优势变化。", "转出地一般促进产业升级，转入地一般增加就业和经济增长，但也可能带来环境压力。"], "template": "作答模板：①分析转移前的区位优势和约束；②说明企业为何迁出、为何迁入；③分转出地和转入地分别写影响；④最后评价可持续性。", "mistakes": ["只写转入地影响，不写转出地。", "把产业转移原因简单归结为劳动力便宜。", "忽视环境容量和政策作用。"], "practice_focus": "重点案例包括鲁尔区整治、东亚产业转移、中国沿海制造业外迁。"}}, {"id": "TOPIC-010", "title": "资源跨区域调配专题", "freq": 2, "linked_nodes": ["GEO-QY-002", "GEO-QY-006", "GEO-ZY-005", "GEO-ZY-006"], "content": {"intro": "资源跨区域调配题重在分析调出地与调入地的双边影响，是区域发展和资源安全的交叉热点。", "core_points": ["典型案例包括西气东输、南水北调和西电东送。", "分析时必须从经济、社会、生态三维度分别展开。", "调入地重点写缓解短缺、优化能源结构、改善环境；调出地重点写资源开发、基础设施改善和生态风险。"], "template": "答题模板：①说明调配背景与原因；②分调入地、调出地分别作答；③每一方再分经济、社会、生态三角度写影响；④最后指出可能问题和治理措施。", "mistakes": ["只写调入地，不写调出地。", "只写有利影响，不写生态风险。", "把“资源调配”和“产业转移”答题框架混用。"], "practice_focus": "重点训练南水北调中线、西气东输一线和我国能源安全背景。"}}, {"id": "TOPIC-011", "title": "资源环境与国家安全专题", "freq": 2, "linked_nodes": ["GEO-ZY-001", "GEO-ZY-005", "GEO-ZY-006", "GEO-ZY-007", "GEO-ZY-008"], "content": {"intro": "资源环境与国家安全是新教材选必3的重点方向，命题倾向综合现实案例，强调资源保障、生态保护和国家战略意识。", "core_points": ["耕地安全、水资源安全、能源安全、海洋权益和生物多样性保护是核心板块。", "国家安全题要把自然地理基础与国家战略联系起来。", "回答时要体现“问题—影响—措施”结构。"], "template": "分析模板：①指出资源环境问题及表现；②说明其对经济、生态、社会和国家战略的影响；③从节约、开发、替代、保护、国际合作等角度提出措施。", "mistakes": ["把国家安全题答成普通环境问题题。", "措施空泛，没有结合具体资源类型。", "忽视海洋权益、通道安全、国际依赖度等关键词。"], "practice_focus": "重点掌握18亿亩耕地红线、水资源安全、石油运输通道、EEZ、就地保护与迁地保护。"}}];
const grid = document.getElementById('topic-grid');
TOPICS.forEach(t => {
  grid.innerHTML += `
    <a class="card" href="topic.html?id=${t.id}" style="text-decoration:none;color:inherit">
      <div style="font-weight:700;font-size:1rem;margin-bottom:10px">${t.title}</div>
      <div style="color:var(--text2);font-size:0.85rem;margin-bottom:12px">
        关联：${t.linked_nodes.slice(0,2).join(' · ')}${t.linked_nodes.length>2?'…':''}
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <span class="tag tag-orange">${'⭐'.repeat(t.freq)} 高频</span>
        <span class="tag tag-blue">${t.linked_nodes.length} 个关联节点</span>
      </div>
    </a>`;
});
function toggleMobileNav() { document.getElementById('mobile-nav').classList.toggle('hidden'); }
</script>
